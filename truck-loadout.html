<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Truckload Calculator — WhisperRoom</title>
<style>
  :root{
    --bg:#161616; --surface:#1e1e1e; --surface2:#262626; --border:#333;
    --text:#e8e8e8; --muted:#8a8a8a; --orange:#ee6216; --green:#3fb950; --amber:#f59e0b;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.4}
  a{color:var(--orange);text-decoration:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
  .topbar .logo{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .topbar .logo span{color:var(--orange)}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 22px 64px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 22px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 14px}
  .truck-opts{display:flex;flex-wrap:wrap;gap:8px}
  .truck-btn{padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .truck-btn.active{border-color:var(--orange);background:rgba(238,98,22,.12);color:var(--orange)}
  .custom-dims{display:none;gap:10px;margin-top:12px;flex-wrap:wrap}
  .custom-dims.show{display:flex}
  .custom-dims label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
  input[type=number],select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;padding:8px 10px;outline:none}
  input[type=number]{width:90px}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .row select{flex:1;min-width:0}
  .row .qty{width:74px}
  .wa-toggle{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none}
  .wa-toggle input{cursor:pointer;accent-color:var(--orange)}
  .row .rm{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 6px;line-height:1}
  .row .rm:hover{color:#ef4444}
  .addbtn{margin-top:4px;padding:8px 14px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
  .addbtn:hover{border-color:var(--orange);color:var(--orange)}
  /* results */
  .res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat .v{font-size:28px;font-weight:800;font-family:var(--mono);line-height:1}
  .stat .v.big{color:var(--orange)}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:6px}
  .truckbar-wrap{margin-bottom:8px}
  .truckbar-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .truckbar{height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative}
  .truckbar-fill{height:100%;background:linear-gradient(90deg,var(--orange),#f5853f);display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#1a1a1a;white-space:nowrap}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800}
  td.num,th.num{text-align:right;font-family:var(--mono)}
  .note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:14px}
  .empty{color:var(--muted);font-style:italic;padding:30px;text-align:center}
  .banner{background:rgba(238,98,22,.1);border:1px solid rgba(238,98,22,.4);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--orange);margin-bottom:16px}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Whisper<span>Room</span> — Truckload Calculator</div>
    <a href="/orders">← Orders</a>
  </div>
  <div class="wrap">
    <h1>Truckload Calculator</h1>
    <p class="sub">Estimate how many truckloads a set of booths needs. Floor space only (no stacking), two side-by-side lanes down the trailer.</p>

    <div id="prefillBanner" class="banner" style="display:none"></div>

    <div class="card">
      <div class="card-title">Truck</div>
      <div class="truck-opts" id="truckOpts"></div>
      <div class="custom-dims" id="customDims">
        <label>Length (ft)<input type="number" id="cuLen" value="52" min="1" oninput="recompute()"></label>
        <label>Width (in)<input type="number" id="cuWid" value="98" min="1" oninput="recompute()"></label>
        <label>Height (in)<input type="number" id="cuHt" value="108" min="1" oninput="recompute()"></label>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Booths</div>
      <div id="rows"></div>
      <button class="addbtn" onclick="addRow()">+ Add model</button>
    </div>

    <div class="card">
      <div class="card-title">Result</div>
      <div id="results"><div class="empty">Add at least one booth to see truckloads.</div></div>
    </div>
  </div>

const BOOTH_KEYS = Object.keys(BOOTH_DATA);
const BOOTH_KEYS_BY_LEN = [...BOOTH_KEYS].sort((a,b)=>b.length-a.length);
// Models shown in the picker — hide the "ENV"/"SNV" (no-vent) variants;
// they duplicate the E/S pallet dims. Pre-fill still maps them, normalized
// back to the plain E/S key (see prefillFromOrder).
const MODEL_OPTIONS = BOOTH_KEYS.filter(k=>!/(ENV|SNV)$/.test(k));
// Strip a no-vent suffix to its plain E/S equivalent when one exists.
function normalizeBoothKey(key){
  if(key && /(ENV|SNV)$/.test(key)){ const base=key.slice(0,-2); if(BOOTH_DATA[base]) return base; }
  return key;
}

// Match a free-form line-item name to a BOOTH_DATA key (mirrors
// orders-dashboard.html findBoothData, but returns the key).
function findBoothKey(rawName){
  if(!rawName) return null;
  if(BOOTH_DATA[rawName]) return rawName;
  const norm=String(rawName).trim().toLowerCase();
  if(!norm) return null;
  for(const key of BOOTH_KEYS_BY_LEN){
    const k=key.toLowerCase();
    if(norm===k) return key;
    if(norm.startsWith(k)){
      const next=norm.charAt(k.length);
      if(next===''||/[\s\-—,(/]/.test(next)) return key;
    }
  }
  return null;
}

  { id:"26", label:"26' box",     len:312, width:96,  height:90  },
  { id:"custom", label:"Custom",  len:618, width:98,  height:108 },
];
let _truckId = "52";

// ── State ────────────────────────────────────────────────────────────

function activeTruck(){
  if(_truckId === "custom"){
    return {
      id:"custom", label:"Custom",
      len: (parseFloat(document.getElementById('cuLen').value)||0) * 12,
      width: parseFloat(document.getElementById('cuWid').value)||0,
      height: parseFloat(document.getElementById('cuHt').value)||0,
    };
  }
  return TRUCKS.find(t=>t.id===_truckId);
}

// ── Calc engine — floor layout with rotation, floor only ─────────────
// Each pallet may sit lengthwise OR rotated 90°. We rotate a pallet when its
// long side fits across the trailer width AND doing so shortens the trailer
// length it eats (e.g. a 90×52 turned sideways spans 90" of the 98" width and
// costs only 52" of length instead of 90"). Pallets are then shelf-packed
// across the width (sum of widths ≤ trailer width), and the shelves packed
// into trucks first-fit-decreasing so no pallet spans two trucks.
//   bins: [{ used, shelves:[{ x, len, items:[{x,y,len,wid,l,w,h,model,rotated}] }] }]
function packLayout(palletList, truck){
  // 1. Orient each pallet. len = trailer length it consumes; wid = across.
  const items = palletList.map(p=>{
    const L=Math.max(p.l,p.w), W=Math.min(p.l,p.w);
    let len=L, wid=W, rotated=false;
    // Rotate when the long side fits across the width AND the pallet is too
    // wide to pair side-by-side anyway (W > half width, i.e. the 52–54" booth
    // pallets). Turning a 90×52 sideways costs 52" of length instead of 90".
    // Narrow (≤ half width) pallets are left lengthwise so they pair two-up,
    // which packs tighter than rotating them.
    if(L <= truck.width && W > truck.width/2){ len=W; wid=L; rotated=true; }
    return { len, wid, rotated, l:p.l, w:p.w, h:p.h, model:p.model };
  });
  // 2. Shelf-pack across width. Sort by length desc so similar lengths group.
  items.sort((a,b)=>b.len-a.len || b.wid-a.wid);
  const shelves=[]; // {len, widthUsed, items}
  for(const it of items){
    let placed=false;
    for(const sh of shelves){
      if(sh.widthUsed + it.wid <= truck.width){
        it.y = sh.widthUsed; sh.widthUsed += it.wid;
        sh.len = Math.max(sh.len, it.len);
        sh.items.push(it); placed=true; break;
      }
    }
    if(!placed){ it.y=0; shelves.push({ len:it.len, widthUsed:it.wid, items:[it] }); }
  }
  // 3. Pack shelves into trucks (FFD by shelf length).
  shelves.sort((a,b)=>b.len-a.len);
  const bins=[];
  for(const sh of shelves){
    let placed=false;
    for(const b of bins){ if(b.used + sh.len <= truck.len){ sh.x=b.used; b.used+=sh.len; b.shelves.push(sh); placed=true; break; } }
    if(!placed){ sh.x=0; bins.push({ used:sh.len, shelves:[sh] }); }
  }
  return bins;
}

// Stable color per model for the diagram + legend.
const PALETTE = ['#ee6216','#3b82f6','#10b981','#a855f7','#f59e0b','#ef4444','#14b8a6','#ec4899','#84cc16','#6366f1','#eab308','#06b6d4'];

// One pallet rectangle (top-down), labeled with its L×W footprint. The drawn
// rect is len (x) × wid (y); the label always reads the physical L×W, with a
// ⟳ when the pallet is rotated 90°.
function palletCell(px, py, pw, ph, it, color){
  const L=Math.max(it.l,it.w), W=Math.min(it.l,it.w);
  const label = `${L}×${W}${it.rotated?' ⟳':''}`;
  const show  = pw > 26 && ph > 14;
  const fs    = Math.max(8, Math.min(13, ph*0.30, pw*0.16));
  return `<g>
    <rect x="${(px+1).toFixed(1)}" y="${(py+1).toFixed(1)}" width="${Math.max(0,pw-2).toFixed(1)}" height="${Math.max(0,ph-2).toFixed(1)}" rx="3" fill="${color}" fill-opacity="0.85" stroke="#0d0d0d" stroke-width="1"><title>${(it.model||'').replace(/"/g,'')} — ${L}×${W}×${it.h||'?'} in${it.rotated?' (rotated 90°)':''}</title></rect>
    ${show?`<text x="${(px+pw/2).toFixed(1)}" y="${(py+ph/2).toFixed(1)}" font-size="${fs.toFixed(1)}" fill="#0d0d0d" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace,monospace">${label}</text>`:''}
  </g>`;
}

// Scale top-down SVG of one truck's floor with all pallets placed to scale.
function drawTruck(bin, truck, colorOf, idx){
  const PX = 900;                     // target px for trailer length
  const scale = PX / truck.len;
  const W = truck.len * scale, H = truck.width * scale;
  const pct = Math.min(100, (bin.used/truck.len)*100);
  let cells = '';
  for(const sh of bin.shelves){
    const x = sh.x * scale;
    for(const it of sh.items){
      cells += palletCell(x, it.y*scale, it.len*scale, it.wid*scale, it, colorOf(it.model));
    }
  }
  return `<div style="margin:6px 0 16px">
    <div class="truckbar-head"><span><b>Truck ${idx+1}</b></span><span>${fmtFt(bin.used)} / ${fmtFt(truck.len)} ft &middot; ${pct.toFixed(0)}% full</span></div>
    <svg viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" width="100%" style="max-width:${W.toFixed(0)}px;height:auto;background:#141414;border:1px solid var(--border);border-radius:6px;display:block">
      <rect x="0.5" y="0.5" width="${(W-1).toFixed(1)}" height="${(H-1).toFixed(1)}" fill="none" stroke="#555" stroke-width="1"/>
      ${cells}
    </svg>
    <div style="font-size:10px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between">
      <span>◄ nose</span><span>${fmtFt(truck.len)} ft × ${truck.width}" — top-down, to scale (⟳ = rotated 90°)</span><span>doors ►</span>
    </div>
  </div>`;
}

function palletsForRows(){
  const list = [], breakdown = [];
  for(const r of rows){
    const bd = BOOTH_DATA[r.model];
    const qty = parseInt(r.qty)||0;
    if(!bd || qty<=0) continue;
    // Per booth, build its pallet set. Wide Access swaps ONE 47" pallet (if
    // the booth has one) for a 52" pallet — the wide-access door's wider crate.
    let pals = bd.pallets.map(p=>({l:p.l,w:p.w,h:p.h}));
    let waApplied = false;
    if(r.wa){
      const idx = pals.findIndex(p=>p.w===47);
      if(idx>=0){ pals[idx] = { ...pals[idx], w:52 }; waApplied = true; }
    }
    for(let q=0;q<qty;q++) for(const p of pals) list.push({l:p.l,w:p.w,h:p.h,model:r.model});
    breakdown.push({ model:r.model, qty, palletsEach:pals.length, total:pals.length*qty, wa:!!r.wa, waApplied });
  }
  return { list, breakdown };
}

// ── Render ───────────────────────────────────────────────────────────
function renderTruckOpts(){
  document.getElementById('truckOpts').innerHTML = TRUCKS.map(t=>
    `<button class="truck-btn${t.id===_truckId?' active':''}" onclick="pickTruck('${t.id}')">${t.label}</button>`
  ).join('');
  document.getElementById('customDims').classList.toggle('show', _truckId==='custom');
}
function pickTruck(id){ _truckId=id; renderTruckOpts(); recompute(); }

function renderRows(){
  const opts = MODEL_OPTIONS.map(k=>`<option value="${k}">${k}</option>`).join('');
  document.getElementById('rows').innerHTML = rows.map((r,i)=>`
    <div class="row">
      <select onchange="rows[${i}].model=this.value;recompute()">
        <option value="">— Select model —</option>
        ${opts}
      </select>
      <input class="qty" type="number" min="1" value="${r.qty}" oninput="rows[${i}].qty=this.value;recompute()">
      <label class="wa-toggle" title="Wide Access — swaps one 47&quot; pallet for a 52&quot; pallet"><input type="checkbox" ${r.wa?'checked':''} onchange="rows[${i}].wa=this.checked;recompute()"> WA</label>
      <button class="rm" title="Remove" onclick="rows.splice(${i},1);renderRows();recompute()">&times;</button>
    </div>
  `).join('');
  // set selected model values (can't inline because of quoting on long keys)
  document.querySelectorAll('#rows .row select').forEach((sel,i)=>{ sel.value = rows[i].model || ''; });
}
function addRow(){ rows.push({model:'', qty:1, wa:false}); renderRows(); }

function fmtFt(inches){ return (inches/12).toFixed(1); }

function recompute(){
  const truck = activeTruck();
  const { list, breakdown } = palletsForRows();
  const el = document.getElementById('results');
  if(!list.length || !truck.len){
    el.innerHTML = '<div class="empty">Add at least one booth to see truckloads.</div>';
    return;
  }
  // Color per model (stable, by breakdown order).
  const colorMap = {};
  breakdown.forEach((b,i)=>{ colorMap[b.model] = PALETTE[i % PALETTE.length]; });
  const colorOf = m => colorMap[m] || '#888';

  const bins = packLayout(list, truck);
  const trucks = bins.length;
  const linearTotal = bins.reduce((s,b)=>s+b.used,0);
  const capacity = trucks * truck.len;
  const util = capacity>0 ? (linearTotal/capacity)*100 : 0;
  const oversize = bins.some(b=>b.shelves.some(s=>s.len>truck.len));

  const diagrams = bins.map((b,i)=>drawTruck(b, truck, colorOf, i)).join('');
  const legend = breakdown.map(b=>
    `<span style="display:inline-flex;align-items:center;gap:6px;margin:0 14px 6px 0;font-size:12px">
       <span style="width:12px;height:12px;border-radius:3px;background:${colorOf(b.model)};display:inline-block;flex-shrink:0"></span>${b.model}${b.wa?' <span style="color:var(--orange);font-weight:700">WA</span>':''}</span>`
  ).join('');

  const totalPallets = list.length;
  const rowsHtml = breakdown.map(b=>`<tr>
    <td>${b.model}${b.wa?' <span style="color:var(--orange);font-size:10px;font-weight:700">WA</span>':''}</td><td class="num">${b.qty}</td><td class="num">${b.palletsEach}</td><td class="num">${b.total}</td>
  </tr>`).join('');

  el.innerHTML = `
    <div class="res-grid">
      <div class="stat"><div class="v big">${trucks}</div><div class="l">${truck.label}${trucks===1?'':'s'} needed</div></div>
      <div class="stat"><div class="v">${totalPallets}</div><div class="l">Pallets</div></div>
      <div class="stat"><div class="v">${fmtFt(linearTotal)}<span style="font-size:14px;color:var(--muted)"> ft</span></div><div class="l">Linear feet used</div></div>
      <div class="stat"><div class="v">${util.toFixed(0)}<span style="font-size:14px;color:var(--muted)">%</span></div><div class="l">Avg fill across trucks</div></div>
    </div>
    ${oversize?'<div class="banner">⚠ A pallet is longer than the selected truck — check the truck dimensions.</div>':''}
    <div style="margin:4px 0 12px">${legend}</div>
    ${diagrams}
    <table>
      <thead><tr><th>Model</th><th class="num">Qty</th><th class="num">Pallets ea.</th><th class="num">Total pallets</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div class="note">
      <b>How this is figured:</b> ${truck.label} usable floor ≈ ${fmtFt(truck.len)} ft long × ${truck.width}" wide.
      Pallets are placed side-by-side across the width and may be <b>rotated 90°</b> (⟳) when the long side fits the ${truck.width}" width and turning it saves length.
      Floor space only — <b>no stacking</b>. A pallet can't be split across two trucks, so the truck count rounds up at the pallet, not the foot.
      <b>Wide Access (WA)</b> swaps one 47" pallet for a 52" pallet on that booth. The diagram is a to-scale top-down estimate of one good arrangement; real loadout depends on how the driver builds the load.
    </div>`;
}

// ── Pre-fill from an order (?order=<quoteNumber>) ────────────────────
async function prefillFromOrder(quoteNumber){
  const banner = document.getElementById('prefillBanner');
  try{
    const res = await fetch('/api/orders', { credentials:'include' });
    const data = await res.json();
    const order = (data.orders||[]).find(o=>o.quote_number===quoteNumber);
    if(!order){ banner.style.display='block'; banner.textContent=`Couldn't find order ${quoteNumber} — start from scratch below.`; return; }
    const items = order.json_snapshot?.lineItems || [];
    const counts = {};
    for(const it of items){
      const key = normalizeBoothKey(findBoothKey(it.name || it.productName));
      if(!key) continue;
      counts[key] = (counts[key]||0) + (parseInt(it.qty)||1);
    }
    rows = Object.entries(counts).map(([model,qty])=>({model,qty,wa:false}));
    if(!rows.length){ rows=[{model:'',qty:1,wa:false}]; }
    const co = order.company || order.json_snapshot?.customer?.company || order.deal_name || quoteNumber;
    banner.style.display='block';
    banner.textContent = `Pre-filled from order ${quoteNumber}${co?` — ${co}`:''}. Adjust below as needed.`;
  }catch(e){
    banner.style.display='block';
    banner.textContent = `Couldn't load order ${quoteNumber} (${e.message}). Start from scratch below.`;
    rows=[{model:'',qty:1}];
  }
}

// ── Init ─────────────────────────────────────────────────────────────
(async function init(){
  renderTruckOpts();
  const orderParam = new URLSearchParams(location.search).get('order');
  if(orderParam){ await prefillFromOrder(orderParam); }
  if(!rows.length) rows=[{model:'',qty:1,wa:false}];
  renderRows();
  recompute();
})();
</script>
