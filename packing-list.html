<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WhisperRoom — Packing List</title>
<link rel="icon" href="/assets/favicon.avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f8;color:#1a1a1a;-webkit-font-smoothing:antialiased;padding:32px 16px}

  /* Each PL block = one printable page (one booth) */
  .pl-page{background:#fff;max-width:980px;margin:0 auto 28px;padding:36px 44px 30px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);position:relative}

  /* Header row: deal ref (L) | centered logo + tagline | date (R) */
  .pl-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:18px;gap:14px}
  .pl-top-left{font-size:12px;font-weight:700;color:#888;letter-spacing:.04em;text-transform:uppercase}
  .pl-top-center{display:flex;flex-direction:column;align-items:center;gap:2px}
  .pl-top-center img{height:54px;display:block}
  .pl-tagline{font-size:9px;font-weight:800;letter-spacing:.28em;color:#1a1a1a;text-transform:uppercase}
  .pl-top-right{text-align:right;font-size:14px;font-weight:700;color:#1a1a1a;font-variant-numeric:tabular-nums}
  .pl-date input{font:inherit;color:inherit;border:1px solid transparent;border-radius:4px;padding:2px 4px;background:transparent;text-align:right;width:130px}
  .pl-date input:hover,.pl-date input:focus{border-color:#ddd;outline:none}

  /* Middle: MDL+totals left, big PACKING LIST + S/N right */
  .pl-mid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:16px;align-items:start}
  .mdl-line{font-size:14px;font-weight:800;color:#1a1a1a;letter-spacing:.01em;margin-bottom:10px;line-height:1.4}
  .mdl-line .sep{color:#ee6216;margin:0 4px;font-weight:700}
  .totals-grid{display:grid;grid-template-columns:auto auto;gap:3px 6px;font-size:12px;color:#1a1a1a;justify-content:start}
  .totals-grid .l{font-weight:700;color:#444}
  .totals-grid .v{font-weight:700;font-variant-numeric:tabular-nums;text-align:right;color:#1a1a1a}

  .pl-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .pl-title{font-size:38px;font-weight:800;color:#1a1a1a;letter-spacing:-.5px;line-height:1;text-align:right}
  .pl-title span{color:#ee6216}
  .sn-row{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:#1a1a1a;letter-spacing:.04em}
  .sn-row .sn-label{color:#ee6216}
  .sn-input{font:inherit;font-weight:800;color:#1a1a1a;border:1px solid transparent;border-bottom:1px solid #ddd;border-radius:0;padding:2px 6px;background:transparent;min-width:170px;text-align:left;letter-spacing:.04em}
  .sn-input:hover,.sn-input:focus{border-bottom-color:#ee6216;outline:none}

  /* Compact cfg strip (no-print) */
  .room-cfg{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:0 0 12px;padding:7px 12px;background:#fafafa;border:1px dashed #eee;border-radius:7px}
  .cfg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;font-weight:600}
  .cfg select{padding:3px 7px;font-size:11px;background:#fff;border:1px solid #ddd;border-radius:5px;color:#1a1a1a;font-family:inherit}
  .cfg-label{font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-right:auto}

  /* PL table */
  table.pl{width:100%;border-collapse:collapse;font-size:11px}
  table.pl thead tr.group th{background:#1a1a1a;color:#fff;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 5px;text-align:center;border-right:1px solid #2a2a2a}
  table.pl thead tr.group th:last-child{border-right:none}
  table.pl thead tr.units th{background:#262626;color:#cfcfcf;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 5px;text-align:center;border-right:1px solid #333}
  table.pl thead tr.units th.l{text-align:left;padding-left:9px}
  table.pl thead tr.units th:last-child{border-right:none}
  table.pl tbody td{padding:5px 5px;border-bottom:1px solid #f0f0f0;font-variant-numeric:tabular-nums;text-align:center}
  table.pl tbody td.l{text-align:left;padding-left:9px}
  table.pl tbody td.code{font-family:ui-monospace,Menlo,monospace;font-weight:700;color:#1a1a1a}
  table.pl tbody td.pack{font-family:ui-monospace,Menlo,monospace;color:#444}
  table.pl tbody td.desc{color:#333;font-weight:500}
  table.pl tbody tr:hover td{background:#fafafa}
  table.pl tbody tr.alt td{background:#fcfbf9}
  table.pl tbody tr.alt:hover td{background:#fafafa}
  td.idx{color:#888;font-weight:700;width:28px}
  td.unknown{color:#dc2626}
  .rm-row{color:#bbb;cursor:pointer;border:none;background:none;font-size:14px;padding:0 4px;line-height:1}
  .rm-row:hover{color:#dc2626}
  /* Tighten numeric columns (nowrap) so Package Contents gets the slack */
  table.pl tbody td{white-space:nowrap;padding-left:4px;padding-right:4px}
  table.pl td.l{padding-left:9px}
  table.pl td.desc{white-space:normal;width:99%}
  /* Inline-editable cells (override desc / weight / dims / code) */
  table.pl td.edit{cursor:text}
  table.pl td.edit:hover{background:#fff7ed;box-shadow:inset 0 0 0 1px #f3d4b3}
  table.pl td.edit:focus{background:#fff;box-shadow:inset 0 0 0 2px #ee6216;outline:none}
  @media print{ table.pl td.edit{box-shadow:none;background:transparent} }

  /* Tab bar — switches between PL table and top-down layout */
  .pl-tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid #e6e6e6}
  .pl-tab{padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:#fafafa;border:1px solid #e6e6e6;border-bottom:none;border-radius:7px 7px 0 0;color:#888;cursor:pointer;font-family:inherit;margin-bottom:-1px}
  .pl-tab:hover{color:#1a1a1a;background:#fff}
  .pl-tab.active{color:#1a1a1a;background:#fff;border-bottom:1px solid #fff;box-shadow:0 -2px 0 #ee6216 inset}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* Layout view */
  .layout-wrap{padding:12px 0 0}
  .layout-empty{padding:60px 24px;text-align:center;color:#888;font-size:13px;background:#fafafa;border:1px dashed #ddd;border-radius:8px}
  .layout-title{text-align:center;font-size:12px;color:#555;margin-bottom:8px;font-weight:600}
  .layout-title .layout-sub{color:#ee6216;font-weight:700;font-size:10px;border:1px solid rgba(238,98,22,.4);border-radius:4px;padding:1px 5px;margin-left:5px;letter-spacing:.04em}
  .layout-legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:12px;font-size:11px;color:#555;align-items:center}
  .layout-legend .ld-sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.25)}
  .layout-legend .ld-hint{color:#ee6216;font-weight:600}
  /* Drag-to-rearrange: only panels take pointer events; decorations are inert
     so elementFromPoint always resolves the panel under the cursor. */
  .ld-svg *{pointer-events:none}
  .ld-svg .ld-panel{pointer-events:auto;cursor:grab}
  .ld-svg .ld-panel *{pointer-events:auto}
  .ld-panel:hover .ld-wall{filter:brightness(1.5)}
  .ld-panel.ld-target .ld-wall{stroke:#ee6216;stroke-width:2.4}
  .ld-panel.ld-bad .ld-wall{stroke:#dc2626;stroke-width:2.4;stroke-dasharray:4 3}
  .ld-panel.ld-grabbing .ld-wall{filter:brightness(1.7);stroke:#ee6216;stroke-width:2}
  body.ld-dragging{cursor:grabbing;user-select:none;-webkit-user-select:none}
  .ld-ghost{position:fixed;z-index:9999;pointer-events:none;display:flex;align-items:center;gap:7px;padding:5px 10px;background:#1a1a1a;color:#fff;border:1px solid #555;border-radius:8px;font-size:11px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .ld-ghost.ok{border-color:#ee6216}
  .ld-ghost.bad{border-color:#dc2626}
  .ld-ghost.bad::after{content:'✕ wrong size';color:#f87171;font-weight:600;margin-left:2px}
  .ld-ghost .c{color:#ee6216;font-family:ui-monospace,Menlo,monospace}
  /* Stacked views: top-down first, rotatable elevation below it */
  .ld-views{display:flex;flex-direction:column;gap:14px}
  .ld-view-cap{display:flex;align-items:center;justify-content:center;gap:10px;font-size:10px;font-weight:800;letter-spacing:.12em;color:#9097a0;margin:2px 0 4px;min-height:24px}
  .ld-rot{border:1px solid #d5d8dd;background:#fff;border-radius:6px;width:26px;height:22px;font-size:10px;color:#4a4f57;cursor:pointer;line-height:1;font-family:inherit}
  .ld-rot:hover{background:#fff4ee;border-color:#ee6216;color:#ee6216}
  @media print{ .ld-hint{display:none} }

  /* Add-row footer (no-print) */
  .room-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0 0;flex-wrap:wrap}
  .addrow{display:flex;gap:6px;align-items:center}
  .addrow input{padding:4px 8px;font-size:11px;background:#fff;border:1px solid #ddd;border-radius:5px;color:#1a1a1a;font-family:inherit;min-width:160px}
  .add-btn{padding:5px 11px;background:rgba(238,98,22,.1);color:#ee6216;border:1px solid rgba(238,98,22,.35);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;text-transform:uppercase}
  .add-btn:hover{background:rgba(238,98,22,.18)}
  /* 4016 jamb-adapter door-side toggle (no-print) */
  .jamb-toggle{display:inline-flex;align-items:center;gap:6px;margin-left:auto;background:#fafafa;border:1px solid #eee;border-radius:7px;padding:3px 7px}
  .jamb-label{font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.06em}
  .jamb-btn{padding:4px 11px;font-size:11px;font-weight:700;border:1px solid #ddd;background:#fff;color:#888;border-radius:5px;cursor:pointer;font-family:inherit}
  .jamb-btn.active{background:#ee6216;border-color:#ee6216;color:#fff}

  /* Page footer */
  .pl-foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#888}
  .pl-foot .pn{font-weight:700;color:#1a1a1a}

  /* Flags / not found */
  .flags{margin:14px 0 0;padding:9px 13px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.4);border-radius:7px;font-size:11px;color:#5a3a18;line-height:1.5}
  .flags b{color:#b45309}
  .flags .ft{display:inline-block;background:#fff;border:1px solid #eee;border-radius:5px;padding:2px 7px;margin:3px 4px 0 0;font-size:11px;color:#444}
  .notfound{margin:14px 0 0;padding:10px 13px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.35);border-radius:7px;font-size:11.5px;color:#b91c1c}

  /* Print bar / back link */
  .print-bar{position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:10}
  .print-bar button{padding:8px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:inherit}
  .print-bar button:hover{background:#333}
  .back-link{position:fixed;top:14px;left:14px;padding:8px 14px;background:#1a1a1a;color:#fff;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;text-decoration:none;font-family:inherit;z-index:10}
  .back-link:hover{background:#333;color:#fff}
  .loading,.empty{padding:46px;text-align:center;color:#888;font-size:13px}
  /* Weight cross-check banner (quote catalog weight vs PL summed weight) */
  .weight-check{max-width:980px;margin:0 auto 18px;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;line-height:1.5}
  .weight-check.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.4);color:#15803d}
  .weight-check.warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.55);color:#92580a}
  .weight-check b{font-weight:800;white-space:nowrap}

  @media print {
    body{background:#fff;padding:0}
    .pl-page{box-shadow:none;border-radius:0;max-width:100%;padding:24px 32px;margin:0;page-break-after:always}
    .pl-page:last-child{page-break-after:auto}
    .print-bar,.back-link,.no-print{display:none !important}
    .room-cfg,.room-foot,.pl-tabs{display:none}
    /* On print, force PL tab visible no matter which tab is selected */
    .tab-panel[data-tab="pl"]{display:block !important}
    .tab-panel[data-tab="layout"]{display:none !important}
    table.pl thead tr.group th{background:#1a1a1a !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    table.pl thead tr.units th{background:#262626 !important;color:#cfcfcf !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    table.pl tbody tr.alt td{background:#fcfbf9 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
  <a class="back-link no-print" href="/orders">&larr; Orders</a>
  <div class="print-bar no-print">
    <span id="snStatus" style="font-size:11px;font-weight:700;align-self:center;color:#888"></span>
    <button onclick="loadPL()">&#8635; Refresh</button>
    <button onclick="window.print()" style="background:#ee6216">&#128424; Print</button>
  </div>

  <div id="rooms"><div class="pl-page"><div class="loading">Loading packing list…</div></div></div>

<script>
  let DATA = null;
  let COMPONENTS = {};
  let serialLines = [];   // order_data.serialNumber split by line; booth ri ↔ line ri (two-way w/ Orders drawer)
  let _snTimer = null;
  let jambSides = [];     // per-booth 4016 jamb-adapter side: 'R' = Z20 (T/R, default), 'L' = Z21 (T/L)
  const quoteNumber = decodeURIComponent((location.pathname.match(/\/pl\/(.+)$/) || [])[1] || '').replace(/\/+$/, '');

  // Open the shipping-label print view for a SINGLE booth (room index) in a new tab.
  function openLabels(t, room) {
    let url = '/pl/' + encodeURIComponent(quoteNumber) + '/labels?type=' + t;
    if (room != null) url += '&room=' + room;
    window.open(url, '_blank', 'noopener');
  }

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtN = (n, d=2) => n==null ? '—' : Number(n).toLocaleString(undefined,{minimumFractionDigits:d, maximumFractionDigits:d});
  const inToM = inches => (inches==null) ? null : Math.round(inches * 0.0254 * 100) / 100;
  const lbToKg = lb => (lb==null) ? null : Math.round(lb * 0.453592 * 100) / 100;
  const cuFtPerItem = (L, W, T) => (L==null||W==null||T==null) ? 0 : (L * W * T) / 1728;
  const cuFtToCuM = cf => Math.round(cf * 0.0283168 * 100) / 100;
  const todayShort = () => {
    const d = new Date();
    return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
  };

  // ── Top-down booth layouts ─────────────────────────────────────
  // Layouts live in lib/pl-data/booth-layouts.json and ship with the PL
  // API response under DATA.layouts (only the layouts referenced by this
  // quote's rooms are sent). Variant fallback (4872 E → 4872 S layout) is
  // handled server-side; the frontend just looks up by full booth name.
  //
  // Slot semantics (mirrored from the JSON schema):
  //   - `size`     — wall panel width in inches (matches STDWL{size})
  //   - `family`   — STDWL{N} family string used to filter the BOM pool
  //   - `prefers`  — ordered list of preferred kinds (VNT/DRFRM/WDO/CBL/SOLID)
  // Wall sides: N = back (vent), S = front (door), E = right, W = left.

  function classifyWall(pack) {
    pack = String(pack || '');
    if (/^WA\s+STDDRFRM/i.test(pack)) return 'DRFRM';   // WA doorframe variant
    if (/DRFRM/i.test(pack))          return 'DRFRM';
    if (/WDO/i.test(pack))            return 'WDO';
    if (/CBL/i.test(pack))            return 'CBL';
    if (/VNT/i.test(pack))            return 'VNT';
    return 'SOLID';
  }

  // Effective interior width of a wall panel, in inches, for the slot it
  // occupies. STDWL{N} packs encode it directly. WA STDDRFRM is 49". Z02
  // ships TWO walls in one pack (a 7" + a 16") — when it occupies the narrow
  // slot in a 40"-wall WA Door booth, the 7" piece is what sits in that
  // slot; the 16" piece ships in the same box but installs on the opposite
  // long side. Null means "unknown, fall back to slot nominal".
  function panelInteriorWidth(pack) {
    pack = String(pack || '');
    if (/^(FR\s+)?(WA\s+|ADA\s+)?STDDRFRM/i.test(pack)) return 49;   // WA/ADA/FR doorframe walls
    if (/^STDWL\s*7\s*\/\s*WL?16/i.test(pack)) return 7;   // Z02 bundle in the 7" slot
    const m = pack.match(/^(?:FR\s+)?STDWL(\d+)/i);
    return m ? parseInt(m[1], 10) : null;
  }
  function effectiveSlotSize(slot, placedLine) {
    if (placedLine) {
      const w = panelInteriorWidth(placedLine.pack);
      if (w != null) return w;
    }
    return slot.size;
  }

  // Is this BOM line an outer-shell wall panel that occupies a slot in the
  // top-down layout? STDWL{N} family covers stock walls + STD doors/vents/
  // windows/cable variants. WA STDDRFRM (Z03/Z04) is a size-agnostic WA
  // doorframe that fits any DRFRM slot — the Z25/Z120 adapter handles wall-
  // size compatibility separately, so we accept it as a wall panel regardless
  // of size. The door panel itself (C113/C115/Z05/Z06) is NOT a wall — it
  // hangs inside the doorframe slot, so we exclude it.
  function isWallPanel(pack) {
    pack = String(pack || '');
    if (/STD\s*DOOR/i.test(pack))            return false;   // C113/C115/Z05/Z06/Z32-33 (the swinging panel)
    if (/\bIN\s+(STD)?DRFRM/i.test(pack))    return false;   // inner-shell frames (IEP IN DRFRM / ADA IN STDDRFRM)
    if (/DRFRM\s+ADAPT/i.test(pack))         return false;   // Z25/Z120/Z37/Z38 jamb adapters — hardware, not a wall
    // exterior door-frame walls: STDWL46 DRFRM R, WA STDDRFRM R, ADA STDDRFRM L, FR variants
    if (/^(FR\s+)?(WA\s+|ADA\s+)?STDDRFRM/i.test(pack)) return true;
    return /^(FR\s+)?STDWL\d+/i.test(pack);
  }

  // Build a regex matching any of the slot's accepted family prefixes (e.g.
  // ["STDWL22","STDWL19"] → /^(STDWL22|STDWL19)(\s|$)/i). Each family is
  // prefix-matched against the pack name; the next char must be whitespace
  // or end-of-string so STDWL16 doesn't accidentally match STDWL164.
  function slotFamilyRegex(slot) {
    // Backward-compat: accept a single `family` string if `families` missing.
    const families = slot.families || (slot.family ? [slot.family] : ['STDWL' + slot.size]);
    const escaped = families.map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    return new RegExp('^(?:' + escaped.join('|') + ')(?:\\s|$)', 'i');
  }

  // Greedy auto-placement: walk slots N → S → E → W; for each, pick the best
  // matching wall line from the BOM pool. A slot's `families` list controls
  // which pack prefixes it accepts (e.g. the narrow slot accepts both STDWL22
  // AND STDWL19 so the WA shrink doesn't fall out). Preference order: a pack
  // that classifies as the slot's first `prefers` kind wins, then second, etc.;
  // fallbacks are SOLID-within-family, then any-within-family. One line/slot.
  // Placement: kind-preference + closest-width, two passes. Pass 1 fills the
  // special slots (vent/door/window) with a BOM panel of the matching kind;
  // pass 2 fills the rest by closest width. NV booths (no vent pack) leave the
  // vent slots for pass 2 to fill with a solid — exactly right for SNV/ENV.
  function placeBom(layout, lines) {
    const pool = (lines || []).filter(l => isWallPanel(l.pack)).map(l => ({
      line: l, used: false, kind: classifyWall(l.pack), w: panelInteriorWidth(l.pack),
    }));
    const placement = {};
    const pick = (pred, size) => {
      let best = null, bd = Infinity;
      for (const p of pool) {
        if (!pred(p)) continue;
        const w = (p.w == null ? size : p.w);
        const d = Math.abs(w - size);
        if (d < bd) { bd = d; best = p; }
      }
      return best;
    };
    const sides = ['N', 'S', 'E', 'W'];
    for (const side of sides) {                       // pass 1 — special kinds
      const wall = layout.walls[side]; if (!wall) continue;
      for (const slot of wall.slots) {
        const want = (slot.prefers && slot.prefers[0]) || 'SOLID';
        if (want === 'SOLID') continue;
        const c = pick(p => !p.used && p.kind === want, slot.size);
        if (c) { c.used = true; placement[slot.id] = c.line; }
      }
    }
    for (const side of sides) {                       // pass 2 — closest width
      const wall = layout.walls[side]; if (!wall) continue;
      for (const slot of wall.slots) {
        if (placement[slot.id]) continue;
        const want = (slot.prefers && slot.prefers[0]) || 'SOLID';
        const c = pick(p => !p.used && p.kind === want, slot.size)
               || pick(p => !p.used && p.kind === 'SOLID', slot.size)
               || pick(p => !p.used, slot.size);
        if (c) { c.used = true; placement[slot.id] = c.line; }
      }
    }
    const leftover = pool.filter(p => !p.used).map(p => p.line);
    return { placement, leftover };
  }

// Friendly type names for the panel + legend.
  const KIND_META = {
    SOLID: { label: 'Wall',        accent: null },
    VNT:   { label: 'Ventilation', accent: '#6aa9d6' },
    CBL:   { label: 'Cable',       accent: '#6aa9d6' },
    DRFRM: { label: 'Door',        accent: '#ee6216' },
    WDO:   { label: 'Window',      accent: '#9ec4e6' },
    EMPTY: { label: '',            accent: null },
  };

  // ── The renderer ──────────────────────────────────────────────────
  function renderLayoutSvg(layout, assign) {
    const ext = layout.exterior;

    const PX = Math.max(3, Math.min(600 / ext.w, 470 / ext.h, 11));
    const W = ext.w * PX, H = ext.h * PX, t = layout.wallThickness * PX;
    const VPROT = 5.5;        // a vent set protrudes 5.5″ beyond its wall (spec)
    const VOUT = VPROT * PX;  // drawn at TRUE scale so the "w/ vent" dim reads honestly
    const DOORR = 92;         // max door-swing radius (px symbol)

    // (not hard-coded to S/N), so a dragged door or vent draws its swing/ducts on
    // whatever wall it now sits on, and the margins expand to fit.
    const sideHasDoor = { N: false, S: false, E: false, W: false };
    const sideHasVent = { N: false, S: false, E: false, W: false };
    for (const sd of ['N', 'S', 'E', 'W']) for (const slot of ((layout.walls[sd] || { slots: [] }).slots)) {

    const extra = sd => sideHasDoor[sd] ? DOORR + 10 : (sideHasVent[sd] ? VOUT + 18 : 0);

    const ventDimL = (sideHasVent.N || sideHasVent.S) ? 28 : 0;
    const ventDimB = (sideHasVent.E || sideHasVent.W) ? 28 : 0;
    const mTop = BASE + extra('N'), mBottom = BASE + extra('S') + ventDimB, mLeft = BASE + extra('W') + ventDimL, mRight = BASE + extra('E');
    const x0 = mLeft, y0 = mTop;
    const totalW = W + mLeft + mRight, totalH = H + mTop + mBottom;
  
    let s = `<svg class="ld-svg" viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="xMidYMid meet" `

      + `<linearGradient id="ldBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0f3"/><stop offset="1" stop-color="#f8f9fa"/></linearGradient>`
      + `<pattern id="ldCarpet" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="7" height="7" fill="#6d6d6b"/><rect width="7" height="1" fill="#656563"/><rect width="1" height="7" fill="#757573"/></pattern>`

      + `<filter id="ldShadow" x="-15%" y="-15%" width="130%" height="135%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5a5f66" flood-opacity="0.35"/></filter>`
      + `</defs>`;
  
    s += `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="url(#ldBg)"/>`;
  
    // Booth shell shadow + carpet floor
    s += `<rect x="${x0}" y="${y0}" width="${W}" height="${H}" rx="2" fill="#2a2b30" filter="url(#ldShadow)"/>`;
    s += `<rect x="${x0 + t}" y="${y0 + t}" width="${W - 2 * t}" height="${H - 2 * t}" fill="url(#ldCarpet)"/>`;
    s += `<rect x="${x0 + t}" y="${y0 + t}" width="${W - 2 * t}" height="${H - 2 * t}" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="1"/>`;
  
    // ── foam lining + seam seals ────────────────────────────────────
    // Foam lining = a fine, subtle sawtooth along each interior wall face (the
    // acoustic wedge — NOT a seal). Seam seals are the bold connectors:
    //   • panel-joint seal: an I-beam — the seam line running wall-to-wall with a
    //     bar cap where it meets each wall (the "T" you see in the spec); and
    //   • corner seal: an L-bracket hugging each of the four interior corners.
    const FOAM = '#2c2d33';
    const SEAL = '#0d0e11';
    function foamComb(ax, ay, bx, by, nx, ny) {
      const len = Math.hypot(bx - ax, by - ay); if (len < 4) return '';
      const ux = (bx - ax) / len, uy = (by - ay) / len;
      const teeth = Math.max(4, Math.round(len / 5));
      const tw = len / teeth, dep = Math.min(4, Math.max(2.5, t * 0.4));
      let g = '';
      for (let i = 0; i < teeth; i++) {
        const sx = ax + ux * tw * i,         sy = ay + uy * tw * i;
        const mx = ax + ux * tw * (i + 0.5), my = ay + uy * tw * (i + 0.5);
        const ex = ax + ux * tw * (i + 1),   ey = ay + uy * tw * (i + 1);
        g += `<path d="M ${sx} ${sy} L ${mx + nx * dep} ${my + ny * dep} L ${ex} ${ey} Z" fill="${FOAM}"/>`;

      return g;
    }
    const SEAL_STROKE = '#0d0e11';
    const SEAL_HALO = 'rgba(238,239,242,0.85)';   // light halo so the dark speckle pops off the carpet
    // glyph scale follows the wall-band thickness so seals stay legible on big booths
    const SG = Math.max(10, Math.min(t, 20));
    const sealPoly = pts => `<polygon points="${pts}" stroke="${SEAL_HALO}" stroke-width="4.5" stroke-linejoin="round" fill="none"/>`

    // mid-wall seam seal: a T-profile at each panel joint — the STEM sits in
    // the joint BETWEEN the two wall panels (the panels butt into it), spanning
    // the full wall thickness; the CAP bar sits proud of the exterior face,
    // covering the joint. (jx,jy = joint on the exterior face; nx,ny = outward
    // normal.) Per Benton 2026-06-09: the old plinth pointed the tab outward —
    // the real seal's tab runs through the wall, with the walls butting into it.
    function midSeal(jx, jy, nx, ny) {
      const tx = -ny, ty = nx;                 // tangent = along the wall
      const capHalf = SG * 1.5, capDepth = SG * 0.45, stemHalf = SG * 0.22;
      const P = (a, n) => (jx + tx * a + nx * n) + ',' + (jy + ty * a + ny * n);
      const pts = [
        P(-capHalf, capDepth), P(capHalf, capDepth), P(capHalf, 0), P(stemHalf, 0),
        P(stemHalf, -t), P(-stemHalf, -t), P(-stemHalf, 0), P(-capHalf, 0),

    // corner seam seal: a filled L-bracket hugging an interior corner, with a

    // (ax,ay)/(bx,by) = the two along-wall unit directions away from the corner.
    function cornerSeal(cx, cy, ax, ay, bx, by) {

      const P = (a, b) => (cx + a * ax + b * bx) + ',' + (cy + a * ay + b * by);

        P(ch, 0), P(L, 0), P(L, Tk), P(Tk, Tk), P(Tk, L), P(0, L), P(0, ch),

    }
    function seamPieces() {
      const fx0 = x0 + t, fy0 = y0 + t, fx1 = x0 + W - t, fy1 = y0 + H - t;
      const spanW = W - 2 * t, spanH = H - 2 * t;
      let g = '';
      // foam lining on the four interior faces (the sawtooth in the spec views)
      g += foamComb(fx0, fy0, fx1, fy0, 0, 1) + foamComb(fx0, fy1, fx1, fy1, 0, -1)
         + foamComb(fx0, fy0, fx0, fy1, 1, 0) + foamComb(fx1, fy0, fx1, fy1, -1, 0);

      // wall's own slot widths, mounted on the EXTERIOR face with the tab
      // protruding outward (matches the spec-sheet top-down views).
      for (const side of ['N', 'S', 'E', 'W']) {
        const wall = layout.walls[side]; if (!wall || wall.slots.length < 2) continue;
        const nom = wall.slots.reduce((a, sl) => a + sl.size, 0) || 1;
        const horiz = (side === 'N' || side === 'S');

          const f = o / nom;

            g += midSeal(x, side === 'N' ? y0 : y0 + H, 0, side === 'N' ? -1 : 1);

      const o2 = SG * 0.35;
      g += cornerSeal(x0 - o2,     y0 - o2,     1, 0, 0, 1) + cornerSeal(x0 + W + o2, y0 - o2,     -1, 0, 0, 1)
         + cornerSeal(x0 - o2,     y0 + H + o2, 1, 0, 0, -1) + cornerSeal(x0 + W + o2, y0 + H + o2, -1, 0, 0, -1);

    }
  
    // Outer-edge midpoint + outward/along unit vectors for a panel on `side`.
    function edgeGeom(side, px, py, pw, ph) {
      if (side === 'N') return { omx: px + pw / 2, omy: py,      ox: 0, oy: -1, ax: 1, ay: 0, horiz: true };
      if (side === 'S') return { omx: px + pw / 2, omy: py + ph, ox: 0, oy: 1,  ax: 1, ay: 0, horiz: true };
      if (side === 'W') return { omx: px,          omy: py + ph / 2, ox: -1, oy: 0, ax: 0, ay: 1, horiz: false };
      return            { omx: px + pw, omy: py + ph / 2, ox: 1, oy: 0, ax: 0, ay: 1, horiz: false };
    }
  
    // ── vent assembly: TWO boxes (one plain, one with a fan), spread along the
    // wall, protruding OUTWARD from whatever wall holds the vent. The outward
    // depth is exactly 5.5″ at scale (VOUT) so the drawn footprint matches the
    // "w/ vent" dimension line. ──
    function ventDuct(side, px, py, pw, ph) {
      const { omx, omy, ox, oy, ax, ay, horiz } = edgeGeom(side, px, py, pw, ph);
      const panelLen = horiz ? pw : ph;
      const B = Math.max(18, Math.min(panelLen * 0.30, 44));   // along-wall width scales with the panel
      const G = Math.max(7, B * 0.4), PL = 4;

      else       g += `<rect x="${ox < 0 ? omx - PL : omx}" y="${omy - plate / 2}" width="${PL}" height="${plate}" rx="1.5" fill="#3a3b42"/>`;
      for (const k of [-1, 1]) {
        const ccx = omx + ax * k * off, ccy = omy + ay * k * off;
        const rx = horiz ? (ccx - B / 2) : (ox < 0 ? omx - VOUT : omx);
        const ry = horiz ? (oy < 0 ? omy - VOUT : omy) : (ccy - B / 2);
        const bw = horiz ? B : VOUT, bh = horiz ? VOUT : B;
        g += `<rect x="${rx}" y="${ry}" width="${bw}" height="${bh}" rx="2" fill="#34363d" stroke="#1b1c20" stroke-width="1"/>`;
        if (k === 1) {   // fan box
          const fr = Math.min(bw, bh);
          g += `<circle cx="${rx + bw / 2}" cy="${ry + bh / 2}" r="${fr * 0.32}" fill="#22242a" stroke="#54585f" stroke-width="0.9"/>`;
          g += `<circle cx="${rx + bw / 2}" cy="${ry + bh / 2}" r="${fr * 0.11}" fill="#62666f"/>`;
        } else {         // plain box (no hole) — same box, just an inset panel line

    // ── door: closed light leaf on the OUTER face (hinge dots + handle, like

      const { omx, omy, ox, oy, ax, ay, horiz } = edgeGeom(side, px, py, pw, ph);

      // the dashed arc sweeps only until it protrudes DOORR px (≈ the spec's

      const leafW = Math.min(swingIn * PX, (horiz ? pw : ph) * 0.94);

        const d2x = hx + ax * leafW * f + ox * DL * 0.68, d2y = hy + ay * leafW * f + oy * DL * 0.68;
        g += `<circle cx="${d1x}" cy="${d1y}" r="1.3" fill="#26272c"/><circle cx="${d2x}" cy="${d2y}" r="1.3" fill="#26272c"/>`;
      }
      const hbx = cX - ax * leafW * 0.06, hby = cY - ay * leafW * 0.06;   // handle base on the leaf
      g += `<line x1="${hbx + ox * DL * 0.5}" y1="${hby + oy * DL * 0.5}" x2="${hbx + ox * (DL + 5)}" y2="${hby + oy * (DL + 5)}" stroke="#26272c" stroke-width="2" stroke-linecap="round"/>`;
      g += `<line x1="${hbx + ox * (DL + 5)}" y1="${hby + oy * (DL + 5)}" x2="${hbx + ox * (DL + 5) - ax * 7}" y2="${hby + oy * (DL + 5) - ay * 7}" stroke="#26272c" stroke-width="2" stroke-linecap="round"/>`;
      return g;
    }
  
    // ── draw one wall side's panels ─────────────────────────────────
    const vents = [];   // {side,px,py,pw,ph} — drawn after walls
    let door = null;    // {side,px,py,pw,ph,swing}
  
    function drawWall(side) {
      const wall = layout.walls[side]; if (!wall) return '';
      const horiz = (side === 'N' || side === 'S');
      const span = horiz ? (W - 2 * t) : (H - 2 * t);
      const nominal = wall.slots.reduce((a, sl) => a + sl.size, 0) || 1;
      const scale = span / nominal;
      let off = 0, g = '';
      for (const slot of wall.slots) {
        const line = assign[slot.id];
        const kind = line ? classifyWall(line.pack) : 'EMPTY';
        const meta = KIND_META[kind] || KIND_META.EMPTY;
        const len = slot.size * scale;

        let px, py, pw, ph;
        if (side === 'N') { px = x0 + t + off; py = y0;             pw = len; ph = t; }
        else if (side === 'S') { px = x0 + t + off; py = y0 + H - t; pw = len; ph = t; }
        else if (side === 'W') { px = x0;          py = y0 + t + off; pw = t; ph = len; }

        const HP = 15;

        else if (side === 'S') { hy = py - HP; hh = ph + HP; }
        else if (side === 'W') { hw = pw + HP; }
        else                   { hx = px - HP; hw = pw + HP; }
        g += `<rect class="ld-hit" x="${hx}" y="${hy}" width="${hw}" height="${hh}" fill="#000" fill-opacity="0" style="pointer-events:all"/>`;

        // the real product — the spec-sheet top-downs draw them identically).
        g += `<rect class="ld-wall" x="${px}" y="${py}" width="${pw}" height="${ph}" fill="url(#ldSeal)" stroke="#15161a" stroke-width="0.8"/>`;
        // interior bevel highlight
        g += `<rect x="${px + 0.6}" y="${py + 0.6}" width="${pw - 1.2}" height="${ph - 1.2}" fill="none" stroke="#4a4c55" stroke-opacity="0.5" stroke-width="0.6"/>`;
        // kind accent line on the interior edge
        if (meta.accent) {

          else if (side === 'S') g += `<rect x="${px + 1}" y="${py + 0.4}" width="${pw - 2}" height="1.6" fill="${meta.accent}" opacity="0.8"/>`;
          else if (side === 'W') g += `<rect x="${px + pw - 2}" y="${py + 1}" width="1.6" height="${ph - 2}" fill="${meta.accent}" opacity="0.8"/>`;

          else       g += `<rect x="${px + pw * 0.28}" y="${py + ph * 0.2}" width="${pw * 0.44}" height="${ph * 0.6}" fill="#9ec4e6" opacity="0.8" rx="1"/>`;

        g += `</g>`;

    function panelLabel(side, px, py, pw, ph, kind, line, slot) {

      const horiz = (side === 'N' || side === 'S');

      const pad = 13;
      if (side === 'N') { lx = px + pw / 2; ly = py + t + pad; }
      else if (side === 'S') { lx = px + pw / 2; ly = py - 7; }
      else if (side === 'W') { lx = px + t + 7; ly = py + ph / 2; anchor = 'start'; rot = 0; }
      else { lx = px - 7; ly = py + ph / 2; anchor = 'end'; }

      const wIn = line ? (panelInteriorWidth(line.pack) != null ? panelInteriorWidth(line.pack) : slot.size) : slot.size;
      const typ = kind === 'EMPTY' ? '(empty)' : (wIn + '″ ' + meta.label);

      let out = `<text x="${lx}" y="${ly}" text-anchor="${anchor}" font-size="9.5" font-weight="700" fill="${col}" opacity="0.92" style="pointer-events:none">${esc(typ)}</text>`;
      if (line && line.code) {
        const cy2 = (side === 'S') ? ly - 10 : ly + 11;
        out += `<text x="${lx}" y="${cy2}" text-anchor="${anchor}" font-size="8" fill="#cfd3da" opacity="0.7" style="pointer-events:none">${esc(line.code)}</text>`;

    // ── dimension lines (exterior) ──────────────────────────────────
    function tick(x, y, vert) {

                  : `<line x1="${x}" y1="${y - 4}" x2="${x}" y2="${y + 4}" stroke="#9097a0" stroke-width="1"/>`;
    }
    const dimY = y0 + H + extra('S') + 24;
    s += `<line x1="${x0}" y1="${dimY}" x2="${x0 + W}" y2="${dimY}" stroke="#9097a0" stroke-width="1"/>`;
    s += tick(x0, dimY, false) + tick(x0 + W, dimY, false);
    s += `<rect x="${x0 + W / 2 - 24}" y="${dimY - 9}" width="48" height="16" rx="3" fill="url(#ldBg)"/>`;
    s += `<text x="${x0 + W / 2}" y="${dimY + 3}" text-anchor="middle" font-size="11" font-weight="700" fill="#4a4f57">${ext.w}″</text>`;
    const dimX = x0 - extra('W') - 24;
    s += `<line x1="${dimX}" y1="${y0}" x2="${dimX}" y2="${y0 + H}" stroke="#9097a0" stroke-width="1"/>`;
    s += tick(dimX, y0, true) + tick(dimX, y0 + H, true);
    s += `<rect x="${dimX - 8}" y="${y0 + H / 2 - 9}" width="16" height="18" fill="url(#ldBg)"/>`;
    s += `<text x="${dimX}" y="${y0 + H / 2}" text-anchor="middle" font-size="11" font-weight="700" fill="#4a4f57" transform="rotate(-90 ${dimX} ${y0 + H / 2})">${ext.h}″</text>`;
  
    // ── "w/ vent" overall dims ──────────────────────────────────────
    // A vent set adds 5.5″ to the axis it protrudes on: a 4872 with the vent on
    // the 72″ wall has a 50″ exterior side that totals 55.5″ overall. Drawn only
    // on axes that actually carry a vent, and follows a dragged vent to its new
    // wall. Spans wall face → duct outer face (the ducts are drawn at true scale).
    const VDIM = '#c9762e';
    const fmtIn = v => String(Math.round(v * 2) / 2);
    const vtick = (x, y, vert) =>
      vert ? `<line x1="${x - 4}" y1="${y}" x2="${x + 4}" y2="${y}" stroke="${VDIM}" stroke-width="1"/>`
           : `<line x1="${x}" y1="${y - 4}" x2="${x}" y2="${y + 4}" stroke="${VDIM}" stroke-width="1"/>`;
    if (sideHasVent.N || sideHasVent.S) {
      const yA = y0 - (sideHasVent.N ? VOUT : 0), yB = y0 + H + (sideHasVent.S ? VOUT : 0);
      const tot = ext.h + (sideHasVent.N ? VPROT : 0) + (sideHasVent.S ? VPROT : 0);
      const vx = dimX - 22, vmy = (yA + yB) / 2;
      s += `<line x1="${vx}" y1="${yA}" x2="${vx}" y2="${yB}" stroke="${VDIM}" stroke-width="1"/>` + vtick(vx, yA, true) + vtick(vx, yB, true);
      s += `<rect x="${vx - 8}" y="${vmy - 40}" width="16" height="80" fill="url(#ldBg)"/>`;
      s += `<text x="${vx}" y="${vmy + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="${VDIM}" transform="rotate(-90 ${vx} ${vmy})">${fmtIn(tot)}″ w/ vent</text>`;
    }
    if (sideHasVent.E || sideHasVent.W) {
      const xA = x0 - (sideHasVent.W ? VOUT : 0), xB = x0 + W + (sideHasVent.E ? VOUT : 0);
      const tot = ext.w + (sideHasVent.W ? VPROT : 0) + (sideHasVent.E ? VPROT : 0);
      const vy = dimY + 34, vmx = (xA + xB) / 2;
      s += `<line x1="${xA}" y1="${vy}" x2="${xB}" y2="${vy}" stroke="${VDIM}" stroke-width="1"/>` + vtick(xA, vy, false) + vtick(xB, vy, false);
      s += `<rect x="${vmx - 40}" y="${vy - 8}" width="80" height="15" rx="3" fill="url(#ldBg)"/>`;
      s += `<text x="${vmx}" y="${vy + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="${VDIM}">${fmtIn(tot)}″ w/ vent</text>`;
    }
  
    // ── interior callout (centered pill) ────────────────────────────
    const cw = 150, chh = 26;
    const ccx = x0 + W / 2, ccy = y0 + H / 2;
    s += `<rect x="${ccx - cw / 2}" y="${ccy - chh / 2}" width="${cw}" height="${chh}" rx="13" fill="rgba(255,255,255,0.92)" stroke="#cfd3da" stroke-width="1"/>`;
    s += `<text x="${ccx}" y="${ccy - 1}" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="0.08em" fill="#8a8f97">INTERIOR</text>`;
    // short axis first — matches the spec sheets ("46″ x 70″") and the model
    // naming convention (4872 = 48″ × 72″)
    s += `<text x="${ccx}" y="${ccy + 10}" text-anchor="middle" font-size="11" font-weight="800" fill="#2a2d33">${interior.h}″ × ${interior.w}″</text>`;
  
    // ── orientation captions (booth orientation is fixed; components can move) ─
    s += `<text x="${x0 + W / 2}" y="${y0 - extra('N') - 8}" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#9097a0">BACK</text>`;
    s += `<text x="${x0 + W / 2}" y="${dimY + 22}" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#9097a0">FRONT</text>`;
  
    s += `</svg>`;
    return s;
  }
  
  // ── Elevation renderer: one wall viewed face-on from OUTSIDE ────────
  // Skeleton of the booth-builder front/side view (plan Phase C): correct
  // proportions and per-panel features — door with window/hinges/handle, wall
  // windows at their real WDO sizes, vent ducts (intake low, exhaust high —
  // "fresh air flows in at the floor and out at the ceiling"), cable passages.
  // `facing` = which exterior wall you're looking at: S front, E right, N back,
  // W left. N and E render mirrored so left/right match what a viewer standing
  // OUTSIDE that wall actually sees. Heights: 83″ standard / 85″ enhanced.
  function renderElevationSvg(layout, assign, facing) {
    const ext = layout.exterior;
    const wall = layout.walls[facing] || { slots: [] };
    const lenIn = (facing === 'N' || facing === 'S') ? ext.w : ext.h;
    const hIn = /^E/i.test(String(layout.variant || 'S')) ? 85 : 83;
    const PX2 = Math.max(2.4, Math.min(340 / lenIn, 280 / hIn, 5.5));
    const Wp = lenIn * PX2, Hp = hIn * PX2;
    // Vents on the walls ADJACENT to the facing wall protrude 5.5″ past the
    // booth edge — from this view you see the SIDE of those duct boxes hanging
    // off the left/right edge. Adjacency respects the viewer's left/right
    // (standing outside the facing wall).
    const ADJ = { S: { left: 'W', right: 'E' }, N: { left: 'E', right: 'W' }, E: { left: 'S', right: 'N' }, W: { left: 'N', right: 'S' } };
    const hasVentOn = sd => {
      if (layout.hasVent === false) return false;
      const w2 = layout.walls[sd]; if (!w2) return false;
      return w2.slots.some(sl => { const ln = assign[sl.id]; return ln && classifyWall(ln.pack) === 'VNT'; });
    };
    const leftVent = hasVentOn(ADJ[facing].left), rightVent = hasVentOn(ADJ[facing].right);
    const VOUT2 = 5.5 * PX2;
    const M = 46;
    const totalW = Wp + M * 2 + (leftVent ? VOUT2 : 0) + (rightVent ? VOUT2 : 0);
    const totalH = Hp + 34 + 30 + ((leftVent || rightVent) ? 16 : 0);
    const x0 = M + (leftVent ? VOUT2 : 0), y0 = 24;
    const gy = y0 + Hp;                          // ground line y
    const iy = v => gy - v * PX2;                // inches above the floor → px
  
    let s = `<svg class="ld-elev-svg" viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="xMidYMid meet" `
          + `style="width:100%;max-width:520px;display:block;margin:0 auto;font-family:'DM Sans',sans-serif">`;
    // same defs/ids as the top-down — identical content, so document-wide id
    // resolution is harmless, and standalone renders still work
    s += `<defs>`
      + `<linearGradient id="ldBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0f3"/><stop offset="1" stop-color="#f8f9fa"/></linearGradient>`
      + `<pattern id="ldSeal" width="5" height="5" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="#54575f"/><circle cx="1.2" cy="1.8" r="0.8" fill="#33353b"/><circle cx="3.7" cy="3.7" r="0.8" fill="#7d818b"/><circle cx="3.6" cy="0.9" r="0.6" fill="#2a2c31"/><circle cx="0.8" cy="4.2" r="0.5" fill="#8a8e98"/></pattern>`
      + `</defs>`;
    s += `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="url(#ldBg)"/>`;
    // ground line + soft shadow
    s += `<ellipse cx="${x0 + Wp / 2}" cy="${gy + 5}" rx="${Wp * 0.55}" ry="5" fill="#5a5f66" opacity="0.16"/>`;
    s += `<rect x="${x0 - 16}" y="${gy}" width="${Wp + 32}" height="1.2" fill="#c4c8ce"/>`;
  
    // slots left→right as seen from outside (N + E mirrored)
    const slots = wall.slots.slice();
    const mirrored = (facing === 'N' || facing === 'E');
    if (mirrored) slots.reverse();
    const nominal = slots.reduce((a, sl) => a + sl.size, 0) || 1;
    const scale = Wp / nominal;
  
    // per-panel features, drawn after all strips + battens
    function elevFeatures(kind, line, sx, w) {
      const cx2 = sx + w / 2;
      let g = '';
      if (kind === 'DRFRM' && line) {
        const frameW = panelInteriorWidth(line.pack) || 46;
        const doorW = (frameW >= 49 ? 32 : Math.max(20, frameW - 16)) * PX2;  // 32″ WA/ADA, 30″ std
        const doorH = 78 * PX2;
        const dx = cx2 - doorW / 2, dy = gy - 2 - doorH;
        let hingeRight = /\sR\b/i.test(line.pack || '');
        if (mirrored) hingeRight = !hingeRight;
        g += `<rect x="${dx}" y="${dy}" width="${doorW}" height="${doorH}" rx="1.5" fill="url(#ldSeal)" stroke="#0d0e11" stroke-width="1.3"/>`;
        g += `<rect x="${dx + 2}" y="${dy + 2}" width="${doorW - 4}" height="${doorH - 4}" fill="none" stroke="#8a8e98" stroke-opacity="0.45" stroke-width="0.7"/>`;
        // door window: WA/ADA 16×48; else 16×30 on 46-module, 12×30 on 40-module
        const wdw = (frameW >= 49 ? 16 : (layout.module === 40 ? 12 : 16)) * PX2;
        const wdh = (frameW >= 49 ? 48 : 30) * PX2;
        g += `<rect x="${cx2 - wdw / 2 - 1.5}" y="${iy(70) - 1.5}" width="${wdw + 3}" height="${wdh + 3}" rx="1.5" fill="#1b1c20"/>`;
        g += `<rect x="${cx2 - wdw / 2}" y="${iy(70)}" width="${wdw}" height="${wdh}" fill="#aecde8"/>`;
        g += `<line x1="${cx2 - wdw / 2 + 2}" y1="${iy(70) + wdh * 0.75}" x2="${cx2 + wdw / 2 - 2}" y2="${iy(70) + wdh * 0.25}" stroke="#fff" stroke-opacity="0.55" stroke-width="1.5"/>`;
        // handle on the latch side (~38″), hinges on the other
        const latchX = hingeRight ? dx + 5 : dx + doorW - 5;
        const hingeX = hingeRight ? dx + doorW : dx;
        g += `<rect x="${latchX - 5}" y="${iy(38) - 1.6}" width="10" height="3.2" rx="1.6" fill="#caccd2" stroke="#6a6e76" stroke-width="0.6"/>`;
        for (const hh of [14, 40, 66])
          g += `<rect x="${hingeX - 1.6}" y="${iy(hh) - 4}" width="3.2" height="8" rx="1" fill="#caccd2" stroke="#6a6e76" stroke-width="0.5"/>`;
        // threshold
        g += `<rect x="${dx - 2}" y="${gy - 3}" width="${doorW + 4}" height="3" fill="#caccd2" stroke="#8a8e98" stroke-width="0.5"/>`;
      } else if (kind === 'WDO' && line) {
        const m2 = String(line.pack || '').match(/WDO\s*(\d{2})(\d{2})/i);
        const ww = (m2 ? +m2[1] : 32) * PX2, wh = (m2 ? +m2[2] : 36) * PX2;
        g += `<rect x="${cx2 - ww / 2 - 2.5}" y="${iy(72) - 2.5}" width="${ww + 5}" height="${wh + 5}" rx="2" fill="#1b1c20"/>`;
        g += `<rect x="${cx2 - ww / 2}" y="${iy(72)}" width="${ww}" height="${wh}" fill="#aecde8"/>`;
        g += `<line x1="${cx2 - ww / 2 + 3}" y1="${iy(72) + wh * 0.8}" x2="${cx2 + ww / 2 - 3}" y2="${iy(72) + wh * 0.2}" stroke="#fff" stroke-opacity="0.55" stroke-width="2"/>`;
      } else if (kind === 'VNT' && layout.hasVent !== false) {
        // intake duct low, exhaust duct high, remote fan unit at the floor
        const dw = 8 * PX2, dh = 30 * PX2;
        g += `<rect x="${sx + w * 0.26 - dw / 2}" y="${iy(34)}" width="${dw}" height="${dh}" rx="1.5" fill="#34363d" stroke="#1b1c20" stroke-width="0.9"/>`;
        g += `<rect x="${sx + w * 0.72 - dw / 2}" y="${iy(76)}" width="${dw}" height="${dh}" rx="1.5" fill="#34363d" stroke="#1b1c20" stroke-width="0.9"/>`;
        g += `<rect x="${sx + w * 0.72 - 3.5 * PX2}" y="${iy(10)}" width="${7 * PX2}" height="${10 * PX2 - 2}" rx="2" fill="#2c2e33" stroke="#1b1c20" stroke-width="0.9"/>`;
        g += `<circle cx="${sx + w * 0.72}" cy="${iy(5.2)}" r="${2.4 * PX2}" fill="#22242a" stroke="#54585f" stroke-width="0.8"/>`;
        g += `<circle cx="${sx + w * 0.72}" cy="${iy(5.2)}" r="${0.8 * PX2}" fill="#62666f"/>`;
      } else if (kind === 'CBL' && line) {
        for (const chh of [14, 64]) {
          g += `<circle cx="${cx2}" cy="${iy(chh)}" r="${2.6 * PX2}" fill="#26282d" stroke="#0d0e11" stroke-width="0.8"/>`;
          g += `<circle cx="${cx2}" cy="${iy(chh)}" r="${1.1 * PX2}" fill="#0d0e11"/>`;
        }
      } else if (!line) {
        g += `<text x="${cx2}" y="${iy(40)}" text-anchor="middle" font-size="9" fill="#aab" font-style="italic">(empty)</text>`;
      }
      return g;
    }
  
    let off = 0, feats = '';
    for (const slot of slots) {
      const w = slot.size * scale;
      const line = assign[slot.id];
      const kind = line ? classifyWall(line.pack) : 'EMPTY';
      s += `<rect x="${x0 + off}" y="${y0}" width="${w}" height="${Hp}" fill="${line ? 'url(#ldSeal)' : '#e9e9ec'}" stroke="#15161a" stroke-width="0.8"/>`;
      feats += elevFeatures(kind, line, x0 + off, w);
      off += w;
    }
    // roof cap
    s += `<rect x="${x0 - 2.5}" y="${y0 - 3.5}" width="${Wp + 5}" height="4.5" rx="1.8" fill="url(#ldSeal)" stroke="#15161a" stroke-width="0.8"/>`;
    // side profile of an adjacent wall's vent set: intake band low, exhaust
    // band high, remote fan unit at the floor — protruding 5.5″ past the edge
    function ventSideProfile(atLeft) {
      const bx = atLeft ? x0 - VOUT2 : x0 + Wp;
      let g = '';
      for (const band of [[34, 30], [76, 30]])
        g += `<rect x="${bx}" y="${iy(band[0])}" width="${VOUT2}" height="${band[1] * PX2}" rx="1.5" fill="#2e3037" stroke="#1b1c20" stroke-width="0.9"/>`;
      g += `<rect x="${bx}" y="${iy(10)}" width="${VOUT2}" height="${10 * PX2 - 2}" rx="2" fill="#26282d" stroke="#1b1c20" stroke-width="0.9"/>`;
      return g;
    }
    if (leftVent) s += ventSideProfile(true);
    if (rightVent) s += ventSideProfile(false);
    // seam-seal battens: full-height at every panel joint, wrapping both corners
    const SB = Math.max(4.5, 3 * PX2);
    off = 0;
    for (let i = 0; i < slots.length - 1; i++) {
      off += slots[i].size * scale;
      s += `<rect x="${x0 + off - SB / 2}" y="${y0}" width="${SB}" height="${Hp}" fill="url(#ldSeal)" stroke="#0d0e11" stroke-width="0.9"/>`;
    }
    s += `<rect x="${x0 - SB * 0.45}" y="${y0}" width="${SB}" height="${Hp}" rx="1" fill="url(#ldSeal)" stroke="#0d0e11" stroke-width="0.9"/>`;
    s += `<rect x="${x0 + Wp - SB * 0.55}" y="${y0}" width="${SB}" height="${Hp}" rx="1" fill="url(#ldSeal)" stroke="#0d0e11" stroke-width="0.9"/>`;
    s += feats;
  
    // dims: width below the ground line, height on the left
    const dy2 = gy + 18;
    s += `<line x1="${x0}" y1="${dy2}" x2="${x0 + Wp}" y2="${dy2}" stroke="#9097a0" stroke-width="1"/>`
      + `<line x1="${x0}" y1="${dy2 - 4}" x2="${x0}" y2="${dy2 + 4}" stroke="#9097a0" stroke-width="1"/>`
      + `<line x1="${x0 + Wp}" y1="${dy2 - 4}" x2="${x0 + Wp}" y2="${dy2 + 4}" stroke="#9097a0" stroke-width="1"/>`;
    s += `<rect x="${x0 + Wp / 2 - 22}" y="${dy2 - 8}" width="44" height="15" rx="3" fill="url(#ldBg)"/>`;
    s += `<text x="${x0 + Wp / 2}" y="${dy2 + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="#4a4f57">${lenIn}″</text>`;
    const dx2 = x0 - (leftVent ? VOUT2 : 0) - 20;
    s += `<line x1="${dx2}" y1="${y0}" x2="${dx2}" y2="${gy}" stroke="#9097a0" stroke-width="1"/>`
      + `<line x1="${dx2 - 4}" y1="${y0}" x2="${dx2 + 4}" y2="${y0}" stroke="#9097a0" stroke-width="1"/>`
      + `<line x1="${dx2 - 4}" y1="${gy}" x2="${dx2 + 4}" y2="${gy}" stroke="#9097a0" stroke-width="1"/>`;
    s += `<rect x="${dx2 - 8}" y="${y0 + Hp / 2 - 9}" width="16" height="18" fill="url(#ldBg)"/>`;
    s += `<text x="${dx2}" y="${y0 + Hp / 2 + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="#4a4f57" transform="rotate(-90 ${dx2} ${y0 + Hp / 2})">${hIn}″</text>`;
  
    // overall width including adjacent-wall vent protrusion(s)
    if (leftVent || rightVent) {
      const VD = '#c9762e';
      const xA = x0 - (leftVent ? VOUT2 : 0), xB = x0 + Wp + (rightVent ? VOUT2 : 0);
      const tot = String(Math.round((lenIn + (leftVent ? 5.5 : 0) + (rightVent ? 5.5 : 0)) * 2) / 2);
      const vy2 = dy2 + 16, vmx = (xA + xB) / 2;
      s += `<line x1="${xA}" y1="${vy2}" x2="${xB}" y2="${vy2}" stroke="${VD}" stroke-width="1"/>`
        + `<line x1="${xA}" y1="${vy2 - 4}" x2="${xA}" y2="${vy2 + 4}" stroke="${VD}" stroke-width="1"/>`
        + `<line x1="${xB}" y1="${vy2 - 4}" x2="${xB}" y2="${vy2 + 4}" stroke="${VD}" stroke-width="1"/>`;
      s += `<rect x="${vmx - 38}" y="${vy2 - 8}" width="76" height="15" rx="3" fill="url(#ldBg)"/>`;
      s += `<text x="${vmx}" y="${vy2 + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="${VD}">${tot}″ w/ vent</text>`;
    }
  
    s += `</svg>`;
    return s;
  }
  
  // ── WA-Type-aware initial seating ───────────────────────────────────
  // Greedy placeBom seats the 49″ WA/ADA door by slot preference (front wall)
  // and the shrunken companion by closest width — neither knows the WA Type.
  // But the companion's width ENCODES the type (7→4016 · 31→4040 · 19→4622 ·
  // 43→4646), and the rule is: door slot + directly-adjacent companion seat
  // conserve the displaced pair (slot + seat ≈ 49 + companion). If the greedy
  // result violates that, relocate door + companion to the first conserving
  // pair — preferring the door's current wall, then S, E, N, W. So a 4016
  // quote on a 102126 loads with the door already on the 102″ side, 7″ wall
  // beside it; a 4040 loads with the door on the 126″ side, 31″ beside it.
  function waSeatDoor(layout, assign) {
    let doorSlot = null, doorSide = null, comp = null, compSide = null;
    for (const side of ['N', 'S', 'E', 'W']) {
      const wall = layout.walls[side]; if (!wall) continue;
      for (const slot of wall.slots) {
        const ln = assign[slot.id]; if (!ln) continue;
        const w = panelInteriorWidth(ln.pack);
        if (w == null) continue;
        if (classifyWall(ln.pack) === 'DRFRM' && w >= 49) { doorSlot = slot; doorSide = side; }
        else if ([7, 19, 31, 43].indexOf(w) >= 0 && Math.abs(w - slot.size) >= 3) { comp = { slot: slot, w: w }; compSide = side; }
      }
    }
    if (!doorSlot || !comp) return;
    const conserve = (a, b) => Math.abs(a.size + b.size - (49 + comp.w)) <= 3;
    const adjacent = (side, slot) => {
      const slots = layout.walls[side].slots;
      const i = slots.findIndex(s2 => s2.id === slot.id);
      return [slots[i - 1], slots[i + 1]].filter(Boolean);
    };
    // already valid? (companion directly adjacent + pair conserves)
    if (doorSide === compSide && adjacent(doorSide, doorSlot).some(s2 => s2.id === comp.slot.id && conserve(doorSlot, s2))) return;
    const swapIds = (x, y) => {
      if (x === y) return;
      const X = assign[x] || null, Y = assign[y] || null;
      if (Y == null) delete assign[x]; else assign[x] = Y;
      if (X == null) delete assign[y]; else assign[y] = X;
    };
    const order = [doorSide].concat(['S', 'E', 'N', 'W'].filter(s2 => s2 !== doorSide));
    for (const side of order) {
      const wall = layout.walls[side]; if (!wall) continue;
      const slots = wall.slots;
      for (let i = 0; i < slots.length; i++) {
        const slot = slots[i];
        if (Math.abs(slot.size - doorSlot.size) > 3) continue;   // door stays on its module size
        if (slot.id === comp.slot.id) continue;                  // never seat the door ON the companion
        for (const j of [i - 1, i + 1]) {
          const seat = slots[j];
          if (!seat || !conserve(slot, seat)) continue;
          swapIds(doorSlot.id, slot.id);
          swapIds(comp.slot.id, seat.id);
          return;
        }
      }
    }
  }

  function renderLegend() {
    const sw = { DRFRM:'#ee6216', WDO:'#9ec4e6', VNT:'#54575f', SOLID:'#54575f' };
    const items = ['SOLID','VNT','DRFRM','WDO'].map(k =>
      '<span><span class="ld-sw" style="background:' + sw[k] + '"></span>' + KIND_META[k].label + '</span>'
    ).join('');
    return '<div class="layout-legend">' + items + ' <span class="ld-hint">↔ drag a panel onto another to swap</span></div>';
  }

  // ── Drag-to-rearrange: per-room placement state + pointer handlers ──
  // LAYOUT_STATE holds each room's current slot→line assignment so a customer
  // can drag panels around (e.g. move the door to a different wall) and see it
  // re-render live. Reset on every full render(); swaps mutate it in place.
  const LAYOUT_STATE = {};
  let _ldDrag = null;
  const ldRoomOf = el => { const w = el && el.closest && el.closest('[data-layout-room]'); return w ? +w.getAttribute('data-layout-room') : null; };
  // Slot lookup (side + wall + slot) for the drag rules.
  function ldSlotInfo(ri, slotId) {
    const st = LAYOUT_STATE[ri]; if (!st) return null;
    for (const side of ['N', 'S', 'E', 'W']) {
      const wall = st.layout.walls[side]; if (!wall) continue;
      for (const slot of wall.slots) if (slot.id === slotId) return { side: side, wall: wall, slot: slot };
    }
    return null;
  }
  // Is this line the 49″ WA/ADA doorframe? (A standard doorframe pack reads
  // STDWL46 DRFRM → 46″; the WA/ADA/FR frames read STDDRFRM → 49″.)
  function ldIsWideDoor(line) {
    if (!line) return false;
    const w = panelInteriorWidth(line.pack);
    return classifyWall(line.pack) === 'DRFRM' && w != null && w >= 49;
  }
  // The WA Type names the wall PAIR the 49″ door displaces, and the pair's
  // total width is conserved (Benton 2026-06-09):
  //   4646: 46+46 → 49+43     4622: 46+22 → 49+19
  //   4040: 40+40 → 49+31     4016: 40+16 → 49+7
  // The shrunken companion always sits DIRECTLY ADJACENT to the door. So on a
  // 102126, a 4016 door can only live on the 102″ side (40+16+40 — it replaces
  // a 40 and the middle 16 becomes the 7), while 4040 forces the 126″ side
  // (40+40+44 — the adjacent 40 becomes 31).
  // Companion = the one shrunken WA wall, WHEREVER it currently sits (the
  // greedy auto-place doesn't know the adjacency rule, so it may seat the
  // 7″/31″ on any wall until the rep drags the door). Identified by width ∈
  // {7,19,31,43} AND visibly narrower than its slot (a normal 43″ wall in a
  // 44″ slot is NOT one).
  function ldCompanion(ri) {
    const st = LAYOUT_STATE[ri]; if (!st) return null;
    for (const side of ['N', 'S', 'E', 'W']) {
      const wall = st.layout.walls[side]; if (!wall) continue;
      for (const s2 of wall.slots) {
        const ln = st.assign[s2.id]; if (!ln) continue;
        const w = panelInteriorWidth(ln.pack);
        if (w != null && [7, 19, 31, 43].indexOf(w) >= 0 && Math.abs(w - s2.size) >= 3) return { slotId: s2.id, w: w };
      }
    }
    return null;
  }
  // Slots adjacent to a drop target that can seat the companion: the pair
  // must conserve width — |target + adjacent − (49 + companion)| ≤ 3.
  function ldDoorSeats(ri, info, compW) {
    const slots = info.wall.slots;
    const i = slots.findIndex(s2 => s2.id === info.slot.id);
    const out = [];
    for (const j of [i - 1, i + 1]) {
      if (j < 0 || j >= slots.length) continue;
      if (Math.abs(info.slot.size + slots[j].size - (49 + compW)) <= 3) out.push(slots[j]);
    }
    return out;
  }
  // A panel only fits a slot of (near-)equal width — you can't drop a 46" panel
  // where a 22" sits. ±3" covers module rounding (46/47/47.5) but blocks
  // full↔narrow swaps. The 49″ WA/ADA doorframe additionally needs a valid
  // companion seat ADJACENT to the drop target (pair conservation above) — so
  // a 4016 door is refused on a 40+40 pair and a 4040 door on a 40+16 pair.
  function ldCompatible(ri, a, b) {
    const A = ldSlotInfo(ri, a), B = ldSlotInfo(ri, b);
    if (!A || !B) return false;
    if (Math.abs(A.slot.size - B.slot.size) > 3) return false;
    const st = LAYOUT_STATE[ri]; if (!st) return false;
    if (ldIsWideDoor(st.assign[a])) {
      const comp = ldCompanion(ri);
      if (comp ? ldDoorSeats(ri, B, comp.w).length === 0 : B.wall.slots.length < 2) return false;
    }
    if (ldIsWideDoor(st.assign[b])) {
      const comp = ldCompanion(ri);
      if (comp ? ldDoorSeats(ri, A, comp.w).length === 0 : A.wall.slots.length < 2) return false;
    }
    return true;
  }

  function renderLayoutTab(rm, ri) {
    let st = LAYOUT_STATE[ri];
    if (!st || st.rm !== rm) {
      const layout = (DATA && DATA.layouts) ? DATA.layouts[rm.boothName] : null;
      if (!layout) {
        return '<div class="layout-wrap" data-layout-room="' + ri + '"><div class="layout-empty">'
          + 'Top-down layout not yet defined for <b>' + esc(rm.boothName) + '</b>.'
          + '</div></div>';
      }
      const placed = placeBom(layout, rm.lines).placement;
      waSeatDoor(layout, placed);   // WA/ADA door + companion onto their WA-Type wall pair
      st = LAYOUT_STATE[ri] = { rm, layout, assign: placed };
    }
    const layout = st.layout;
    const placedSet = new Set(Object.values(st.assign).filter(Boolean));
    const leftover = (rm.lines || []).filter(l => isWallPanel(l.pack) && !placedSet.has(l));
    // Elevation facing defaults to whichever wall holds the door
    if (!st.facing) st.facing = (function () {
      for (const sd of ['S', 'E', 'N', 'W'])
        for (const sl of ((layout.walls[sd] || { slots: [] }).slots)) {
          const ln = st.assign[sl.id];
          if (ln && classifyWall(ln.pack) === 'DRFRM') return sd;
        }
      return 'S';
    })();
    const FACE_LABEL = { S: 'FRONT', E: 'RIGHT SIDE', N: 'BACK', W: 'LEFT SIDE' };
    let html = '<div class="layout-wrap" data-layout-room="' + ri + '">'
      + '<div class="layout-title">' + esc(rm.boothName) + ' · ' + esc(layout.label || '')
      +   ' <span class="layout-sub">' + esc(layout.variant || 'S') + '</span></div>'
      + '<div class="ld-views">'
      +   '<div class="ld-view ld-view-plan"><div class="ld-view-cap"><span>TOP-DOWN</span></div>'
      +     renderLayoutSvg(layout, st.assign) + '</div>'
      +   '<div class="ld-view ld-view-elev">'
      +     '<div class="ld-view-cap">'
      +       '<button class="ld-rot" onclick="ldRotate(this,-1)" title="Rotate view left">◀</button>'
      +       '<span>ELEVATION · ' + FACE_LABEL[st.facing] + '</span>'
      +       '<button class="ld-rot" onclick="ldRotate(this,1)" title="Rotate view right">▶</button>'
      +     '</div>'
      +     renderElevationSvg(layout, st.assign, st.facing)
      +   '</div>'
      + '</div>'
      + renderLegend();
    if (leftover.length) {
      html += '<div class="layout-empty" style="margin-top:12px;text-align:left;color:#5a3a18;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.4)">'
        + '<b>⚠ ' + leftover.length + ' wall component' + (leftover.length === 1 ? '' : 's') + ' not placed:</b> '
        + leftover.map(l => esc(l.code) + ' (' + esc(l.pack || '') + ')').join(', ') + '.</div>';
    }
    return html + '</div>';
  }

  // floating "ghost" chip that follows the cursor so it's obvious you're dragging
  let _ldGhost = null;
  function ldShowGhost(line, e) {
    const kind = line ? classifyWall(line.pack) : 'EMPTY';
    const meta = KIND_META[kind] || KIND_META.EMPTY;
    const g = document.createElement('div');
    g.className = 'ld-ghost';
    g.innerHTML = '<span>' + esc(meta.label || 'Panel') + '</span>'
      + (line && line.code ? '<span class="c">' + esc(line.code) + '</span>' : '');
    document.body.appendChild(g);
    _ldGhost = g;
    ldMoveGhost(e);
  }
  function ldMoveGhost(e) {
    if (!_ldGhost) return;
    const pt = (e.touches && e.touches[0]) || e;
    _ldGhost.style.left = (pt.clientX + 14) + 'px';
    _ldGhost.style.top = (pt.clientY + 12) + 'px';
  }
  function ldHideGhost() { if (_ldGhost) { _ldGhost.remove(); _ldGhost = null; } }

  function ldDown(e) {
    const g = e.target.closest && e.target.closest('.ld-panel');
    if (!g) return;
    const ri = ldRoomOf(g); if (ri == null) return;
    _ldDrag = { ri, from: g.getAttribute('data-slot'), g };
    g.classList.add('ld-grabbing');
    document.body.classList.add('ld-dragging');
    const line = LAYOUT_STATE[ri] && LAYOUT_STATE[ri].assign[_ldDrag.from];
    ldShowGhost(line || null, e);
    e.preventDefault();
  }
  function ldMove(e) {
    if (!_ldDrag) return;
    ldMoveGhost(e);
    const pt = (e.touches && e.touches[0]) || e;
    const el = document.elementFromPoint(pt.clientX, pt.clientY);
    const tgt = el && el.closest && el.closest('.ld-panel');
    document.querySelectorAll('.ld-panel.ld-target,.ld-panel.ld-bad').forEach(n => n.classList.remove('ld-target', 'ld-bad'));
    const onTarget = tgt && tgt !== _ldDrag.g && ldRoomOf(tgt) === _ldDrag.ri;
    const fits = onTarget && ldCompatible(_ldDrag.ri, _ldDrag.from, tgt.getAttribute('data-slot'));
    if (onTarget) tgt.classList.add(fits ? 'ld-target' : 'ld-bad');
    if (_ldGhost) _ldGhost.classList.toggle('ok', !!fits);
    if (_ldGhost) _ldGhost.classList.toggle('bad', !!onTarget && !fits);
    e.preventDefault();
  }
  function ldUp(e) {
    if (!_ldDrag) return;
    const pt = (e.changedTouches && e.changedTouches[0]) || e;
    const el = document.elementFromPoint(pt.clientX, pt.clientY);
    const tgt = el && el.closest && el.closest('.ld-panel');
    if (tgt && tgt !== _ldDrag.g && ldRoomOf(tgt) === _ldDrag.ri
        && ldCompatible(_ldDrag.ri, _ldDrag.from, tgt.getAttribute('data-slot'))) {
      ldSwap(_ldDrag.ri, _ldDrag.from, tgt.getAttribute('data-slot'));
    }
    document.querySelectorAll('.ld-panel.ld-target,.ld-panel.ld-bad').forEach(n => n.classList.remove('ld-target', 'ld-bad'));
    document.body.classList.remove('ld-dragging');
    ldHideGhost();
    _ldDrag = null;
  }
  function ldSwap(ri, a, b) {
    const st = LAYOUT_STATE[ri]; if (!st || a === b) return;
    const A = st.assign[a] || null, B = st.assign[b] || null;
    if (B == null) delete st.assign[a]; else st.assign[a] = B;
    if (A == null) delete st.assign[b]; else st.assign[b] = A;
    // The 49″ WA/ADA door travels WITH its shrunken companion (43″/31″/19″/7″
    // per WA Type) — they must end up directly adjacent. When exactly one end
    // of the swap is the wide door, pull the companion into the conserving
    // adjacent slot of the door's new position.
    const aWide = ldIsWideDoor(st.assign[a]), bWide = ldIsWideDoor(st.assign[b]);
    if (aWide !== bWide) ldBringCompanion(ri, aWide ? a : b);
    const wrap = document.querySelector('[data-layout-room="' + ri + '"]');
    if (wrap) wrap.outerHTML = renderLayoutTab(st.rm, ri);
  }
  // Move the WA shrink companion (43″/31″/19″/7″ per WA Type) — wherever it
  // sits — into the slot DIRECTLY ADJACENT to the door's new slot (pair
  // conservation picks which adjacent), swapping with whatever sits there.
  function ldBringCompanion(ri, doorSlotId) {
    const st = LAYOUT_STATE[ri]; if (!st) return;
    const to = ldSlotInfo(ri, doorSlotId); if (!to) return;
    const comp = ldCompanion(ri); if (!comp) return;
    const seats = ldDoorSeats(ri, to, comp.w);
    if (!seats.length) return;
    if (seats.some(s2 => s2.id === comp.slotId)) return;   // already adjacent
    const seat = seats[0];
    const X = st.assign[comp.slotId] || null, Y = st.assign[seat.id] || null;
    if (Y == null) delete st.assign[comp.slotId]; else st.assign[comp.slotId] = Y;
    if (X == null) delete st.assign[seat.id]; else st.assign[seat.id] = X;
  }
  document.addEventListener('pointerdown', ldDown);
  document.addEventListener('pointermove', ldMove);
  document.addEventListener('pointerup', ldUp);

  // Elevation rotate: cycle which wall the elevation faces (S → E → N → W).
  // Facing persists on the room's LAYOUT_STATE, so drags re-render in place.
  function ldRotate(btn, dir) {
    const ri = ldRoomOf(btn); if (ri == null) return;
    const st = LAYOUT_STATE[ri]; if (!st) return;
    const order = ['S', 'E', 'N', 'W'];
    st.facing = order[(order.indexOf(st.facing || 'S') + dir + 4) % 4];
    const wrap = document.querySelector('[data-layout-room="' + ri + '"]');
    if (wrap) wrap.outerHTML = renderLayoutTab(st.rm, ri);
  }


  function switchTab(roomEl, tabName) {
    const parent = roomEl.closest('.pl-page');
    if (!parent) return;
    parent.querySelectorAll('.pl-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
    parent.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
  }

  async function loadPL(){
    document.getElementById('rooms').innerHTML = '<div class="pl-page"><div class="loading">Loading packing list…</div></div>';
    try {
      const r = await fetch('/api/packing-list/' + encodeURIComponent(quoteNumber), { credentials:'include' });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      DATA = d; COMPONENTS = d.components || {};
      serialLines = String(DATA.serialNumber || '').split('\n');   // seed per-booth S/N from the order
      jambSides = Array.isArray(DATA.jambSide) ? DATA.jambSide.slice() : [];   // seed per-booth jamb side
      render();
    } catch(e){
      document.getElementById('rooms').innerHTML = '<div class="pl-page"><div class="empty">Failed to load: ' + esc(e.message) + '</div></div>';
    }
  }

  function roomTotals(rm){
    let lb = 0, cf = 0;
    (rm.lines||[]).forEach(l => {
      if (l.eachLb!=null) lb += l.eachLb;
      cf += cuFtPerItem(l.L, l.W, l.T);
    });
    return {
      lb: Math.round(lb * 100) / 100,
      kg: lbToKg(lb),
      cf: Math.round(cf * 100) / 100,
      cm: cuFtToCuM(cf),
    };
  }

  // Internal accessories that appear as quote line items but should NOT
  // surface in the PL title (they're hardware/upgrades the customer doesn't
  // think of as "features" — HEPA, AP, CP, EFP, cable upgrades, etc.).
  const FEATURE_DROP = /^(HEPA|HX|AP|CP|EFP|DWC|LT\s*CR|MJP\s*(?:ADPT|EXT)|.*CBL\s*UPG|AUDI\s*BL|RM\s+\d|IEP|WA\s|EFI|VENT\s*SET|REMOTE|STEP|FOAM)/i;

  // Map verbose quote names to the short tokens the printed PL shows.
  // Order matters: first match wins. Functions receive the regex match.
  const FEATURE_RULES = [
    { rx: /^OFFICE\s*DESK\b/i,                                      label: 'DESK' },
    { rx: /^WDO\s+(?:(\d+)["”']?\s+)?(\d{4})\b.*$/i,                label: m => 'WDO ' + (m[1] ? m[1] + '" ' : '') + m[2] },
    { rx: /^ADA\b/i,                                                label: 'ADA' },
    { rx: /^EFS\b/i,                                                label: 'EFS' },
    { rx: /^VSS\b/i,                                                label: 'VSS' },
    { rx: /^MJP$/i,                                                 label: 'MJP' },
    { rx: /^RFU\b/i,                                                label: 'RFU' },
    { rx: /^SL\b/i,                                                 label: 'SL' },
    { rx: /^BASS\s*TRAPS\b/i,                                       label: 'BASS TRAPS' },
  ];

  function normalizeFeature(name) {
    const s = String(name||'').trim();
    if (!s) return null;
    if (FEATURE_DROP.test(s)) return null;
    for (const r of FEATURE_RULES) {
      const m = r.rx.exec(s);
      if (m) return typeof r.label === 'function' ? r.label(m) : r.label;
    }
    return s.toUpperCase();
  }

  function mdlLine(rm){
    const parts = [rm.boothName];
    const seen = new Set();
    (rm.unmappedFeatures||[]).forEach(f => {
      if (!f || !f.name) return;
      const tok = normalizeFeature(f.name);
      if (!tok || seen.has(tok)) return;
      seen.add(tok);
      parts.push(tok);
    });
    return parts.map(esc).join(' <span class="sep">/</span> ');
  }

  // Returns escaped HTML (company on line 1, quote number on line 2). Caller
  // inserts it raw — do NOT wrap in esc() again.
  function dealRef(){
    const m = DATA.meta || {};
    const parts = [];
    const company = esc(m.dealName || m.company || '');
    if (company) parts.push(company);
    if (DATA.quoteNumber) parts.push(esc(DATA.quoteNumber));
    return parts.join('<br>');
  }

  function snKey(ri){ return 'wr-pl-sn:' + (DATA.quoteNumber||'') + ':' + ri; }
  function dateKey(){ return 'wr-pl-date:' + (DATA.quoteNumber||''); }

  function render(){
    const rooms = DATA.rooms || [];
    if (!rooms.length){ document.getElementById('rooms').innerHTML = '<div class="pl-page"><div class="empty">No booth (MDL) line items found on this quote.</div></div>'; return; }
    for (const k in LAYOUT_STATE) delete LAYOUT_STATE[k];   // re-place layouts from current BOM each full render
    const totalPages = rooms.length;
    const savedDate = localStorage.getItem(dateKey()) || todayShort();

    document.getElementById('rooms').innerHTML = weightCheckHtml() + rooms.map((rm,ri)=>{
      const dateInput = '<span class="pl-date"><input type="text" id="pl-date-' + ri + '" value="' + esc(savedDate) + '" oninput="saveDate(this.value)"></span>';
      const headerTop =
        '<div class="pl-top">'
          + '<div class="pl-top-left">' + dealRef() + '</div>'
          + '<div class="pl-top-center">'
            + '<img src="/assets/whisperroom-logo.svg" alt="WhisperRoom">'
            + '<div class="pl-tagline">Sound Isolation Enclosures</div>'
          + '</div>'
          + '<div class="pl-top-right">' + dateInput + '</div>'
        + '</div>';

      if (!rm.found){
        return '<div class="pl-page">' + headerTop
          + '<div class="pl-mid">'
            + '<div><div class="mdl-line">' + esc(rm.boothName) + '</div></div>'
            + '<div class="pl-right"><div class="pl-title">PACKING <span>LIST</span></div></div>'
          + '</div>'
          + '<div class="notfound">No base packing list found for <b>' + esc(rm.boothName) + '</b>. If this is a package (not an MDL model) or a typo, it cannot be generated yet.</div>'
          + flagsHtml(rm)
          + pageFoot(ri+1, totalPages)
        + '</div>';
      }

      const jambSide = applyJamb(ri);           // null if this booth has no jamb adapter (Z20/Z21)
      const t = roomTotals(rm);
      const savedSn = serialLines[ri] || '';   // booth ri ↔ line ri of order_data.serialNumber

      const body = (rm.lines||[]).map((l,li)=>{
        const lM = inToM(l.L), wM = inToM(l.W), tM = inToM(l.T);
        const kg = lbToKg(l.eachLb);
        const alt = li % 2 === 1 ? ' class="alt"' : '';
        // Editable cells: dims (in), weight (lb), code, part#, contents. Metric +
        // kg cells stay derived. onblur writes back to the line via editCell().
        const ed = (f,cls) => '<td class="edit ' + (cls||'') + '" contenteditable="true" spellcheck="false" onblur="editCell(' + ri + ',' + li + ',\'' + f + '\',this.textContent)">';
        return '<tr' + alt + '>'
          + '<td class="idx">' + (li+1) + '</td>'
          + ed('L') + (l.L==null?'—':fmtN(l.L,2)) + '</td>'
          + '<td>' + (lM==null?'—':fmtN(lM,2)) + '</td>'
          + ed('W') + (l.W==null?'—':fmtN(l.W,2)) + '</td>'
          + '<td>' + (wM==null?'—':fmtN(wM,2)) + '</td>'
          + ed('T') + (l.T==null?'—':fmtN(l.T,2)) + '</td>'
          + '<td>' + (tM==null?'—':fmtN(tM,2)) + '</td>'
          + ed('eachLb') + (l.eachLb==null?'—':fmtN(l.eachLb,2)) + '</td>'
          + '<td>' + (kg==null?'—':fmtN(kg,2)) + '</td>'
          + ed('code', 'code ' + (l.known?'':'unknown')) + esc(l.code) + '</td>'
          + ed('pack', 'pack l') + esc(l.pack||'') + '</td>'
          + ed('desc', 'desc l') + esc(l.desc) + '</td>'
          + '<td class="no-print"><button class="rm-row" title="Remove" onclick="rmRow(' + ri + ',' + li + ')">&times;</button></td>'
        + '</tr>';
      }).join('');

      return '<div class="pl-page">'
        + headerTop
        + '<div class="pl-mid">'
          + '<div>'
            + '<div class="mdl-line">' + mdlLine(rm) + (rm.unit?' <span style="color:#ee6216">(Booth ' + rm.unit.n + ' of ' + rm.unit.of + ')</span>':'') + '</div>'
            + '<div class="totals-grid">'
              + '<div class="l">Total Size (Cubic Feet):</div><div class="v">' + fmtN(t.cf,2) + '</div>'
              + '<div class="l">Total Weight (Pounds):</div><div class="v">' + fmtN(t.lb,2) + '</div>'
              + '<div class="l">Total Size (Cubic Meters):</div><div class="v">' + fmtN(t.cm,2) + '</div>'
              + '<div class="l">Total Weight (Kilograms):</div><div class="v">' + fmtN(t.kg,2) + '</div>'
            + '</div>'
          + '</div>'
          + '<div class="pl-right">'
            + '<div class="pl-title">PACKING <span>LIST</span></div>'
            + '<div class="sn-row"><span class="sn-label">S/N</span>'
              + '<input class="sn-input" type="text" value="' + esc(savedSn) + '" placeholder="enter serial #" oninput="saveSn(' + ri + ',this.value)">'
            + '</div>'
          + '</div>'
        + '</div>'
        + '<div class="pl-tabs no-print">'
          + '<button class="pl-tab active" data-tab="pl"     onclick="switchTab(this,\'pl\')">📦 Packing List</button>'
          + '<button class="pl-tab"        data-tab="layout" onclick="switchTab(this,\'layout\')">🏗 Top-Down Layout</button>'
        + '</div>'
        + '<div class="no-print" style="display:flex;gap:8px;margin:0 0 12px">'
          + '<button class="add-btn" onclick="openLabels(\'box\',' + ri + ')">🏷 Box Labels (' + (rm.boxCount||0) + ')</button>'
          + '<button class="add-btn" onclick="openLabels(\'pallet\',' + ri + ')">🏷 Pallet Labels</button>'
          + (jambSide ? jambToggleHtml(ri, jambSide) : '')
        + '</div>'
        + '<div class="tab-panel active" data-tab="pl">'
        + '<table class="pl">'
          + '<thead>'
            + '<tr class="group">'
              + '<th rowspan="2">#</th>'
              + '<th colspan="2">Length</th>'
              + '<th colspan="2">Width</th>'
              + '<th colspan="2">Thickness</th>'
              + '<th colspan="2">Weight</th>'
              + '<th rowspan="2">Code</th>'
              + '<th rowspan="2" class="l">Part #</th>'
              + '<th rowspan="2" class="l">Package Contents</th>'
              + '<th rowspan="2" class="no-print"></th>'
            + '</tr>'
            + '<tr class="units">'
              + '<th>In</th><th>M</th>'
              + '<th>In</th><th>M</th>'
              + '<th>In</th><th>M</th>'
              + '<th>lb</th><th>KG</th>'
            + '</tr>'
          + '</thead>'
          + '<tbody>' + body + '</tbody>'
        + '</table>'
        + '<div class="room-foot no-print">'
          + '<div class="addrow">'

        + flagsHtml(rm)
