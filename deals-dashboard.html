<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Deal Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --muted: #888;
  --dim: rgba(255,255,255,.2);
  --orange: #ee6216;
  --orange-dim: rgba(238,98,22,.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,.12);
  --amber: #f59e0b;
  --red: #ef4444;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}
:root.light {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #666;
  --dim: rgba(0,0,0,.2);
  --orange: #d44f0c;
  --orange-dim: rgba(212,79,12,.1);
  --green: #16a34a;
  --green-dim: rgba(22,163,74,.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* Topbar — always dark */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; min-height: 52px; background: #1a1a1a; border-bottom: 1px solid rgba(255,255,255,.1); position: sticky; top: 0; z-index: 100; gap: 8px; flex-wrap: nowrap; }
.topbar-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; white-space: nowrap; color: #f0ede8; flex-shrink: 0; }
.topbar-logo span { color: #e8531a; }
.topbar-nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
.nav-link { padding: 5px 10px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; border-radius: 6px; color: rgba(255,255,255,.55); text-decoration: none; transition: all .15s; white-space: nowrap; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); }
.nav-link:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.9); }
.nav-link.active { background: rgba(238,98,22,.2); color: #ee6216; border-color: rgba(238,98,22,.4); }
.theme-btn { padding: 5px 9px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 6px; color: #f0ede8; cursor: pointer; font-size: 14px; line-height: 1; transition: all .15s; flex-shrink: 0; }
.theme-btn:hover { background: rgba(255,255,255,.14); }

/* Layout */
.layout { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 52px); overflow:hidden; }

/* Deal list */
.deal-list-panel { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.deal-list-header { padding:16px; border-bottom:1px solid var(--border); }
.search-input { width:100%; padding:8px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.search-input:focus { border-color:rgba(238,98,22,.4); }
.filter-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.filter-btn { padding:4px 10px; font-size:10px; font-weight:700; border-radius:4px; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:.05em; border:1px solid var(--border); background:none; color:var(--muted); transition:.15s; }
.filter-btn.active { background:var(--orange-dim); border-color:rgba(238,98,22,.3); color:var(--orange); }
.deal-list { flex:1; overflow-y:auto; }
.deal-item { padding:13px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.deal-item:hover { background:rgba(255,255,255,.03); }
.deal-item.active { background:rgba(238,98,22,.08); border-left:2px solid var(--orange); }
.deal-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.deal-meta { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
.deal-amount { font-size:12px; font-weight:700; color:var(--orange); }
.deal-stage-badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:.05em; }
.deal-mdl { font-size:10px; color:var(--dim); font-family:var(--mono); }
.deal-rep { font-size:10px; color:var(--muted); }
.deal-modified { font-size:10px; color:var(--dim); }
.pay-badge { font-size:9px; font-weight:700; padding:2px 5px; border-radius:3px; text-transform:uppercase; letter-spacing:.04em; }
.deal-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }

/* Hub panel */
.hub-panel { overflow-y:auto; display:flex; flex-direction:column; }
.hub-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
.hub-empty-icon { font-size:48px; opacity:.3; }

/* Hub content */
.hub-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); }
.hub-deal-name { font-size:20px; font-weight:800; color:#fff; }
.hub-deal-meta { display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
.hub-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.btn { padding:8px 16px; font-size:12px; font-weight:700; border-radius:7px; cursor:pointer; font-family:inherit; border:none; transition:.15s; }
.btn-primary { background:var(--orange); color:#fff; }
.btn-primary:hover { background:#d4561b; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:rgba(255,255,255,.08); }
.btn-green { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }

/* Pipeline */
.pipeline { display:flex; margin:16px 24px; border-radius:8px; overflow:hidden; }
.pipe-step { flex:1; padding:10px 8px; text-align:center; font-size:11px; font-weight:700; cursor:pointer; transition:.15s; border:1px solid transparent; }

/* Sections */
.hub-body { padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
.section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.35); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.card-row { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:8px; margin-bottom:6px; cursor:pointer; transition:border-color .15s; }
.card-row-accepted { background:rgba(34,197,94,.08); border:1.5px solid rgba(34,197,94,.35); }
.card-row-normal { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); }
.card-row-normal:hover { border-color:rgba(238,98,22,.4); }
.card-row-accepted:hover { border-color:rgba(34,197,94,.7); }

/* Next action */
.next-action { padding:12px 16px; background:rgba(238,98,22,.08); border:1px solid rgba(238,98,22,.2); border-radius:8px; display:flex; align-items:center; gap:12px; }

/* Admin */
.admin-panel { border-top:1px solid var(--border); padding-top:16px; }
.admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.admin-select { width:100%; padding:8px 10px; background:rgba(255,255,255,.07); border:1px solid var(--border); border-radius:7px; color:#fff; font-size:12px; font-family:inherit; outline:none; cursor:pointer; }

/* Toast */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast-msg { padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; color:#fff; opacity:0; transition:opacity .3s; }
.toast-msg.show { opacity:1; }
.toast-success { background:#1a7a4a; }
.toast-error   { background:#7a1a1a; }
.toast-info    { background:#1a3a7a; }

@media (max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .deal-list-panel { height:280px; border-right:none; border-bottom:1px solid var(--border); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Whisper<span>Room</span></div>
  <nav class="topbar-nav">
    <a href="/deals" class="nav-link active">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link">Shipping</a>
    <button onclick="newQuote()" style="padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(238,98,22,.2);border:1px solid rgba(238,98,22,.4);border-radius:6px;color:#ee6216;cursor:pointer;font-family:inherit;white-space:nowrap">+ New Quote</button>
  </nav>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button>
</div>

<div class="layout">

  <!-- Left: deal list -->
  <div class="deal-list-panel">
    <div class="deal-list-header">
      <input class="search-input" id="dealSearch" type="text" placeholder="Search deals, companies, contacts…" oninput="onSearch(this.value)">
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-stage="" onclick="setStageFilter(this,'')">All</button>
        <button class="filter-btn" data-stage="appointmentscheduled" onclick="setStageFilter(this,'appointmentscheduled')">Sent</button>
        <button class="filter-btn" data-stage="contractsent" onclick="setStageFilter(this,'contractsent')">Verbal</button>
        <button class="filter-btn" data-stage="closedwon" onclick="setStageFilter(this,'closedwon')">Won</button>
        <button class="filter-btn" data-stage="845719" onclick="setStageFilter(this,'845719')">Shipped</button>
      </div>
    </div>
    <div class="deal-list" id="dealList">
      <div class="deal-empty">Loading deals…</div>
    </div>
  </div>

  <!-- Right: hub detail -->
  <div class="hub-panel" id="hubPanel">
    <div class="hub-empty" id="hubEmpty">
      <div class="hub-empty-icon">⬡</div>
      <div style="font-size:15px;font-weight:600;color:rgba(255,255,255,.4)">Select a deal to open its hub</div>
      <div style="font-size:12px;color:rgba(255,255,255,.2)">Or create a new quote to start a deal</div>
    </div>
    <div id="hubContent" style="display:none;flex:1">
      <!-- Injected by renderHub() -->
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const REPS = {
  '36330944': 'Jill', '38143901': 'Sarah', '117442978': 'Travis',
  '36303670': 'Benton', '36320208': 'Gabe', '38732178': 'Kim',
  '38900892': 'Chet', '38732186': 'Jeromy'
};
const STAGES = {
  'appointmentscheduled': 'Sent Quote',
  'qualifiedtobuy':       'Updated Quote',
  'contractsent':         'Verbal Confirmation',
  'closedwon':            'Closed Won',
  '845719':               'Shipped',
  'closedlost':           'Closed Lost',
};
const STAGE_COLORS = {
  'appointmentscheduled': 'rgba(238,98,22,.15)',
  'qualifiedtobuy':       'rgba(238,98,22,.2)',
  'contractsent':         'rgba(245,158,11,.15)',
  'closedwon':            'rgba(34,197,94,.15)',
  '845719':               'rgba(34,197,94,.2)',
  'closedlost':           'rgba(239,68,68,.15)',
};
const STAGE_TEXT = {
  'appointmentscheduled': '#ee6216',
  'qualifiedtobuy':       '#ee6216',
  'contractsent':         '#f59e0b',
  'closedwon':            '#22c55e',
  '845719':               '#22c55e',
  'closedlost':           '#ef4444',
};
const PAY_LABELS = { paid:'✓ Paid', po_received:'PO Received', not_paid:'Not Paid' };
const PAY_COLORS = { paid:'#22c55e', po_received:'#f59e0b', not_paid:'rgba(255,255,255,.3)' };

let allDeals = [];
let currentDealId = null;
let currentStageFilter = '';
let searchTimeout = null;

const fmt = n => '$' + parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate = d => {
  if (!d) return '—';
  const dt = new Date(d);
  const now = new Date();
  const diff = (now - dt) / 1000;
  if (diff < 3600)   return Math.round(diff/60) + 'm ago';
  if (diff < 86400)  return Math.round(diff/3600) + 'h ago';
  if (diff < 604800) return Math.round(diff/86400) + 'd ago';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/New_York'});
};

// ── Load deals ──────────────────────────────────────────────────────
async function loadDeals(query = '') {
  try {
    const qs = new URLSearchParams({ limit: 60 });
    if (query)               qs.set('q', query);
    if (currentStageFilter)  qs.set('stage', currentStageFilter);
    const res  = await fetch('/api/deals/list?' + qs, { credentials: 'include' });
    const data = await res.json();
    allDeals = data.deals || [];
    renderDealList(allDeals);
  } catch(e) {
    document.getElementById('dealList').innerHTML = `<div class="deal-empty">Error: ${e.message}</div>`;
  }
}

function renderDealList(deals) {
  const list = document.getElementById('dealList');
  if (!deals.length) {
    list.innerHTML = '<div class="deal-empty">No deals found</div>';
    return;
  }
  list.innerHTML = '';
  deals.forEach(d => {
    const div = document.createElement('div');
    div.className = 'deal-item' + (d.id === currentDealId ? ' active' : '');
    div.onclick = () => openDeal(d.id);

    const ps = d.paymentStatus || 'not_paid';
    const payColor = PAY_COLORS[ps];
    const payLabel = PAY_LABELS[ps];
    const stageLabel = STAGES[d.stage] || d.stage || '—';
    const stageColor = STAGE_TEXT[d.stage] || 'rgba(255,255,255,.4)';
    const stageBg    = STAGE_COLORS[d.stage] || 'rgba(255,255,255,.06)';
    const repName    = REPS[d.ownerId] || '—';

    div.innerHTML = `
      <div class="deal-name">${d.name}</div>
      <div class="deal-meta">
        ${d.amount && parseFloat(d.amount) > 0 ? `<span class="deal-amount">${fmt(d.amount)}</span>` : ''}
        <span class="deal-stage-badge" style="background:${stageBg};color:${stageColor}">${stageLabel}</span>
        ${d.firstMdl ? `<span class="deal-mdl">${d.firstMdl}</span>` : ''}
        ${ps !== 'not_paid' ? `<span class="pay-badge" style="color:${payColor};border:1px solid ${payColor};background:${ps==='paid'?'rgba(34,197,94,.1)':'rgba(245,158,11,.1)'}">${payLabel}</span>` : ''}
      </div>
      <div class="deal-meta" style="margin-top:3px">
        <span class="deal-rep">${repName}</span>
        <span class="deal-modified">${fmtDate(d.modified)}</span>
        ${d.latestQuote ? `<span class="deal-mdl">${d.latestQuote}</span>` : ''}
      </div>
    `;
    list.appendChild(div);
  });
}

// ── Open deal ───────────────────────────────────────────────────────
async function openDeal(dealId) {
  currentDealId = dealId;
  // Highlight in list
  document.querySelectorAll('.deal-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.deal-item').forEach(el => {
    const deal = allDeals.find(d => d.id === dealId);
    if (deal && el.querySelector('.deal-name')?.textContent === deal.name) el.classList.add('active');
  });
  // Re-render to get proper active state
  renderDealList(allDeals);

  document.getElementById('hubEmpty').style.display    = 'none';
  document.getElementById('hubContent').style.display  = 'block';
  document.getElementById('hubContent').innerHTML = `<div style="padding:48px;text-align:center;color:rgba(255,255,255,.3);font-size:13px">Loading deal…</div>`;

  try {
    const res  = await fetch(`/api/deals/${dealId}/hub`, { credentials: 'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderHub(dealId, data);
  } catch(e) {
    document.getElementById('hubContent').innerHTML = `<div style="padding:40px;color:#ef4444;font-size:13px">Error: ${e.message}</div>`;
  }
}

// ── Render hub ──────────────────────────────────────────────────────
function renderHub(dealId, data) {
  const deal = allDeals.find(d => d.id === dealId) || {};
  const ps   = data.paymentStatus || 'not_paid';

  // Next action logic
  const nextActions = {
    'appointmentscheduled': { icon:'📋', text:'Follow up — waiting on customer decision' },
    'qualifiedtobuy':       { icon:'📋', text:'Quote updated — follow up with customer' },
    'contractsent':         { icon: ps==='paid'||ps==='po_received' ? '📦' : '💳',
                              text: ps==='paid'||ps==='po_received'
                                ? 'Payment confirmed — process the order when ready'
                                : 'Quote accepted — collect payment (CC or PO) to proceed' },
    'closedwon':            { icon:'📦', text:'Order in production — ship when complete' },
    '845719':               { icon:'✅', text:'Shipped — tracking active on shipping board' },
  };
  const na = nextActions[data.dealStage];

  // Pipeline stages
  const pipeStages = [
    { key:'appointmentscheduled', label:'Sent Quote' },
    { key:'qualifiedtobuy',       label:'Updated' },
    { key:'contractsent',         label:'Verbal Confirm' },
    { key:'closedwon',            label:'Closed Won' },
    { key:'845719',               label:'Shipped' },
  ];
  const curPipeIdx = pipeStages.findIndex(s => s.key === data.dealStage);
  const pipeHtml = pipeStages.map((s, i) => {
    const active = i === curPipeIdx;
    const past   = i < curPipeIdx;
    const bg     = active ? '#ee6216' : past ? 'rgba(238,98,22,.18)' : 'rgba(255,255,255,.04)';
    const color  = active ? '#fff' : past ? 'rgba(238,98,22,.8)' : 'rgba(255,255,255,.25)';
    const border = active ? '#ee6216' : past ? 'rgba(238,98,22,.2)' : 'rgba(255,255,255,.07)';
    const br = i===0 ? '7px 0 0 7px' : i===pipeStages.length-1 ? '0 7px 7px 0' : '0';
    return `<div class="pipe-step" style="background:${bg};color:${color};border-color:${border};border-radius:${br}" onclick="stageOverride('${s.key}','${s.label}')" title="Move to ${s.label}">${s.label}</div>`;
  }).join('');

  // Quotes
  const quotesHtml = !data.quotes?.length
    ? '<div style="font-size:12px;color:rgba(255,255,255,.3);font-style:italic;padding:6px 0">No quotes yet</div>'
    : data.quotes.map(q => {
        const accepted = q.accepted;
        const rowClass = accepted ? 'card-row card-row-accepted' : 'card-row card-row-normal';
        return `<div class="${rowClass}" onclick="loadQuote('${q.quoteNumber}','${q.shareToken||''}','${encodeURIComponent(q.quoteNumber)}')">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:700;color:#fff;font-family:var(--mono)">${q.quoteNumber}</span>
              ${accepted ? '<span style="font-size:10px;font-weight:800;color:#22c55e;background:rgba(34,197,94,.15);padding:2px 7px;border-radius:4px;border:1px solid rgba(34,197,94,.3)">✓ Accepted</span>' : ''}
            </div>
          </div>
          ${q.firstMdl ? `<span style="font-size:11px;color:${accepted?'rgba(34,197,94,.7)':'rgba(255,255,255,.4)'};font-family:var(--mono)">${q.firstMdl}</span>` : ''}
          <span style="font-size:13px;font-weight:700;color:${accepted?'#22c55e':'rgba(255,255,255,.8)'}">${fmt(q.total)}</span>
          <span style="font-size:11px;color:rgba(255,255,255,.3)">${fmtDate(q.date)}</span>
          ${q.shareToken ? `<a href="https://whisperroomquote.up.railway.app/q/${encodeURIComponent(q.quoteNumber)}?t=${q.shareToken}" target="_blank" onclick="event.stopPropagation()" style="font-size:10px;color:rgba(255,255,255,.25);text-decoration:none;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.08)">↗</a>` : ''}
          <span style="font-size:11px;color:${accepted?'#22c55e':'#ee6216'};flex-shrink:0">${accepted?'✓ Load':'Load →'}</span>
        </div>`;
      }).join('');

  // Invoices
  let invoicesHtml = '';
  if (data.invoices?.length) {
    invoicesHtml = data.invoices.map(inv => {
      const paid = inv.status === 'paid';
      const statusColor = { paid:'#22c55e', open:'#f59e0b', draft:'rgba(255,255,255,.35)', voided:'rgba(255,255,255,.2)', overdue:'#ef4444' }[inv.status] || 'rgba(255,255,255,.35)';
      return `<div class="card-row ${paid?'card-row-accepted':'card-row-normal'}" style="cursor:default">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:${paid?'#22c55e':'#fff'}">${inv.number||inv.title||'Invoice'}</span>
            ${paid ? '<span style="font-size:10px;font-weight:800;color:#22c55e;background:rgba(34,197,94,.15);padding:2px 7px;border-radius:4px;border:1px solid rgba(34,197,94,.3)">✓ Paid</span>'
                   : `<span style="font-size:10px;font-weight:700;color:${statusColor};text-transform:uppercase;letter-spacing:.06em">${inv.status}</span>`}
            ${inv.quoteNumber ? `<span style="font-size:10px;color:rgba(255,255,255,.25)">${inv.quoteNumber}</span>` : ''}
          </div>
        </div>
        <span style="font-size:13px;font-weight:700;color:${paid?'#22c55e':'rgba(255,255,255,.8)'}">${fmt(inv.amount)}</span>
        <span style="font-size:11px;color:rgba(255,255,255,.3)">${fmtDate(inv.date)}</span>
        ${inv.paymentPageUrl ? `<a href="${inv.paymentPageUrl}" target="_blank" style="font-size:10px;font-weight:600;color:#ee6216;text-decoration:none;padding:3px 8px;border-radius:4px;border:1px solid rgba(238,98,22,.25);white-space:nowrap">Invoice ↗</a>` : ''}
        ${inv.hubspotUrl ? `<a href="${inv.hubspotUrl}" target="_blank" style="font-size:10px;color:rgba(255,255,255,.25);text-decoration:none;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.08)">HS ↗</a>` : ''}
      </div>`;
    }).join('');
  }

  // Orders
  let ordersHtml = '';
  if (data.orders?.length) {
    ordersHtml = data.orders.map(ord => {
      const shipped = ord.shipped?.tracking;
      const matchQ  = data.quotes?.find(q => q.quoteNumber === ord.quoteNumber);
      return `<div class="card-row ${shipped?'card-row-accepted':'card-row-normal'}" style="cursor:default">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:#fff;font-family:var(--mono)">${ord.quoteNumber}</span>
            ${shipped
              ? `<span style="font-size:10px;font-weight:700;color:#22c55e;text-transform:uppercase;letter-spacing:.06em">✓ Shipped</span>
                 <span style="font-size:11px;color:rgba(255,255,255,.4);font-family:var(--mono)">${shipped}</span>`
              : `<span style="font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.06em">In Production</span>`}
          </div>
          ${ord.foamColor ? `<div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:3px">${ord.foamColor}${ord.hingePreference?' · '+ord.hingePreference:''}</div>` : ''}
        </div>
        ${matchQ?.shareToken ? `<a href="https://whisperroomquote.up.railway.app/o/${encodeURIComponent(ord.quoteNumber)}?t=${matchQ.shareToken}" target="_blank" style="font-size:10px;color:rgba(255,255,255,.3);text-decoration:none;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.08)">Order ↗</a>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('hubContent').innerHTML = `
    <!-- Header -->
    <div class="hub-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div style="flex:1;min-width:0">
          <div class="hub-deal-name">${deal.name || 'Deal'}</div>
          <div class="hub-deal-meta">
            ${deal.amount && parseFloat(deal.amount)>0 ? `<span style="font-size:15px;font-weight:700;color:var(--orange)">${fmt(deal.amount)}</span>` : ''}
            ${data.dealStage ? `<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:${STAGE_COLORS[data.dealStage]||'rgba(255,255,255,.06)'};color:${STAGE_TEXT[data.dealStage]||'rgba(255,255,255,.5)'}">${STAGES[data.dealStage]||data.dealStage}</span>` : ''}
            <span style="font-size:12px;font-weight:700;color:${PAY_COLORS[ps]};padding:3px 8px;border-radius:4px;border:1px solid ${PAY_COLORS[ps]};background:${ps==='paid'?'rgba(34,197,94,.1)':ps==='po_received'?'rgba(245,158,11,.1)':'rgba(255,255,255,.04)'}">${PAY_LABELS[ps]}</span>
            <span style="font-size:11px;color:var(--muted)">${REPS[deal.ownerId]||''}</span>
          </div>
        </div>
        <a href="https://app.hubspot.com/contacts/5764220/deal/${dealId}" target="_blank" style="font-size:11px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid var(--border);flex-shrink:0">HS ↗</a>
      </div>

      <!-- Quick actions -->
      <div class="hub-actions">
        <button class="btn btn-primary" onclick="newQuoteForDeal('${dealId}','${(deal.name||'').replace(/'/g,"\\'")}')">+ New Quote</button>
        ${data.quotes?.some(q=>q.accepted) ? `<button class="btn btn-secondary" onclick="loadLatestAccepted('${dealId}')">Load Accepted Quote</button>` : ''}
        <a href="/orders" class="btn btn-secondary" style="text-decoration:none">Orders Board</a>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="pipeline">${pipeHtml}</div>

    <!-- Next action -->
    ${na ? `<div class="next-action" style="margin:0 24px">
      <div style="font-size:20px">${na.icon}</div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.06em">Next Action</div>
        <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.85);margin-top:2px">${na.text}</div>
      </div>
    </div>` : ''}

    <!-- Body -->
    <div class="hub-body">

      <!-- Quotes -->
      <div>
        <div class="section-title">
          <span>Quotes <span style="color:var(--dim);font-weight:400">(${data.quotes?.length||0})</span></span>
        </div>
        ${quotesHtml}
      </div>

      <!-- Invoices -->
      ${data.invoices?.length ? `<div>
        <div class="section-title">Invoices <span style="color:var(--dim);font-weight:400">(${data.invoices.length})</span></div>
        ${invoicesHtml}
      </div>` : ''}

      <!-- Orders -->
      ${data.orders?.length ? `<div>
        <div class="section-title">Orders <span style="color:var(--dim);font-weight:400">(${data.orders.length})</span></div>
        ${ordersHtml}
      </div>` : ''}

      <!-- Admin -->
      <div class="admin-panel">
        <button onclick="toggleAdmin()" style="background:none;border:none;color:rgba(255,255,255,.3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.06em;padding:0;display:flex;align-items:center;gap:6px">
          ⚙ Admin Override <span id="adminCaret" style="font-size:9px">▼</span>
        </button>
        <div id="adminInner" style="display:none">
          <div class="admin-grid">
            <div>
              <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Payment Status</label>
              <select id="adminPayStatus" class="admin-select" onchange="savePaymentStatus(this.value)">
                <option value="not_paid" ${ps==='not_paid'?'selected':''}>Not Paid</option>
                <option value="po_received" ${ps==='po_received'?'selected':''}>PO Received</option>
                <option value="paid" ${ps==='paid'?'selected':''}>Paid</option>
              </select>
            </div>
            <div>
              <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Stage Override</label>
              <select id="adminStage" class="admin-select" onchange="stageOverride(this.value,this.options[this.selectedIndex].text)">
                ${Object.entries(STAGES).map(([k,v]) => `<option value="${k}" ${data.dealStage===k?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>
          <div id="adminStatus" style="margin-top:8px;font-size:11px;color:var(--dim)"></div>
        </div>
      </div>

    </div>
  `;
}

// ── Admin actions ───────────────────────────────────────────────────
function toggleAdmin() {
  const el = document.getElementById('adminInner');
  const ca = document.getElementById('adminCaret');
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (ca) ca.textContent = open ? '▼' : '▲';
}

async function savePaymentStatus(status) {
  if (!currentDealId) return;
  setAdminStatus('Saving…');
  try {
    const res = await fetch(`/api/deals/${currentDealId}/payment-status`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'}, credentials: 'include',
      body: JSON.stringify({ status })
    });
    const data = await res.json();
    if (data.success) {
      setAdminStatus('✓ Saved', '#22c55e');
      // Update deal in local list
      const d = allDeals.find(d => d.id === currentDealId);
      if (d) { d.paymentStatus = status; renderDealList(allDeals); }
      // Refresh hub after short delay
      setTimeout(() => openDeal(currentDealId), 800);
    } else throw new Error(data.error);
  } catch(e) { setAdminStatus('Error: ' + e.message, '#ef4444'); }
}

async function stageOverride(stage, label) {
  if (!currentDealId) return;
  const stageName = label || STAGES[stage] || stage;
  if (!confirm(`Move deal to "${stageName}"?`)) {
    // Reset select
    const sel = document.getElementById('adminStage');
    if (sel) sel.value = allDeals.find(d=>d.id===currentDealId)?.stage || '';
    return;
  }
  setAdminStatus('Saving…');
  try {
    const res = await fetch(`/api/deals/${currentDealId}/stage`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'}, credentials: 'include',
      body: JSON.stringify({ stage })
    });
    const data = await res.json();
    if (data.success) {
      setAdminStatus('✓ Stage updated', '#22c55e');
      const d = allDeals.find(d => d.id === currentDealId);
      if (d) { d.stage = stage; renderDealList(allDeals); }
      setTimeout(() => openDeal(currentDealId), 800);
    } else throw new Error(data.error);
  } catch(e) { setAdminStatus('Error: ' + e.message, '#ef4444'); }
}

function setAdminStatus(msg, color = 'rgba(255,255,255,.3)') {
  const el = document.getElementById('adminStatus');
  if (el) { el.textContent = msg; el.style.color = color; }
}

// ── Quote actions ───────────────────────────────────────────────────
function newQuote() {
  window.location.href = '/';
}

function newQuoteForDeal(dealId, dealName) {
  // Open quote builder with deal pre-selected via URL param
  window.location.href = `/?dealId=${dealId}&dealName=${encodeURIComponent(dealName)}`;
}

function loadQuote(quoteNumber, shareToken, encodedNum) {
  // Open quote builder and trigger load via URL param
  window.location.href = `/?loadQuote=${encodeURIComponent(quoteNumber)}`;
}

function loadLatestAccepted(dealId) {
  const deal = allDeals.find(d => d.id === dealId);
  if (deal?.latestQuote) {
    window.location.href = `/?loadQuote=${encodeURIComponent(deal.latestQuote)}`;
  }
}

// ── Search & filter ─────────────────────────────────────────────────
function onSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => loadDeals(val.trim()), 300);
}

function setStageFilter(btn, stage) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStageFilter = stage;
  loadDeals(document.getElementById('dealSearch').value.trim());
}

// ── Toast ───────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-msg toast-${type}`;
  el.textContent = msg;
  t.appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 3000);
}

// ── Init ─────────────────────────────────────────────────────────────
loadDeals();

// Handle URL params — if coming from quote builder with a deal
const urlParams = new URLSearchParams(window.location.search);
const openDealParam = urlParams.get('dealId');
if (openDealParam) {
  // Wait for deals to load then open
  setTimeout(() => openDeal(openDealParam), 800);
}

// ── Theme ───────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('wr-theme', isLight ? 'light' : 'dark');
}
if (localStorage.getItem('wr-theme') === 'light') {
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = '🌙';
  });
}
</script>
</body>
</html>
