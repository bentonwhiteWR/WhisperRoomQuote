<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Deal Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --surface3:#2a2a2a; --border:#2e2e2e;
  --text:#e8e8e8; --text2:#aaa; --muted:#666;
  --orange:#ee6216; --orange-dim:rgba(238,98,22,.12); --orange-border:rgba(238,98,22,.3);
  --green:#22c55e; --green-dim:rgba(34,197,94,.1); --amber:#f59e0b; --red:#ef4444;
  --mono:'JetBrains Mono','Consolas',monospace;
}
:root.light {
  --bg:#f0f0f0; --surface:#ffffff; --surface2:#f8f8f8; --surface3:#ececec; --border:#d8d8d8;
  --text:#111111; --text2:#555; --muted:#999;
  --orange:#c94f0e; --orange-dim:rgba(201,79,14,.08); --orange-border:rgba(201,79,14,.25);
  --green:#16a34a; --green-dim:rgba(22,163,74,.08); --amber:#d97706; --red:#dc2626;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
.topbar { display:flex; align-items:center; padding:0 20px; min-height:52px; background:#1a1a1a; border-bottom:1px solid rgba(255,255,255,.1); position:sticky; top:0; z-index:200; gap:10px; }
.topbar-logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#f0ede8; flex-shrink:0; margin-right:4px; }
.topbar-logo span { color:#e8531a; }
.topbar-nav { display:flex; gap:5px; align-items:center; flex:1; }
.nav-link { padding:5px 10px; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; border-radius:6px; color:rgba(255,255,255,.5); text-decoration:none; transition:.15s; white-space:nowrap; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); }
.nav-link:hover { background:rgba(255,255,255,.12); color:rgba(255,255,255,.9); }
.nav-link.active { background:rgba(238,98,22,.2); color:#ee6216; border-color:rgba(238,98,22,.4); }
.topbar-spacer { flex:1; }
.theme-btn { padding:5px 9px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:6px; color:#f0ede8; cursor:pointer; font-size:14px; line-height:1; flex-shrink:0; }
.main { display:flex; height:calc(100vh - 52px); overflow:hidden; }
.board-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.board-toolbar { padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex-shrink:0; }
.search-box { flex:1; min-width:180px; max-width:300px; position:relative; }
.search-box input { width:100%; padding:7px 12px 7px 30px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:12px; font-family:inherit; outline:none; }
.search-box input:focus { border-color:var(--orange-border); }
.search-box::before { content:"🔍"; position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:11px; pointer-events:none; }
.rep-select { padding:7px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:12px; font-family:inherit; outline:none; cursor:pointer; }
.board-count { font-size:11px; color:var(--muted); margin-left:auto; }
.board { flex:1; display:grid; grid-template-columns:repeat(4,minmax(170px,1fr)); gap:0; overflow-x:auto; overflow-y:hidden; }
.col { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
.col:last-child { border-right:none; }
.col-header { padding:10px 12px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.col-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; }
.col-count { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
.col-cards { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
.col-sent .col-title { color:#ee6216; } .col-sent .col-count { background:rgba(238,98,22,.12); color:#ee6216; }
.col-verbal .col-title { color:#f59e0b; } .col-verbal .col-count { background:rgba(245,158,11,.12); color:#f59e0b; }
.col-won .col-title { color:#22c55e; } .col-won .col-count { background:rgba(34,197,94,.12); color:#22c55e; }
.col-shipped .col-title { color:#3b82f6; } .col-shipped .col-count { background:rgba(59,130,246,.12); color:#3b82f6; }
.col-lost .col-title { color:var(--muted); } .col-lost .col-count { background:rgba(239,68,68,.08); color:var(--muted); }
.deal-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
.deal-card:hover { border-color:var(--orange-border); box-shadow:0 2px 8px rgba(0,0,0,.12); }
.deal-card.active { border-color:var(--orange); box-shadow:0 0 0 1px var(--orange); }
.deal-card.accepted { border-color:rgba(34,197,94,.35); background:var(--green-dim); }
.card-name { font-size:12px; font-weight:700; color:var(--text); line-height:1.3; margin-bottom:4px; }
.card-mdl  { font-size:10px; font-family:var(--mono); color:var(--text2); margin-bottom:4px; }
.card-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.card-amount { font-size:11px; font-weight:700; color:var(--orange); }
.card-rep    { font-size:10px; color:var(--muted); }
.card-age    { font-size:10px; color:var(--muted); margin-left:auto; }
.card-pay    { font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; }
.card-quote  { font-size:9px; font-family:var(--mono); color:var(--muted); margin-top:3px; }
.card-unintegrated-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); opacity:.4; flex-shrink:0; margin-left:auto; margin-top:2px; }
.deal-card.unintegrated { opacity:.65; }
.deal-card.unintegrated .card-name { color:var(--text2); }
.filter-toggle { padding:5px 10px; font-size:11px; font-weight:600; border-radius:5px; cursor:pointer; font-family:inherit; background:var(--surface2); border:1px solid var(--border); color:var(--muted); transition:.15s; white-space:nowrap; }
.filter-toggle.active { background:rgba(238,98,22,.12); border-color:var(--orange-border); color:var(--orange); }
.hub-panel { width:480px; flex-shrink:0; border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.hub-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
.hub-empty-icon { font-size:40px; opacity:.2; }
.hub-empty-text { font-size:13px; color:var(--muted); }
.hub-scroll { flex:1; overflow-y:auto; }
.hub-header { padding:18px 20px 14px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:10; }
.hub-name { font-size:17px; font-weight:800; color:var(--text); }
.hub-meta { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
.hub-actions { display:flex; gap:7px; margin-top:12px; flex-wrap:wrap; }
.btn { padding:7px 14px; font-size:11px; font-weight:700; border-radius:6px; cursor:pointer; font-family:inherit; border:none; transition:.15s; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.btn-orange { background:var(--orange); color:#fff; }
.btn-ghost  { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--orange-border); }
.btn-green  { background:var(--green-dim); color:var(--green); border:1px solid rgba(34,197,94,.3); }
.pipeline { display:flex; margin:12px 20px; border-radius:7px; overflow:hidden; border:1px solid var(--border); }
.pipe-step { flex:1; padding:8px 4px; text-align:center; font-size:10px; font-weight:700; cursor:pointer; transition:.12s; border-right:1px solid var(--border); user-select:none; }
.pipe-step:last-child { border-right:none; }
.next-action { margin:0 20px 12px; padding:10px 14px; border-radius:7px; display:flex; align-items:flex-start; gap:10px; background:var(--orange-dim); border:1px solid var(--orange-border); }
.na-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.na-label { font-size:9px; font-weight:800; color:var(--orange); text-transform:uppercase; letter-spacing:.07em; }
.na-text  { font-size:12px; font-weight:600; color:var(--text); margin-top:2px; line-height:1.4; }
.hub-section { padding:0 20px 16px; }
.section-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.row-card { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; margin-bottom:5px; cursor:pointer; transition:border-color .12s; }
.row-card:hover { border-color:var(--orange-border); }
.row-card.row-accepted { background:var(--green-dim); border-color:rgba(34,197,94,.3); }
.row-card.row-accepted:hover { border-color:var(--green); }
.row-card.row-paid { background:var(--green-dim); border-color:rgba(34,197,94,.3); cursor:default; }
.row-link { font-size:10px; color:var(--muted); text-decoration:none; padding:2px 7px; border-radius:4px; border:1px solid var(--border); flex-shrink:0; }
.row-link:hover { border-color:var(--orange-border); color:var(--orange); }
.row-date { font-size:10px; color:var(--muted); flex-shrink:0; }
.row-badge { font-size:9px; font-weight:800; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:.05em; flex-shrink:0; }
.admin-toggle { padding:0 20px 8px; }
.admin-btn { background:none; border:none; color:var(--muted); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; gap:5px; padding:6px 0; }
.admin-inner { padding:0 20px 16px; display:none; }
.admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.admin-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; display:block; margin-bottom:5px; }
.admin-select { width:100%; padding:7px 9px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; font-family:inherit; outline:none; cursor:pointer; }
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
.toast-msg { padding:9px 18px; border-radius:7px; font-size:12px; font-weight:600; color:#fff; opacity:0; transition:opacity .25s; white-space:nowrap; }
.toast-msg.show { opacity:1; }
.toast-success { background:#1a7a4a; } .toast-error { background:#7a1a1a; } .toast-info { background:#1a3a7a; }
::-webkit-scrollbar { width:5px; height:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.timeline-wrap { padding:0 0 8px; }
.tl-item { display:flex; gap:10px; padding:7px 0; position:relative; }
.tl-item::before { content:''; position:absolute; left:14px; top:30px; bottom:-7px; width:1px; background:var(--border); }
.tl-item:last-child::before { display:none; }
.tl-icon { width:28px; height:28px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; z-index:1; }
.tl-item.highlight .tl-icon { background:var(--green-dim); border-color:rgba(34,197,94,.3); }
.tl-body { flex:1; min-width:0; padding-top:3px; }
.tl-label { font-size:12px; font-weight:700; color:var(--text); line-height:1.3; }
.tl-item.highlight .tl-label { color:var(--green); }
.tl-detail { font-size:10px; color:var(--muted); margin-top:1px; }
.tl-time { font-size:10px; color:var(--muted); margin-top:2px; }
.tl-amount { font-size:11px; font-weight:700; color:var(--orange); margin-top:1px; }

/* Notifications */
.notif-bell { position:relative; padding:5px 9px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:6px; color:#f0ede8; cursor:pointer; font-size:14px; line-height:1; transition:all .15s; flex-shrink:0; }
.notif-bell:hover { background:rgba(255,255,255,.14); }
.notif-badge { position:absolute; top:-4px; right:-4px; background:#ee6216; color:#fff; font-size:9px; font-weight:800; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px; }
.notif-panel { position:fixed; top:52px; right:0; width:360px; height:calc(100vh - 52px); background:var(--surface); border-left:1px solid var(--border); box-shadow:-4px 0 20px rgba(0,0,0,.2); z-index:300; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
.notif-panel.open { transform:translateX(0); }
.notif-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.notif-title { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--text); }
.notif-list { flex:1; overflow-y:auto; }
.notif-item { padding:12px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.notif-item:hover { background:var(--surface2); }
.notif-item.unread { border-left:3px solid var(--orange); }
.notif-item.read { border-left:3px solid transparent; opacity:.7; }
.notif-item-title { font-size:12px; font-weight:700; color:var(--text); margin-bottom:3px; }
.notif-item-body { font-size:11px; color:var(--text2); line-height:1.4; }
.notif-item-time { font-size:10px; color:var(--muted); margin-top:4px; }
.notif-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:12px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Whisper<span>Room</span></div>
  <nav class="topbar-nav">
    <a href="/deals" class="nav-link active">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link">Shipping</a>
    <a href="/reports" class="nav-link">Reports</a>
  <span id="appVersion" style="font-size:9px;font-weight:700;color:var(--muted,rgba(255,255,255,.25));letter-spacing:.06em;padding:2px 6px;border:1px solid rgba(255,255,255,.08);border-radius:4px;font-family:monospace;flex-shrink:0"></span>
  </nav>
  <div class="topbar-spacer"></div>
  <div id="userBadge" style="display:none;align-items:center;gap:8px;flex-shrink:0">
    <span id="userName" style="font-size:11px;color:rgba(255,255,255,.5);font-weight:600"></span>
    <a href="/auth/logout" style="padding:5px 9px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.4);text-decoration:none;white-space:nowrap">Sign Out</a>
  </div>
  <button onclick="newQuote()" style="padding:5px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(238,98,22,.2);border:1px solid rgba(238,98,22,.4);border-radius:6px;color:#ee6216;cursor:pointer;font-family:inherit;white-space:nowrap">+ New Quote</button>
  <button class="notif-bell" id="notifBell" onclick="toggleNotifPanel()" title="Notifications">
    🔔<span class="notif-badge" id="notifBadge" style="display:none">0</span>
  </button>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
</div>

<div class="main">
  <div class="board-wrap">
    <div class="board-toolbar">
      <div class="search-box">
        <input id="dealSearch" type="text" placeholder="Search name, company, quote #…" oninput="onSearch()">
      </div>
      <select class="rep-select" id="repFilter" onchange="onRepFilter()">
        <option value="">All Reps</option>
        <option value="36330944">Jill</option>
        <option value="38143901">Sarah</option>
        <option value="117442978">Travis</option>
        <option value="36303670">Benton</option>
        <option value="36320208">Gabe</option>
        <option value="38732178">Kim</option>
        <option value="38900892">Chet</option>
        <option value="38732186">Jeromy</option>
      </select>
      <span class="board-count" id="boardCount"></span>
      <button class="filter-toggle" id="hideUnintegratedBtn" onclick="toggleHideUnintegrated()" title="Toggle display of HubSpot-only deals with no quotes or orders">
        ○ HubSpot Only
      </button>
    </div>
    <div class="board" id="board">
      <div style="padding:40px;text-align:center;color:var(--muted);grid-column:1/-1">Loading deals…</div>
    </div>
  </div>

  <div class="hub-panel" id="hubPanel">
    <div class="hub-empty" id="hubEmpty">
      <div class="hub-empty-icon">⬡</div>
      <div class="hub-empty-text">Select a deal</div>
    </div>
    <div id="hubContent" style="display:none" class="hub-scroll"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const REPS = {
  '36330944':'Jill','38143901':'Sarah','117442978':'Travis',
  '36303670':'Benton','36320208':'Gabe','38732178':'Kim',
  '38900892':'Chet','38732186':'Jeromy'
};
const STAGES = {
  'appointmentscheduled':'Sent Quote','qualifiedtobuy':'Updated Quote',
  'contractsent':'Verbal Confirmation','closedwon':'Closed Won',
  '845719':'Shipped','closedlost':'Closed Lost',
};
const COLUMNS = [
  {key:'sent',   label:'Sent / Updated', stages:['appointmentscheduled','qualifiedtobuy'], cls:'col-sent'},
  {key:'verbal', label:'Verbal Confirm', stages:['contractsent'],                         cls:'col-verbal'},
  {key:'won',    label:'Closed Won',     stages:['closedwon'],                             cls:'col-won'},
  {key:'shipped',label:'Shipped',        stages:['845719'],                                cls:'col-shipped'},

];
const PAY_COLORS = {paid:'#22c55e',po_received:'#f59e0b',not_paid:''};
const PAY_LABELS = {paid:'✓ Paid',po_received:'PO Rcvd',not_paid:''};
const PIPE_BG = {
  appointmentscheduled:'#ee6216',qualifiedtobuy:'#ee6216',contractsent:'#f59e0b',
  closedwon:'#22c55e','845719':'#3b82f6',closedlost:'#555'
};

let allDeals=[], filteredDeals=[], currentDealId=null, searchTimeout=null, currentRepFilter='';
let hideUnintegrated = false;

const fmt = n => '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtAge = d => {
  if(!d) return '';
  const s=(Date.now()-new Date(d))/1000;
  if(s<3600)  return Math.round(s/60)+'m';
  if(s<86400) return Math.round(s/3600)+'h';
  if(s<604800)return Math.round(s/86400)+'d';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/New_York'});
};
const fmtDate = d => d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'America/New_York'}):'—';

async function loadDeals() {
  try {
    const qs=new URLSearchParams({limit:200});
    if(currentRepFilter) qs.set('rep',currentRepFilter);
    const res=await fetch('/api/deals/list?'+qs,{credentials:'include'});
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    allDeals=data.deals||[];
    applyFilter();
  } catch(e) {
    document.getElementById('board').innerHTML=`<div style="padding:40px;color:#ef4444;grid-column:1/-1">Error: ${e.message}</div>`;
  }
}

function applyFilter() {
  const q=document.getElementById('dealSearch').value.trim().toLowerCase();
  filteredDeals=!q?[...allDeals]:allDeals.filter(d=>
    d.name?.toLowerCase().includes(q)||
    d.latestQuote?.toLowerCase().includes(q)||
    REPS[d.ownerId]?.toLowerCase().includes(q)
  );
  renderBoard();
}

function toggleHideUnintegrated() {
  hideUnintegrated = !hideUnintegrated;
  const btn = document.getElementById('hideUnintegratedBtn');
  if (btn) {
    btn.classList.toggle('active', hideUnintegrated);
    btn.textContent = hideUnintegrated ? '● Hide HubSpot Only' : '○ HubSpot Only';
  }
  renderBoard();
}

function renderBoard() {
  const board=document.getElementById('board');
  board.innerHTML='';
  let total=0;
  COLUMNS.forEach(col => {
    const deals=filteredDeals.filter(d=>col.stages.includes(d.stage));
    total+=deals.length;
    const colEl=document.createElement('div');
    colEl.className=`col ${col.cls}`;
    colEl.innerHTML=`<div class="col-header"><span class="col-title">${col.label}</span><span class="col-count">${deals.length}</span></div>`;
    const cardsEl=document.createElement('div');
    cardsEl.className='col-cards';
    if(!deals.length) {
      cardsEl.innerHTML='<div style="font-size:11px;color:var(--muted);text-align:center;padding:16px 4px;font-style:italic">No deals</div>';
    } else {
      deals.forEach(d => {
        // A deal is "unintegrated" if it has no quotes/orders in our system
        // Only flag Sent/Updated Quote stages — not newer or further-along deals
        const earlyStage = d.stage === 'appointmentscheduled' || d.stage === 'qualifiedtobuy';
        const isUnintegrated = earlyStage && !d.latestQuote && !d.accepted && d.paymentStatus === 'not_paid';
        if (hideUnintegrated && isUnintegrated) return;
        const card=document.createElement('div');
        const dealGreen = (d.accepted || d.paymentStatus==='paid' || d.paymentStatus==='po_received') && d.id!==currentDealId;
        card.className='deal-card'+(d.id===currentDealId?' active':'')+(dealGreen?' accepted':'')+(isUnintegrated?' unintegrated':'');
        card.onclick=()=>openDeal(d.id);
        const ps=d.paymentStatus||'not_paid';
        const payBg=ps==='paid'?'rgba(34,197,94,.12)':'rgba(245,158,11,.1)';
        const payHtml=ps!=='not_paid'
          ?`<span class="card-pay" style="color:${PAY_COLORS[ps]};background:${payBg};border:1px solid ${PAY_COLORS[ps]}">${PAY_LABELS[ps]}</span>`
          :'';
        card.innerHTML=`
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px">
            <div class="card-name" style="flex:1">${d.name}</div>
            ${isUnintegrated?`<div class="card-unintegrated-dot" title="HubSpot only — no quotes or orders in this system"></div>`:''}
          </div>
          ${d.firstMdl?`<div class="card-mdl">${d.firstMdl}</div>`:''}
          <div class="card-meta">
            ${d.amount&&parseFloat(d.amount)>0?`<span class="card-amount">${fmt(d.amount)}</span>`:''}
            ${payHtml}
            <span class="card-rep">${REPS[d.ownerId]||'—'}</span>
            <span class="card-age">${fmtAge(d.modified)}</span>
          </div>
          ${d.latestQuote?`<div class="card-quote">${d.latestQuote}</div>`:''}
        `;
        cardsEl.appendChild(card);
      });
    }
    colEl.appendChild(cardsEl);
    board.appendChild(colEl);
  });
  document.getElementById('boardCount').textContent=`${total} deals`;
}

async function openDeal(dealId) {
  currentDealId=dealId;
  renderBoard();
  _timelineLoaded = false;
  document.getElementById('hubEmpty').style.display='none';
  const hc=document.getElementById('hubContent');
  hc.style.display='block';
  hc.innerHTML='<div style="padding:48px;text-align:center;color:var(--muted);font-size:13px">Loading…</div>';
  try {
    const res=await fetch(`/api/deals/${dealId}/hub`,{credentials:'include'});
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    renderHub(dealId,data);
  } catch(e) {
    hc.innerHTML=`<div style="padding:40px;color:#ef4444;font-size:13px">Error: ${e.message}</div>`;
  }
}

// ── Timeline ───────────────────────────────────────────────────────
let _timelineLoaded = false;

function toggleTimeline() {
  const wrap  = document.getElementById('timelineWrap');
  const caret = document.getElementById('timelineCaret');
  const open  = wrap.style.display === 'block';
  wrap.style.display  = open ? 'none' : 'block';
  caret.textContent   = open ? '▼' : '▲';
  if (!open && !_timelineLoaded) {
    _timelineLoaded = true;
    loadTimeline();
  }
}

async function loadTimeline() {
  if (!currentDealId) return;
  const el = document.getElementById('timelineContent');
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px">Loading…</div>';
  try {
    const res  = await fetch(`/api/deals/${currentDealId}/timeline`, { credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderTimeline(data.events || []);
  } catch(e) {
    el.innerHTML = `<div style="font-size:12px;color:var(--red);padding:12px">Error: ${e.message}</div>`;
  }
}

function renderTimeline(events) {
  const el = document.getElementById('timelineContent');
  if (!events.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);font-style:italic;padding:8px 0">No activity recorded yet</div>';
    return;
  }

  const fmtTs = iso => {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'America/New_York'})
      + ' · ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
  };
  const fmtMoney = n => n ? ' $'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '';

  // Render newest first
  const reversed = [...events].reverse();
  el.className = 'timeline-wrap';
  el.innerHTML = reversed.map(e => `
    <div class="tl-item${e.highlight?' highlight':''}">
      <div class="tl-icon">${e.icon||'·'}</div>
      <div class="tl-body">
        <div class="tl-label">${e.label||''}</div>
        ${e.detail?`<div class="tl-detail">${e.detail}</div>`:''}
        ${e.amount?`<div class="tl-amount">${fmtMoney(e.amount)}</div>`:''}
        ${e.rep?`<div class="tl-detail">${e.rep}</div>`:''}
        <div class="tl-time">${fmtTs(e.at)}</div>
      </div>
    </div>
  `).join('');
}

function copyQuoteLink(quoteNumber, shareToken) {
  if (!shareToken) { showToast('No share token — push quote first', 'error'); return; }
  const url = `https://sales.whisperroom.com/q/${encodeURIComponent(quoteNumber)}?t=${shareToken}`;
  navigator.clipboard?.writeText(url).then(() => showToast('Link copied!', 'success'))
    .catch(() => { prompt('Copy link:', url); });
}

function emailQuote(quoteNumber, shareToken) {
  if (!shareToken) { showToast('No share token — push quote first', 'error'); return; }
  const deal    = allDeals.find(d => d.id === currentDealId) || {};
  const contact = window._hubContact || {};
  const toEmail = contact.email || '';
  const name    = [contact.firstName, contact.lastName].filter(Boolean).join(' ') || contact.company || 'there';
  const url     = `https://sales.whisperroom.com/q/${encodeURIComponent(quoteNumber)}?t=${shareToken}`;
  const subj    = encodeURIComponent(`Your WhisperRoom Quote — ${deal.name || quoteNumber}`);
  const body    = encodeURIComponent(`Hi ${name},\n\nPlease find your WhisperRoom quote at the link below:\n\n${url}\n\nYou can review and accept your quote directly through the link above.\n\nIf you have any questions, please don't hesitate to reach out.\n\nBest regards,\nWhisperRoom, Inc.\n1-800-200-8168`);
  window.open(`mailto:${toEmail}?subject=${subj}&body=${body}`, '_blank');
}

function emailInvoiceLink(invoiceUrl) {
  const deal    = allDeals.find(d => d.id === currentDealId) || {};

}

async function createInvoiceForDeal(event, quoteNumber) {
  event.stopPropagation();
  if (!currentDealId) return;

  // Find the accepted quote's snapshot data from the hub cache
  const hubData = window._lastHubData;
  const q = hubData?.quotes?.find(q => q.quoteNumber === quoteNumber) || hubData?.quotes?.find(q => q.accepted);
  if (!q) { showToast('No accepted quote found', 'error'); return; }

  // Fetch full snapshot for line items
  if (!confirm(`Create invoice for ${quoteNumber}?`)) return;
  const btn = event.target;
  btn.textContent = '...';
  btn.disabled = true;
  try {
    // Load snapshot from history endpoint
    const snapRes = await fetch(`/api/quote-snapshot/${encodeURIComponent(q.quoteNumber)}`, { credentials:'include' });
    const snap = await snapRes.json();
    if (snap.error) throw new Error(snap.error);

    const res = await fetch('/api/create-invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        dealId:     currentDealId,
        quoteNumber: q.quoteNumber,
        lineItems:  snap.lineItems  || [],
        freight:    snap.freight    || null,
        tax:        snap.tax        || null,
        discount:   snap.discount   || { type:'pct', value:0 },
        customer:   snap.customer   || {},
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ Invoice created!', 'success');
      // Reload hub to show new invoice
      setTimeout(() => openDeal(currentDealId), 800);
    } else {
      throw new Error(data.error || 'Invoice creation failed');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.textContent = '+ Invoice';
    btn.disabled = false;
  }
}

function processOrderFromHub(event, quoteNumber) {
  event.stopPropagation();
  if (!currentDealId) return;
  window.location.href = `/quotes?loadQuote=${encodeURIComponent(quoteNumber)}&fromHub=${currentDealId}`;
}

function showPaymentPicker(quoteNumber, event) {
  event.stopPropagation();
  // Remove any existing picker
  document.querySelectorAll('.payment-picker').forEach(el => el.remove());
  const picker = document.createElement('div');
  picker.className = 'payment-picker';
  picker.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:1000;min-width:150px;overflow:hidden';
  const options = [
    { value:'not_paid',   label:'Not Paid',    color:'var(--muted)' },
    { value:'po_received',label:'PO Received', color:'var(--amber)' },
    { value:'paid',       label:'✓ Paid',       color:'var(--green)' },
  ];
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.style.cssText = `display:block;width:100%;padding:9px 16px;background:none;border:none;text-align:left;font-size:12px;font-weight:600;color:${opt.color};cursor:pointer;font-family:inherit;border-bottom:1px solid var(--border)`;
    btn.textContent = opt.label;
    btn.onmouseenter = () => btn.style.background = 'var(--surface2)';
    btn.onmouseleave = () => btn.style.background = 'none';
    btn.onclick = (e) => {
      e.stopPropagation();
      picker.remove();
      setPaymentStatus(quoteNumber, opt.value);
    };
    picker.appendChild(btn);
  });
  // Remove last border
  picker.lastChild.style.borderBottom = 'none';
  // Position near button
  const rect = event.target.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.top  = (rect.bottom + 4) + 'px';
  document.body.appendChild(picker);
  // Close on outside click
  setTimeout(() => document.addEventListener('click', () => picker.remove(), { once: true }), 0);
}

async function setPaymentStatus(quoteNumber, status) {
  if (!currentDealId) return;
  try {
    const res = await fetch(`/api/deals/${currentDealId}/payment-status`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'}, credentials: 'include',
      body: JSON.stringify({ status })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    if (status === 'paid' && window._lastHubData) window._lastHubData._paidQuoteNumber = quoteNumber;
    const d = allDeals.find(d => d.id === currentDealId);
    if (d) { d.paymentStatus = status; renderBoard(); }
    const labels = { paid:'✓ Paid', po_received:'PO Received', not_paid:'Not Paid' };
    showToast(`${labels[status]} set`, 'success');
    setTimeout(() => openDeal(currentDealId), 600);
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function markQuotePaid(quoteNumber) {
  showPaymentPicker(quoteNumber, { target: document.body, stopPropagation:()=>{} });
}

function toggleAdmin() {
  const inner=document.getElementById('adminInner');
  const caret=document.getElementById('adminCaret');
  const open=inner.style.display==='block';
  inner.style.display=open?'none':'block';
  if(caret) caret.textContent=open?'▼':'▲';
}
function setAdminStatus(msg,color) {
  const el=document.getElementById('adminStatus');
  if(el){el.textContent=msg;el.style.color=color||'var(--muted)';}
}
async function doPaymentStatus(status) {
  if(!currentDealId) return;
  setAdminStatus('Saving…');
  try {
    const res=await fetch(`/api/deals/${currentDealId}/payment-status`,{method:'PATCH',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({status})});
    const data=await res.json();
    if(!data.success) throw new Error(data.error);
    setAdminStatus('✓ Saved','var(--green)');
    const d=allDeals.find(d=>d.id===currentDealId);
    if(d){d.paymentStatus=status;renderBoard();}
    setTimeout(()=>openDeal(currentDealId),600);
  } catch(e){setAdminStatus('Error: '+e.message,'var(--red)');}
}
async function doDeleteDeal() {
  if (!currentDealId) return;
  const deal = allDeals.find(d => d.id === currentDealId);
  const name = deal?.name || currentDealId;
  if (!confirm(`Permanently delete "${name}" and ALL its quotes from the database and HubSpot?

This cannot be undone.`)) return;
  // Second confirmation for safety
  if (!confirm(`Are you sure? This will delete the HubSpot deal and all associated DB records for "${name}".`)) return;
  setAdminStatus('Deleting…');
  try {
    const res = await fetch(`/api/deals/${currentDealId}/delete`, {
      method: 'DELETE',
      credentials: 'include'
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    showToast(`"${name}" deleted`, 'success');
    // Remove from local list and re-render
    allDeals = allDeals.filter(d => d.id !== currentDealId);
    filteredDeals = filteredDeals.filter(d => d.id !== currentDealId);
    currentDealId = null;
    document.getElementById('hubEmpty').style.display = 'flex';
    document.getElementById('hubContent').style.display = 'none';
    renderBoard();
  } catch(e) {
    setAdminStatus('Error: ' + e.message, 'var(--red)');
    showToast('Delete failed: ' + e.message, 'error');
  }
}

async function doStageOverride(stage,label) {
  if(!currentDealId) return;
  if(!confirm(`Move deal to "${label||STAGES[stage]||stage}"?`)){
    const sel=document.getElementById('adminStageSelect');
    const d=allDeals.find(d=>d.id===currentDealId);
    if(sel&&d) sel.value=d.stage||'';
    return;
  }
  setAdminStatus('Saving…');
  try {
    const res=await fetch(`/api/deals/${currentDealId}/stage`,{method:'PATCH',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({stage})});
    const data=await res.json();
    if(!data.success) throw new Error(data.error);
    setAdminStatus('✓ Stage updated','var(--green)');
    const d=allDeals.find(d=>d.id===currentDealId);
    if(d){d.stage=stage;renderBoard();}
    setTimeout(()=>openDeal(currentDealId),600);
  } catch(e){setAdminStatus('Error: '+e.message,'var(--red)');}
}
function onSearch() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('dealSearch').value.trim();
  if (q.length === 0) {
    // Back to cached deals
    filteredDeals = [...allDeals];
    renderBoard();
  } else if (q.length >= 2) {
    // Live HubSpot search for full history
    searchTimeout = setTimeout(() => searchAllDeals(q), 300);
  }
}

async function searchAllDeals(q) {
  document.getElementById('boardCount').textContent = 'Searching…';
  try {
    const qs = new URLSearchParams({ q, limit: 50 });
    if (currentRepFilter) qs.set('rep', currentRepFilter);
    const res  = await fetch('/api/deals/list?' + qs, { credentials: 'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    filteredDeals = data.deals || [];
    renderBoard();
  } catch(e) {
    document.getElementById('boardCount').textContent = 'Search error';
  }
}
function onRepFilter() { currentRepFilter=document.getElementById('repFilter').value; loadDeals(); }
function showToast(msg,type='info') {
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className=`toast-msg toast-${type}`;
  el.textContent=msg;
  t.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3000);
}
function toggleTheme() {
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('wr-theme',isLight?'light':'dark');
}
if(localStorage.getItem('wr-theme')==='light'){
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeBtn');if(b)b.textContent='🌙';});
}
loadDeals();
const _p=new URLSearchParams(window.location.search);
const _od=_p.get('dealId');
if(_od) setTimeout(()=>openDeal(_od),900);

// ── Session user ──────────────────────────────────────────────────
async function loadCurrentUser() {
  try {
    const res  = await fetch('/api/me', { credentials:'include' });
    const data = await res.json();
    if (data.name) {
      const badge = document.getElementById('userBadge');
      const name  = document.getElementById('userName');
      if (badge) badge.style.display = 'flex';
      if (name)  name.textContent = data.name;
    }
    // Auto-filter to logged-in rep's deals (they can clear it to see all)
    if (data.ownerId) {
      const repSel = document.getElementById('repFilter');
      if (repSel) {
        repSel.value = data.ownerId;
        currentRepFilter = data.ownerId;
      }
    }
  } catch(e) {}
}
loadCurrentUser();

// Auto-redirect to login on 401 (session expired or revoked)
const _origFetch = window.fetch;
window.fetch = async function(...args) {
  const res = await _origFetch(...args);
  if (res.status === 401) {
    const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '';
    if (url.startsWith('/api/')) {
      console.warn('401 on', url, '— redirecting to login');
      window.location.href = '/';
    }
  }
  return res;
};


// ── App version ───────────────────────────────────────────────────
fetch('/api/version').then(r=>r.json()).then(d=>{
  const el=document.getElementById('appVersion');
  if(el&&d.version) el.textContent='v'+d.version;
}).catch(()=>{});
</script>

<div class="notif-panel" id="notifPanel">

<!-- ── Merge Legacy Folder Modal ─────────────────────────────────── -->
<div id="mergeLegacyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:14px;padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)">
    <h2 style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px">📁 Merge Legacy Folder</h2>
    <div id="mergeLegacyDealName" style="font-size:12px;color:var(--muted);margin-bottom:20px"></div>

    <!-- Step 1: Search -->
    <div id="mergeLegacyStep1">
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px">Search AllContacts folder by name</label>
      <div style="display:flex;gap:8px">
        <input id="mergeLegacySearch" type="text" placeholder="e.g. Josie OGara or University of Texas"
          style="flex:1;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none"
          oninput="mergeLegacySearchDebounce()" />
        <button onclick="runMergeLegacySearch()" style="padding:9px 14px;background:var(--orange);color:white;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Search</button>
      </div>
      <div id="mergeLegacyResults" style="margin-top:12px"></div>
    </div>

    <!-- Step 2: Confirm -->
    <div id="mergeLegacyStep2" style="display:none">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Selected folder to merge</div>
        <div id="mergeLegacySelectedName" style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px"></div>
        <div style="font-size:11px;color:var(--muted)">All files will be moved into this deal's folder. The legacy folder will be deleted.</div>
      </div>
      <div style="display:flex;gap:8px">
        <button id="mergeLegacyConfirmBtn" onclick="confirmMergeLegacy()" style="flex:1;padding:13px;background:var(--green);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✓ Confirm Merge</button>
        <button onclick="mergeLegacyBack()" style="padding:13px 14px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">← Back</button>
        <button onclick="closeMergeLegacy()" style="padding:13px 14px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Cancel</button>
      </div>
    </div>

    <!-- Cancel (step 1) -->
    <div id="mergeLegacyStep1Cancel" style="margin-top:16px;text-align:right">
      <button onclick="closeMergeLegacy()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Merge Legacy Folder ───────────────────────────────────────────
let _mergeLegacyDealId = null;
let _mergeLegacySelectedFolder = null;
let _mergeLegacySearchTimer = null;

function openMergeLegacy(dealId) {
  _mergeLegacyDealId = dealId;
  _mergeLegacySelectedFolder = null;
  const deal = allDeals.find(d => d.id === dealId) || {};
  document.getElementById('mergeLegacyDealName').textContent = deal.name || dealId;
  document.getElementById('mergeLegacySearch').value = deal.name
    ? deal.name.replace(/\s*[·\-–—]\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{4}\s*$/i, '').trim()
    : '';
  document.getElementById('mergeLegacyResults').innerHTML = '';
  document.getElementById('mergeLegacyStep1').style.display = 'block';
  document.getElementById('mergeLegacyStep1Cancel').style.display = 'block';
  document.getElementById('mergeLegacyStep2').style.display = 'none';
  document.getElementById('mergeLegacyModal').style.display = 'flex';
}

function closeMergeLegacy() {
  document.getElementById('mergeLegacyModal').style.display = 'none';
  _mergeLegacyDealId = null;
  _mergeLegacySelectedFolder = null;
}

function mergeLegacyBack() {
  document.getElementById('mergeLegacyStep2').style.display = 'none';
  document.getElementById('mergeLegacyStep1').style.display = 'block';
  document.getElementById('mergeLegacyStep1Cancel').style.display = 'block';
  _mergeLegacySelectedFolder = null;
}

function mergeLegacySearchDebounce() {
  clearTimeout(_mergeLegacySearchTimer);
  _mergeLegacySearchTimer = setTimeout(runMergeLegacySearch, 400);
}

async function runMergeLegacySearch() {
  const q = document.getElementById('mergeLegacySearch').value.trim();
  if (!q) return;
  const el = document.getElementById('mergeLegacyResults');
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0">Searching…</div>';
  try {
    const res = await fetch(`/api/drive/search-legacy-folder?q=${encodeURIComponent(q)}`, { credentials: 'include' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    if (!data.folders.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0">No folders found matching that name.</div>';
      return;
    }
    el.innerHTML = data.folders.map(f => `
      <div onclick="selectMergeLegacyFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')"
        style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px">
        📁 ${f.name}
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div style="font-size:12px;color:#ef4444;padding:8px 0">Error: ${e.message}</div>`;
  }
}

function selectMergeLegacyFolder(id, name) {
  _mergeLegacySelectedFolder = { id, name };
  document.getElementById('mergeLegacySelectedName').textContent = name;
  document.getElementById('mergeLegacyStep1').style.display = 'none';
  document.getElementById('mergeLegacyStep1Cancel').style.display = 'none';
  document.getElementById('mergeLegacyStep2').style.display = 'block';
}

async function confirmMergeLegacy() {
  if (!_mergeLegacySelectedFolder || !_mergeLegacyDealId) return;
  const deal = allDeals.find(d => d.id === _mergeLegacyDealId) || {};

  // Find quote number for this deal if available
  const hubData = window._lastHubData;
  const quoteNumber = hubData?.quotes?.[0]?.quoteNumber || null;
  const dealName = deal.name || '';
  const companyName = hubData?.contact?.company || '';

  const btn = document.getElementById('mergeLegacyConfirmBtn');
  btn.disabled = true;
  btn.textContent = 'Merging…';

  try {
    const res = await fetch('/api/drive/merge-legacy-folder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        legacyFolderId: _mergeLegacySelectedFolder.id,
        quoteNumber,
        dealName,
        companyName,
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    closeMergeLegacy();
    showToast(`✓ ${data.message}`, 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '✓ Confirm Merge';
  }
}
</script>
