<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperRoom — Email Reply Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F7F5;
      --surface: #ffffff;
      --border: #E5E5E0;
      --text: #2A2A2A;
      --muted: #888;
      --accent: #E8743C;
      --accent-hover: #D4642F;
      --accent-soft: #FDF2EC;
      --danger: #C53030;
      --warn-bg: #FFF3CD;
      --warn-text: #C92E2E;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* WhisperRoom topbar (matches the other dashboards) */
    .topbar {
      display: flex; align-items: center; padding: 0 20px;
      min-height: 52px; background: #1a1a1a;
      border-bottom: 1px solid rgba(255,255,255,.1);
      position: sticky; top: 0; z-index: 200; gap: 10px;
    }
    .topbar-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #f0ede8; flex-shrink: 0; }
    .topbar-logo span { color: #e8531a; }
    .topbar-nav { display: flex; gap: 5px; align-items: center; flex: 1; }
    .nav-link {
      padding: 5px 10px; font-size: 11px; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; border-radius: 6px; color: rgba(255,255,255,.5);
      text-decoration: none; transition: .15s; white-space: nowrap;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    }
    .nav-link:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.9); }
    .nav-link.active { background: rgba(238,98,22,.2); color: #ee6216; border-color: rgba(238,98,22,.4); }
    .topbar-spacer { flex: 1; }

    /* ── Workspace ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 48px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 20px;
    }
    @media (max-width: 880px) { main { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }
    .panel-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); margin-bottom: 12px;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }

    /* ── Rep selector ── */
    .rep-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .rep-row label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted); white-space: nowrap;
    }
    .rep-row select {
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.85rem; font-family: inherit; color: var(--text);
      background: #FAFAF8; cursor: pointer;
    }
    .rep-row select:focus { outline: none; border-color: var(--accent); }

    /* ── Inputs ── */
    textarea {
      width: 100%; flex: 1; padding: 14px 16px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.85rem; resize: none; line-height: 1.6;
      color: var(--text); background: #FAFAF8;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      transition: border-color 0.15s; min-height: 320px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 28px; margin-top: 14px;
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-dots { display: none; gap: 4px; align-items: center; }
    .loading-dots span {
      width: 6px; height: 6px; background: #fff; border-radius: 50%;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .loading-dots { display: flex; }

    .btn-secondary {
      padding: 6px 14px; background: #fff; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 4px;
      font-size: 0.75rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-secondary:hover { background: var(--accent-soft); }
    .btn-secondary.copied { background: var(--accent); color: #fff; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); color: var(--muted); }

    /* ── Output ── */
    #replyOutput {
      flex: 1; font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 0.88rem; line-height: 1.6; color: var(--text);
      overflow-y: auto; padding: 14px 16px;
      border: 1px solid var(--border); border-radius: 6px; background: #fff;
      white-space: pre-wrap; word-wrap: break-word; min-height: 380px;
    }
    #replyOutput.empty {
      color: var(--muted); font-style: italic; display: flex;
      align-items: center; justify-content: center; text-align: center; padding: 40px 20px;
    }
    #replyOutput a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    #replyOutput a:hover { color: var(--accent-hover); }
    #replyOutput a.placeholder-link {
      color: var(--warn-text); background-color: var(--warn-bg);
      padding: 2px 6px 2px 0; margin: 0; border-radius: 3px;
      text-decoration: underline; font-weight: 600;
    }
    #replyOutput a.placeholder-link:hover { color: var(--warn-text); }
    #replyOutput .placeholder-note { color: var(--warn-text); font-style: italic; font-size: 0.9em; margin-left: 4px; }

    /* ── Error ── */
    .error-msg {
      display: none; align-items: center; justify-content: space-between;
      background: #fff; color: var(--danger); border: 1px solid #E8AAAA;
      border-radius: 6px; padding: 12px 16px; font-size: 0.82rem; margin-top: 12px;
    }
    .error-msg.visible { display: flex; }
    .error-dismiss {
      background: none; border: none; color: var(--danger);
      font-size: 1.1rem; cursor: pointer; padding: 0 0 0 12px;
      line-height: 1; opacity: 0.6;
    }
    .error-dismiss:hover { opacity: 1; }

    footer { text-align: center; padding: 24px 0 20px; font-size: 0.7rem; color: #AAA; letter-spacing: 0.5px; }

    /* Embed mode (?embed=1) — when iframed inside the Deal Hub modal,
       suppress the topbar + footer. Panels stay at their natural
       min-height (520px); the parent dashboard sizes the modal/iframe
       to match the natural content height so the popup's bottom edge
       lands right at the Generate Reply button, no dead space. */
    body.embedded .topbar { display: none; }
    body.embedded footer  { display: none; }
    body.embedded main    { padding: 18px 20px; }

    /* Dark mode (?theme=dark) — opted in by the parent dashboard when the
       rep is on dark mode. Without this, opening the popup over a dark
       dashboard is a wall of bright white. Overrides the CSS vars + the
       handful of hardcoded backgrounds (textarea, reply output, error msg). */
    body.dark {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --muted: #888;
      --accent-soft: rgba(232,116,60,.15);
      --warn-bg: rgba(245,158,11,.18);
      --warn-text: #f59e0b;
    }
    body.dark textarea       { background: #111; color: var(--text); border-color: var(--border); }
    body.dark .rep-row select{ background: #111; color: var(--text); border-color: var(--border); }
    body.dark #replyOutput   { background: #111; color: var(--text); border-color: var(--border); }
    body.dark .panel         { background: var(--surface); border-color: var(--border); }
    body.dark .error-msg     { background: #2a1010; border-color: #5a2020; color: #ffb4b4; }
    body.dark .btn-secondary { background: #1a1a1a; color: var(--accent); border-color: var(--accent); }
    body.dark .btn-secondary:hover { background: var(--accent-soft); }
    body.dark #replyOutput.empty { color: var(--muted); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Whisper<span>Room</span></div>
  <nav class="topbar-nav">
    <a href="/deals" class="nav-link">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link">Shipping</a>
    <a href="/reports" class="nav-link">Reports</a>
    <a href="/email-reply" class="nav-link active">✉️ Email Reply</a>
    <a href="/accounting" class="nav-link">Accounting</a>
    <a href="/suppliers" class="nav-link">Suppliers</a>
  </nav>
  <div class="topbar-spacer"></div>
</div>

<main>
  <!-- Input panel -->
  <section class="panel">
    <span class="panel-label">Inbound Email / Lead</span>
    <div class="rep-row">
      <label for="repSelect">Voice</label>
      <select id="repSelect">
        <option value="">Select voice...</option>
        <option value="jill">Jill</option>
        <option value="sarah">Sarah</option>
        <option value="travis">Travis</option>
      </select>
    </div>
    <textarea id="leadInput" placeholder="Paste the customer email or HubSpot lead notification here..."></textarea>
    <button class="btn-primary" id="generateBtn" onclick="generate()">
      <span class="btn-label">Generate Reply</span>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </button>
    <div class="error-msg" id="errorMsg">
      <span id="errorText"></span>
      <button class="error-dismiss" onclick="dismissError()">&times;</button>
    </div>
  </section>

  <!-- Output panel -->
  <section class="panel">
    <div class="panel-header">
      <span class="panel-label" style="margin-bottom: 0;">Generated Reply</span>
      <button class="btn-secondary" id="copyBtn" onclick="copyReply()" disabled>Copy to Clipboard</button>
    </div>
    <div id="replyOutput" class="empty">Generated reply will appear here.</div>
  </section>
</main>

<footer>Internal tool &middot; WhisperRoom, Inc.</footer>

<!-- Inlined product link data (injected at request time by GET /email-reply) -->
<script type="application/json" id="product-links">__PRODUCT_LINKS__</script>

<script>
"use strict";

// ====== Embed mode + theme (driven by ?embed=1&theme=dark from parent) ======
const _qs = new URLSearchParams(location.search);
if (_qs.get("embed") === "1") document.body.classList.add("embedded");
if (_qs.get("theme") === "dark") document.body.classList.add("dark");

// ====== Constants ======
const PRODUCT_LINKS = JSON.parse(document.getElementById("product-links").textContent);
const PRODUCT_NAMES = Object.keys(PRODUCT_LINKS);
const PRODUCT_NAMES_SORTED = [...PRODUCT_NAMES].sort((a, b) => b.length - a.length);

// Real rep intros pulled from observed sent-reply audits. These already
// contain a "Thank you for your interest..." preamble; replaceIntroLine
// swaps the AI's greeting+intro block with the rep-specific opening so the
// time-of-day greeting + thank-you + intro flow naturally as one unit.
const REP_INTROS = {
  jill: "Thank you for your interest in WhisperRoom, Inc. I am Jill Holdway; the Sales Manager and will be happy to assist you.",
  sarah: "Thank you for your interest in WhisperRoom, Inc. and reaching out. My name is Sarah and I'll be happy to answer any questions you may have!",
  travis: "Thanks so much for contacting WhisperRoom. My name is Travis and I'm happy to help with your request.",
};

const REP_HEADER_NAMES = {
  jill: "Jill Holdway, Sales Manager",
  sarah: "Sarah, Product Representative",
  travis: "Travis Singleton, Product Representative",
};

function getTimeOfDayGreeting() {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York", hour: "numeric", hour12: false,
  }).formatToParts(new Date());
  const hourPart = parts.find(p => p.type === "hour");
  const hour = hourPart ? parseInt(hourPart.value, 10) : 12;
  if (hour < 12) return "Good morning";
  if (hour < 17) return "Good afternoon";
  return "Good evening";
}

function capitalizeFirstName(name) {
  if (!name || typeof name !== "string") return name;
  const first = name.trim().split(/\s+/)[0];
  if (!first) return name;
  return first.toLowerCase().replace(/(^|[-'])(\w)/g, (_m, sep, ch) => sep + ch.toUpperCase());
}

const REP_GREETINGS = {
  sarah: (firstName) => `${getTimeOfDayGreeting()}, ${firstName},`,
  jill:  (firstName) => `Hello ${firstName},`,
  travis: () => null,
};

const INTRO_LINE_RE       = /(?:I(?:'m| am) [^.!?\n]+|My name is [^.!?\n]+) and I(?:'ll| will)[^.!?\n]*[.!?]/;
const INTRO_LINE_LOOSE_RE = /(?:I(?:'m| am)|My name is) [^.!?\n]+[.!?]\s+I(?:'ll| will) [^.!?\n]*[.!?]/;
const LINK_LINE_RE        = /\[View Your Quote →\]|\[View Booth Specifications →\]|\[Watch Booth Overview →\]/;

const PLACEHOLDER_LINK_STYLE =
  "color: #C92E2E; background-color: #FFF3CD; padding: 2px 6px 2px 0; " +
  "margin: 0; border-radius: 3px; text-decoration: underline; font-weight: 600;";
const PLACEHOLDER_NOTE_STYLE =
  "color: #C92E2E; font-style: italic; font-size: 0.9em; margin-left: 4px;";
const PLACEHOLDER_NOTE_TEXT = " (paste your quote link here)";

// ====== Rep persistence + auto-select based on logged-in user ======
const repSelect = document.getElementById("repSelect");
const savedRep = localStorage.getItem("wr_rep");
if (savedRep) repSelect.value = savedRep;
repSelect.addEventListener("change", () => localStorage.setItem("wr_rep", repSelect.value));

// Auto-pick the voice that matches the logged-in rep, but only if the rep
// hasn't already made an explicit pick (don't overwrite their localStorage
// choice). Reps outside the supported voice set (Jill / Sarah / Travis)
// stay blank — they need to manually choose. Same-origin /api/me sends the
// session cookie inherited from the parent dashboard.
const OWNER_TO_VOICE = {
  "36330944": "jill",      // Jill
  "38143901": "sarah",     // Sarah
  "117442978": "travis",   // Travis
};
if (!savedRep) {
  fetch("/api/me", { credentials: "include" })
    .then(r => r.ok ? r.json() : null)
    .then(me => {
      if (!me || !me.ownerId) return;
      const voice = OWNER_TO_VOICE[String(me.ownerId)];
      if (voice) {
        repSelect.value = voice;
        // Don't write to localStorage — this is a soft default. If the rep
        // changes it once they get a persistent choice; otherwise the next
        // session re-fetches /api/me and re-applies.
      }
    })
    .catch(() => {});
}

// ====== Product matching (ported from Gabe's tool) ======
function scanProductsInText(text) {
  const lower = text.toLowerCase();
  const matches = new Set();
  const consumedRanges = [];
  for (const name of PRODUCT_NAMES_SORTED) {
    const needle = name.toLowerCase();
    if (needle.length === 0) continue;
    let searchFrom = 0;
    let foundUnclaimed = false;
    while (searchFrom <= lower.length - needle.length) {
      const idx = lower.indexOf(needle, searchFrom);
      if (idx === -1) break;
      const end = idx + needle.length;
      const inside = consumedRanges.some(r => idx >= r.start && end <= r.end);
      if (!inside) { consumedRanges.push({ start: idx, end }); foundUnclaimed = true; }
      searchFrom = idx + 1;
    }
    if (foundUnclaimed) matches.add(name);
  }
  return [...matches];
}

function matchProducts(leadText) {
  const matches = new Set();
  const fieldPatterns = [
    /selected product name[^:\n]*:\s*([^\n]+)/i,
    /whisperroom product of interest[^:\n]*:\s*([^\n]+)/i,
    /product of interest[^:\n]*:\s*([^\n]+)/i,
    /page submitted on[^:\n]*:\s*([^\n]+)/i,
  ];
  const fieldValues = [];
  for (const pattern of fieldPatterns) {
    const m = leadText.match(pattern);
    if (m) fieldValues.push(m[1].trim());
  }
  for (const fieldVal of fieldValues) {
    const fieldLower = fieldVal.toLowerCase();
    for (const name of PRODUCT_NAMES) {
      if (fieldLower === name.toLowerCase()) matches.add(name);
    }
  }
  if (matches.size === 0) {
    for (const fieldVal of fieldValues) {
      for (const name of scanProductsInText(fieldVal)) matches.add(name);
    }
  }
  return [...matches];
}

function matchHeaderToProduct(header) {
  if (!header) return null;
  const cleaned = header
    .replace(/\*\*/g, "").replace(/^\*+|\*+$/g, "").replace(/^#+\s*/, "")
    .replace(/^\[([^\]]+)\].*$/, "$1").replace(/[:.,;]+$/, "").trim();
  const lower = cleaned.toLowerCase();
  for (const name of PRODUCT_NAMES_SORTED) if (lower === name.toLowerCase()) return name;
  for (const name of PRODUCT_NAMES_SORTED) if (lower.includes(name.toLowerCase())) return name;
  return null;
}

// ====== Post-processing (ported from Gabe's tool) ======
function fillReplyPlaceholders(reply) {
  const lines = reply.split("\n");
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    if (LINK_LINE_RE.test(lines[i])) {
      const startIdx = i;
      while (i < lines.length && LINK_LINE_RE.test(lines[i])) i++;
      blocks.push({ startIdx, endIdx: i - 1 });
    } else { i++; }
  }
  const replyProducts = scanProductsInText(reply);
  if (blocks.length === 0) return reply;
  if (blocks.length === 1) {
    if (replyProducts.length !== 1) return reply;
    const product = PRODUCT_LINKS[replyProducts[0]];
    return reply
      .replace(/(\[View Booth Specifications →\]\()[^)]*(\))/g, `$1${product.spec}$2`)
      .replace(/(\[Watch Booth Overview →\]\()[^)]*(\))/g, `$1${product.overview}$2`);
  }
  for (const block of blocks) {
    let header = null;
    for (let j = block.startIdx - 1; j >= 0; j--) {
      const trimmed = lines[j].trim();
      if (trimmed === "") continue;
      header = trimmed; break;
    }
    const productName = matchHeaderToProduct(header);
    if (!productName) continue;
    const product = PRODUCT_LINKS[productName];
    for (let k = block.startIdx; k <= block.endIdx; k++) {
      lines[k] = lines[k]
        .replace(/(\[View Booth Specifications →\]\()[^)]*(\))/g, `$1${product.spec}$2`)
        .replace(/(\[Watch Booth Overview →\]\()[^)]*(\))/g, `$1${product.overview}$2`);
    }
  }
  return lines.join("\n");
}

const EXISTING_CUSTOMER_RE = new RegExp(
  [
    "\\bmy (?:existing |current )?(?:booth|whisperroom|practice basic|practice deluxe|" +
      "voice over (?:basic|deluxe)|audiology|recording|broadcast)\\b",
    "\\bmy (?:mdl|model)\\s*[0-9]",
    "\\bi (?:already )?own (?:a |an )?(?:booth|whisperroom)\\b",
    "\\bi (?:bought|purchased) (?:from you|one|this|it|a booth|a whisperroom)\\b",
    "\\b(?:add on|add-on|adding on|expansion)(?: package| kit)? (?:for |to )?my\\b",
    "\\bexpansion (?:package|kit) for my\\b",
    "\\bserial (?:number|#|no)\\b|\\bS\\/N\\s*[A-Z0-9]+",
  ].join("|"),
  "i"
);
function isExistingCustomerLead(leadText) { return !!leadText && EXISTING_CUSTOMER_RE.test(leadText); }

function extractFirstName(leadText) {
  if (!leadText) return null;
  let m = leadText.match(/^Name:\s*([^\s\n]+)/m);
  if (m && m[1] && !/^(test|name)$/i.test(m[1])) return m[1];
  m = leadText.match(/^First Name:\s*([^\n]+)/im);
  if (m) {
    const cleaned = (m[1] || "").trim();
    if (cleaned && !/^(test|first name|n\/a|none)$/i.test(cleaned)) {
      return cleaned.split(/\s+/)[0];
    }
  }
  return null;
}

function buildRepOpening(rep, firstName) {
  const intro = REP_INTROS[rep];
  if (!intro) return null;
  const greetingFn = REP_GREETINGS[rep];
  const cleanName = capitalizeFirstName(firstName);
  const greeting = greetingFn && cleanName ? greetingFn(cleanName) : null;
  return greeting ? `${greeting}\n\n${intro}` : intro;
}

const SHORT_GENERIC_OPENING_RE = /^(?:Hi|Hello|Hey|Good (?:morning|afternoon|evening)),?\s+[^\n,]+,?\s*\n+\s*(?:Thanks?|Thank you)\b[^.!?\n]*[.!?]\s*\n*/i;
const GREETING_LINE_ONLY_RE    = /^(?:Hi|Hello|Hey|Good (?:morning|afternoon|evening))[^\n]*\n+/i;

function replaceIntroLine(reply, rep, leadText) {
  if (!rep || !REP_INTROS[rep]) return reply;
  if (isExistingCustomerLead(leadText)) return reply;
  const firstName = extractFirstName(leadText || "");
  const opening = buildRepOpening(rep, firstName);
  if (!opening) return reply;
  const lines = reply.split("\n");
  let introIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 8); i++) {
    if (INTRO_LINE_RE.test(lines[i])) { introIdx = i; break; }
    if (INTRO_LINE_LOOSE_RE.test(lines[i])) { introIdx = i; break; }
  }
  if (introIdx !== -1) {
    const trimmedBody = lines.slice(introIdx + 1).join("\n").replace(/^\n+/, "");
    return trimmedBody ? `${opening}\n\n${trimmedBody}` : opening;
  }
  if (SHORT_GENERIC_OPENING_RE.test(reply)) return reply.replace(SHORT_GENERIC_OPENING_RE, opening + "\n\n");
  if (GREETING_LINE_ONLY_RE.test(reply))    return reply.replace(GREETING_LINE_ONLY_RE, opening + "\n\n");
  return reply;
}

function removeEmDashes(reply) {
  let result = reply;
  result = result.replace(/ — /g, ". ");
  result = result.replace(/—/g, ", ");
  result = result.replace(/–/g, ", ");
  result = result.replace(/\. ([a-z])/g, (_match, letter) => `. ${letter.toUpperCase()}`);
  return result;
}

// ====== Link rendering ======
function isPlaceholderUrl(url) { return url.startsWith("[") && url.endsWith("]"); }

function mdLinksToHtml(text) {
  return text.replace(
    /\[([^\]]+)\]\((\[[^\]]+\]|https?:\/\/[^)]+)\)/g,
    (_m, linkText, url) => {
      if (isPlaceholderUrl(url)) {
        return (
          '<a href="#" class="placeholder-link" style="' + PLACEHOLDER_LINK_STYLE + '">' +
          linkText + '</a>' +
          '<span class="placeholder-note" style="' + PLACEHOLDER_NOTE_STYLE + '">' +
          PLACEHOLDER_NOTE_TEXT + '</span>'
        );
      }
      return '<a href="' + url + '" target="_blank" rel="noopener">' + linkText + '</a>';
    }
  );
}

function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function replyToDisplayHtml(text)   { return mdLinksToHtml(escapeHtml(text)); }
function replyToClipboardHtml(text) { return mdLinksToHtml(escapeHtml(text)).replace(/\n/g, "<br>"); }
function replyToPlainText(text) {
  return text.replace(
    /\[([^\]]+)\]\((\[[^\]]+\]|https?:\/\/[^)]+)\)/g,
    (_m, linkText, url) => {
      if (isPlaceholderUrl(url)) return linkText + " " + url + PLACEHOLDER_NOTE_TEXT;
      return linkText + " (" + url + ")";
    }
  );
}

// ====== Generate (server-proxied to Anthropic) ======
let rawReply = "";

function setLoading(on) {
  const btn = document.getElementById("generateBtn");
  btn.disabled = on;
  btn.classList.toggle("loading", on);
}
function showError(msg) {
  document.getElementById("errorText").textContent = msg;
  document.getElementById("errorMsg").classList.add("visible");
}
function dismissError() { document.getElementById("errorMsg").classList.remove("visible"); }
function showReply(text) {
  rawReply = text;
  const out = document.getElementById("replyOutput");
  out.classList.remove("empty");
  out.innerHTML = replyToDisplayHtml(text);
  document.getElementById("copyBtn").disabled = false;
}

async function generate() {
  const lead = document.getElementById("leadInput").value.trim();
  const rep = repSelect.value;

  dismissError();
  if (!rep) return showError("Pick a voice (Jill / Sarah / Travis).");
  if (!lead) return showError("Paste the customer email or lead text first.");
  if (lead.length > 20000) return showError("Lead text is too long (max 20,000 characters).");

  const repKey = REP_INTROS[rep] ? rep : null;
  const matched = matchProducts(lead);
  let userMessage;
  if (matched.length === 1) {
    const product = PRODUCT_LINKS[matched[0]];
    userMessage =
      "PRODUCT LINKS FOR THIS LEAD (use these actual URLs in the three-link block instead of placeholders):\n" +
      "- Spec sheet URL: " + product.spec + "\n" +
      "- Overview video URL: " + product.overview + "\n" +
      "The Quote link should remain as the placeholder [QUOTE_LINK] - the rep will fill it in manually.\n\n" +
      "LEAD:\n" + lead;
  } else {
    userMessage = "Here is a HubSpot lead. Write a sales reply email.\n\n" + lead;
  }
  if (repKey) {
    userMessage = "REP: " + REP_HEADER_NAMES[repKey] + "\n\n" + userMessage;
  }

  setLoading(true);
  try {
    const res = await fetch("/api/email-reply", {
      method: "POST",
      credentials: "include",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ userMessage }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
    const text = data.reply || "";
    if (!text) throw new Error("Empty reply.");
    // Order matters: em-dashes BEFORE intro replacement, so the rep's
    // preferred intro (which contains lowercase "and" after periods) doesn't
    // get re-capitalized by removeEmDashes's "\. ([a-z])" rule.
    const linkFilled = fillReplyPlaceholders(text);
    const dashFiltered = removeEmDashes(linkFilled);
    const final = replaceIntroLine(dashFiltered, repKey, lead);
    showReply(final);
  } catch (err) {
    showError(err.message || "Failed to generate reply.");
  } finally {
    setLoading(false);
  }
}

function copyReply() {
  if (!rawReply) return;
  const btn = document.getElementById("copyBtn");
  const htmlContent = replyToClipboardHtml(rawReply);
  const plainContent = replyToPlainText(rawReply);
  const onCopied = () => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy to Clipboard"; btn.classList.remove("copied"); }, 2000);
  };
  if (navigator.clipboard && window.ClipboardItem) {
    const htmlBlob = new Blob([htmlContent], { type: "text/html" });
    const textBlob = new Blob([plainContent], { type: "text/plain" });
    navigator.clipboard
      .write([new ClipboardItem({ "text/html": htmlBlob, "text/plain": textBlob })])
      .then(onCopied)
      .catch(() => navigator.clipboard.writeText(plainContent).then(onCopied));
  } else {
    navigator.clipboard.writeText(plainContent).then(onCopied);
  }
}
