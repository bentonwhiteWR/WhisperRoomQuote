<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2a2a2a;--border:#2e2e2e;
  --text:#e8e8e8;--text2:#aaa;--muted:#666;
  --orange:#ee6216;--orange-dim:rgba(238,98,22,.12);--orange-border:rgba(238,98,22,.3);
  --green:#22c55e;--green-dim:rgba(34,197,94,.1);--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --mono:'JetBrains Mono','Consolas',monospace;
}
:root.light{
  --bg:#f0f0f0;--surface:#fff;--surface2:#f5f5f5;--surface3:#ececec;--border:#e0e0e0;
  --text:#111;--text2:#555;--muted:#999;
  --orange:#c94f0e;--orange-dim:rgba(201,79,14,.08);--orange-border:rgba(201,79,14,.25);
  --green:#16a34a;--green-dim:rgba(22,163,74,.08);--amber:#d97706;--red:#dc2626;--blue:#2563eb;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Nav */
.topbar{display:flex;align-items:center;padding:0 20px;min-height:52px;background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:200;gap:10px}
.topbar-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#f0ede8;flex-shrink:0;text-decoration:none}
.topbar-logo span{color:#e8531a}
.topbar-nav{display:flex;gap:5px;align-items:center;flex:1}
.nav-link{padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:6px;color:rgba(255,255,255,.5);text-decoration:none;transition:.15s;white-space:nowrap;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.nav-link:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
.nav-link.active{background:rgba(238,98,22,.2);color:#ee6216;border-color:rgba(238,98,22,.4)}
.topbar-spacer{flex:1}
.theme-btn{padding:5px 9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f0ede8;cursor:pointer;font-size:14px;line-height:1}

/* Layout */
.main{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:block}
.sidebar-btn{display:block;width:100%;padding:7px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:5px;transition:.12s}
.sidebar-btn:hover{border-color:var(--orange-border);color:var(--text)}
.sidebar-btn.active{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange)}
.sidebar-select{width:100%;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:inherit;outline:none;cursor:pointer;margin-bottom:5px}
.refresh-btn{width:100%;padding:7px 10px;background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:6px;color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}

.content{flex:1;overflow-y:auto;padding:20px}

/* Sub-tab strip inside the main content area (Overview / Quotes). */
.report-tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:2px solid var(--border)}
.report-tab{padding:10px 18px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:.15s}
.report-tab:hover{color:var(--text)}
.report-tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* Quotes timeline — 7-day column grid. */
.qt-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.qt-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:200px}
.qt-col.today{border-color:var(--orange-border)}
.qt-col-head{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2)}
.qt-col-head .dow{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.qt-col.today .qt-col-head .dow{color:var(--orange)}
.qt-col-head .date{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.qt-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
.qt-tile{display:block;text-decoration:none;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);transition:.12s;cursor:pointer}
.qt-tile:hover{border-color:var(--orange-border);background:var(--surface3)}
.qt-tile-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.qt-num{font-family:var(--mono);font-size:10px;color:var(--text2);font-weight:600}
.qt-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.qt-badge.new{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.qt-badge.rev{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-border)}
.qt-cust{font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.qt-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px}
.qt-empty{color:var(--muted);font-size:10px;font-style:italic;padding:8px 4px;text-align:center}

@media(max-width:900px){
  .qt-grid{grid-template-columns:1fr;gap:8px}
  .qt-col{min-height:0}
}
.section-title-bar{font-size:13px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title-bar span{font-size:11px;color:var(--muted);font-weight:400}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.kpi.orange{border-color:var(--orange-border);background:var(--orange-dim)}.kpi.orange .kpi-val{color:var(--orange)}
.kpi.green{border-color:rgba(34,197,94,.3);background:var(--green-dim)}.kpi.green .kpi-val{color:var(--green)}
.kpi.amber .kpi-val{color:var(--amber)}
.kpi.blue .kpi-val{color:var(--blue)}

/* Mobile reports layout */
@media (max-width: 900px) {
  .topbar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .topbar::-webkit-scrollbar { display: none; }
  .topbar > * { flex-shrink: 0; }
  .main { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); padding: 12px; }
  .sidebar-section { margin-bottom: 12px; }
  /* Collapse nav buttons into a horizontal chip row on mobile */
  .sidebar-section:nth-child(3) { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
  .sidebar-section:nth-child(3)::-webkit-scrollbar { display: none; }
  .sidebar-section:nth-child(3) .sidebar-label { display: none; }
  .sidebar-section:nth-child(3) .sidebar-btn { width: auto; flex-shrink: 0; margin-bottom: 0; padding: 6px 10px; white-space: nowrap; }
  .content { padding: 14px; }
  .kpi-strip { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi { padding: 12px 14px; }
  .kpi-val { font-size: 20px; }
  .card-grid.two, .card-grid.three { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .kpi-strip { grid-template-columns: 1fr; }
  .kpi-val { font-size: 22px; }
}

/* Cards */
.card-grid{display:grid;gap:14px;margin-bottom:14px}
.card-grid.two{grid-template-columns:1fr 1fr}
.card-grid.three{grid-template-columns:1fr 1fr 1fr}
.card-grid.full{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.card-body{padding:16px}
.card-body.no-pad{padding:0}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-name{font-size:11px;color:var(--text);min-width:100px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-val{font-size:11px;font-weight:700;color:var(--text2);min-width:50px;text-align:right;flex-shrink:0}

/* Mini bar chart for monthly */
.month-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 0 20px;position:relative}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:2px}
.month-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .5s ease;position:relative;cursor:pointer}
.month-bar:hover{opacity:.8}
.month-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border);color:var(--text);font-size:10px;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;display:none;z-index:20}
.month-bar:hover .month-tip{display:block}
.month-label{font-size:9px;color:var(--muted);margin-top:4px;text-align:center}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-svg{flex-shrink:0}
.donut-legend{flex:1;font-size:11px}
.donut-legend-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tbl-mono{font-family:var(--mono);font-size:11px}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-border)}
.badge-muted{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.badge-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.3)}

/* Leaderboard */
.leader-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)}
.leader-row:last-child{border-bottom:none}
.leader-rank{font-size:18px;font-weight:800;color:var(--muted);min-width:28px}
.leader-rank.gold{color:#f59e0b}
.leader-rank.silver{color:#9ca3af}
.leader-rank.bronze{color:#92400e}
.leader-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.leader-stats{text-align:right}
.leader-val{font-size:14px;font-weight:800;color:var(--orange)}
.leader-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* Velocity timeline */
.velocity-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.vel-label{font-size:11px;color:var(--text2);min-width:120px}
.vel-bar{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.vel-fill{height:100%;border-radius:5px;transition:width .5s}
.vel-val{font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right}

/* US Map */
#usMap{width:100%;height:auto}
.state-path{fill:var(--surface2);stroke:var(--border);stroke-width:.5;cursor:pointer;transition:fill .2s}
.state-path:hover{opacity:.8}
.map-tooltip{position:fixed;background:#111;border:1px solid var(--border);color:var(--text);font-size:11px;padding:6px 10px;border-radius:6px;pointer-events:none;z-index:100;display:none}

/* Forecast */
.forecast-stage{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.forecast-stage:last-child{border-bottom:none}
.fs-name{font-size:11px;color:var(--text2);min-width:140px}
.fs-count{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.fs-raw{font-size:12px;font-weight:700;color:var(--text);min-width:80px;text-align:right}
.fs-weight{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.fs-weighted{font-size:12px;font-weight:700;color:var(--orange);min-width:80px;text-align:right}

/* Loading */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast-msg{padding:9px 18px;border-radius:7px;font-size:12px;font-weight:600;color:#fff;opacity:0;transition:opacity .25s}
.toast-msg.show{opacity:1}
.toast-error{background:#7a1a1a}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:900px){.sidebar{display:none}.card-grid.two,.card-grid.three{grid-template-columns:1fr}}

/* ── Sales Goal report ───────────────────────────────────────────── */
.sg-hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.sg-hero-l{display:flex;flex-direction:column;gap:4px}
.sg-hero-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.sg-hero-month{font-size:22px;font-weight:800;color:var(--text);font-family:'Syne',sans-serif}
.sg-hero-note{font-size:10px;color:var(--muted);margin-top:2px}
.sg-hero-r{display:flex;gap:12px;align-items:center}
.sg-tier-badge{padding:8px 14px;border-radius:8px;font-weight:800;font-size:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:2px;min-width:100px}
.sg-tier-badge .label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.sg-tier-badge .val{font-size:18px;font-weight:800;line-height:1}
.sg-tier-badge.t5 {background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:var(--amber)}
.sg-tier-badge.t10{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:var(--green)}
.sg-tier-badge.t15{background:rgba(238,98,22,.15);border-color:var(--orange-border);color:var(--orange)}

/* MTD progress bar w/ tier marks */
.sg-progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:18px}
.sg-progress-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;font-size:11px;color:var(--text2);margin-bottom:14px;font-weight:600;flex-wrap:wrap}
.sg-progress-top b{color:var(--text);font-size:13px}
.sg-progress-top-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-align:right}
.sg-progress-track{position:relative;height:18px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:visible;margin-bottom:30px}
.sg-progress-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--amber),var(--green) 60%,var(--orange));border-radius:5px 0 0 5px;transition:width .4s ease}
.sg-tick{position:absolute;top:-6px;bottom:-6px;width:1px;background:var(--text2);opacity:.55}
.sg-tick::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:var(--text2);white-space:nowrap;letter-spacing:.04em}
.sg-tick.t90::after{color:var(--amber)}
.sg-tick.t100{background:var(--green);opacity:.9}
.sg-tick.t120{background:var(--orange);opacity:.9}
/* Right-anchor the 120% label so it doesn't get clipped — its tick sits at
   left:100% so a centered label would extend half-off the container. */
.sg-tick.t120::after{left:auto;right:0;transform:none}
.sg-progress-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}

/* 12-month bar chart */
.sg-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.sg-chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.sg-chart-title{font-size:13px;font-weight:800;color:var(--text)}
.sg-chart-sub{font-size:10px;color:var(--muted)}
.sg-chart-area{position:relative;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:8px;height:180px;align-items:end;border-bottom:1px solid var(--border)}
.sg-bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}
.sg-bar{width:100%;max-width:38px;background:linear-gradient(180deg,var(--orange) 0%,#a83e0c 100%);border-radius:4px 4px 0 0;min-height:2px;position:relative;transition:.2s}
.sg-bar:hover{filter:brightness(1.15);box-shadow:0 0 0 1px var(--orange-border)}
.sg-bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--text2);white-space:nowrap;font-family:var(--mono)}
.sg-chart-labels{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:8px;margin-top:6px}
.sg-chart-labels .lbl-col{display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center}
.sg-chart-labels .mo{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.sg-chart-labels .dc{font-size:9px;font-weight:600;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.sg-avg-line{position:absolute;left:0;right:0;height:0;border-top:1.5px dashed var(--green);pointer-events:none;z-index:5}
.sg-avg-line::after{content:'Avg ' attr(data-val);position:absolute;right:0;top:-14px;background:var(--surface);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800;color:var(--green);border:1px solid rgba(34,197,94,.3)}
.sg-chart-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:14px}
.sg-tier-t5{color:var(--amber)} .sg-tier-t10{color:var(--green)} .sg-tier-t15{color:var(--orange)}

/* Meta strip (data-quality info) */
.sg-meta{display:flex;gap:12px;font-size:10px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.sg-meta span b{color:var(--text2);font-weight:700}

@media(max-width:700px){
  .sg-chart-area{height:140px;gap:4px}
  .sg-chart-labels{gap:4px}
  .sg-bar{max-width:24px}
  .sg-bar-val{font-size:8px;top:-14px}
  .sg-chart-labels .mo,.sg-chart-labels .dc{font-size:8px}
  .sg-hero{flex-direction:column;align-items:stretch}
  .sg-hero-r{justify-content:space-between;flex-wrap:wrap}
}

<script>
const REPS_CLIENT = {
  '36330944':'Jill','38143901':'Sarah','117442978':'Travis',
  '36303670':'Benton','36320208':'Gabe','38732178':'Kim',
  '38900892':'Chet','38732186':'Jeromy',
};
const fmt  = n => '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtK = n => { const v=parseFloat(n||0); if(v>=1000000) return '$'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return '$'+(v/1000).toFixed(0)+'K'; return fmt(v); };
const pct  = (n,d) => d ? Math.round(n/d*100)+'%' : '—';
const fmtDate = d => d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'America/New_York'}):' — ';

function navScrollTo(id) {
  const el = document.getElementById('section-'+id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
}

async function loadReport() {
  // Sidebar dropdowns drive both tabs. Dispatch to whichever is active so
  // changing the rep filter refreshes the visible view, not the hidden one.
  if (_activeReportTab === 'salesGoal') { loadSalesGoal(); return; }
  if (_activeReportTab === 'quotes') { loadQuotesTimeline(); return; }
  const period = document.getElementById('periodSelect').value;
  const rep    = document.getElementById('repSelect')?.value || '';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('reportContent').style.display = 'none';
  try {
    const url = `/api/reports?period=${period}` + (rep ? `&rep=${encodeURIComponent(rep)}` : '');
    const res  = await fetch(url, { credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderAll(data);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('reportContent').style.display = 'block';
    document.getElementById('lastUpdatedLabel').textContent =
      'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
  } catch(e) {
    document.getElementById('loadingState').textContent = 'Error: '+e.message;
    showToast(e.message);
  }
}

// ── Sub-tab switching (Sales Goal / Overview / Quotes) ────────────
let _activeReportTab = 'salesGoal';
let _quotesTimelineCache = null;     // last-fetched payload, keyed by rep
let _quotesTimelineLastRep = null;
let _salesGoalLoaded = false;        // first-load gate so toggling tabs doesn't re-hit the API

function switchReportTab(name) {
  _activeReportTab = name;
  document.getElementById('tabSalesGoal').style.display = name === 'salesGoal' ? '' : 'none';
  document.getElementById('tabOverview').style.display  = name === 'overview'  ? '' : 'none';
  document.getElementById('tabQuotes').style.display    = name === 'quotes'    ? '' : 'none';
  document.getElementById('tabSuppliers').style.display = name === 'suppliers' ? '' : 'none';
  document.querySelectorAll('.report-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  if (name === 'quotes') loadQuotesTimeline();
  if (name === 'overview' && !document.getElementById('reportContent').innerHTML) loadReport();
  if (name === 'salesGoal' && !_salesGoalLoaded) loadSalesGoal();
  if (name === 'suppliers' && !_supplierSpendLoaded) loadSupplierSpend();
}

// ── Suppliers tab — QB Expenses by Vendor ─────────────────────────
let _supplierSpendLoaded = false;
let _supplierSpendData = null;
let _ssSortKey = 'total';   // 'total' | 'vendor' | 'pct'
let _ssSortDir = 'desc';    // 'asc' | 'desc'

document.getElementById('ssRange').addEventListener('change', () => {
  const row = document.getElementById('ssCustomRow');
  row.style.display = document.getElementById('ssRange').value === 'custom' ? 'flex' : 'none';
});

async function loadSupplierSpend({ refresh = false } = {}) {
  const range = document.getElementById('ssRange').value;
  const start = document.getElementById('ssCustomStart').value;
  const end   = document.getElementById('ssCustomEnd').value;
  if (range === 'custom' && (!start || !end)) {
    document.getElementById('ssState').textContent = 'Pick start + end dates for the custom range.';
    document.getElementById('ssState').style.display = 'block';
    document.getElementById('ssTable').style.display = 'none';
    return;
  }
  document.getElementById('ssState').textContent = refresh ? 'Refreshing from QuickBooks…' : 'Loading…';
  document.getElementById('ssState').style.display = 'block';
  document.getElementById('ssTable').style.display = 'none';
  document.getElementById('ssSummary').textContent = '';
  try {
    const qs = new URLSearchParams({ range });
    if (range === 'custom') { qs.set('start', start); qs.set('end', end); }
    if (refresh) qs.set('refresh', '1');
    const res = await fetch('/api/reports/supplier-spend?' + qs.toString(), { credentials:'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    _supplierSpendData = data;
    _supplierSpendLoaded = true;
    renderSupplierSpend();
  } catch (e) {
    document.getElementById('ssState').textContent = 'Error: ' + e.message;
  }
}

function renderSupplierSpend() {
  const d = _supplierSpendData;
  if (!d) return;
  // Summary line: range, vendor count, named-vendor total, optional
  // uncategorized callout, cache indicator.
  const namedTotal = (d.rows || []).reduce((s, r) => s + (r.total || 0), 0);
  const cachedLbl = d.fromCache
    ? ` · cached ${new Date(d.cachedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})}`
    : ' · fresh from QB';
  const nsLbl = d.notSpecifiedTotal > 0
    ? ` · <span title="Bills, sales tax filings, bank fees, journal entries — anything QB has tagged with no specific vendor">+ ${fmt(d.notSpecifiedTotal)} uncategorized ⓘ</span>`
    : '';
  document.getElementById('ssSummary').innerHTML =
    `<b>${d.range.label}</b> (${d.range.start} → ${d.range.end}) · ${d.count} vendors · named total <b style="color:var(--text)">${fmt(namedTotal)}</b>${nsLbl}${cachedLbl}`;

  // Table
  const total = namedTotal; // percentages are out of named-vendor total
  const rows = [...d.rows];
  rows.sort((a, b) => {
    let av, bv;
    if (_ssSortKey === 'vendor') { av = a.vendor.toLowerCase(); bv = b.vendor.toLowerCase(); }
    else { av = a.total; bv = b.total; } // 'total' and 'pct' sort the same way
    if (av < bv) return _ssSortDir === 'asc' ? -1 : 1;
    if (av > bv) return _ssSortDir === 'asc' ?  1 : -1;
    return 0;
  });
  const arrow = (k) => _ssSortKey === k ? (_ssSortDir === 'asc' ? ' ▲' : ' ▼') : '';
  const td = (s, extra) => `<td style="padding:8px 12px;border-bottom:1px solid var(--border);${extra||''}">${s}</td>`;

  if (!rows.length) {
    document.getElementById('ssState').textContent = 'No vendor purchases in this range.';
    document.getElementById('ssState').style.display = 'block';
    document.getElementById('ssTable').style.display = 'none';
    return;
  }

  let html = `<table style="width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12px">
    <thead style="background:var(--surface2)"><tr>
      <th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);cursor:pointer" onclick="ssSort('vendor')">Vendor${arrow('vendor')}</th>
      <th style="padding:9px 12px;text-align:right;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);cursor:pointer" onclick="ssSort('total')">Total${arrow('total')}</th>
      <th style="padding:9px 12px;text-align:right;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);cursor:pointer" onclick="ssSort('pct')">% of total${arrow('pct')}</th>
      <th style="padding:9px 12px;text-align:right;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Detail</th>
    </tr></thead><tbody>`;
  for (const r of rows) {
    const pctVal = total ? (r.total / total * 100) : 0;
    // Use data attributes + a single delegate handler (bound below in
    // _bindSupplierDrilldownOnce). Embedding JSON in an inline onclick
    // breaks the attribute when JSON.stringify emits double quotes.
    const drillLink = r.vendorId
      ? `<a href="#" class="ss-drill" data-vendor-id="${escapeHtml(r.vendorId)}" data-vendor-name="${escapeHtml(r.vendor)}" style="color:var(--orange);text-decoration:none;font-weight:700">view →</a>`
      : '<span style="color:var(--muted)">—</span>';
    html += `<tr style="transition:.1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">${
      td(`<span style="font-weight:600;color:var(--text)">${escapeHtml(r.vendor)}</span>`)
    }${
      td(`<span style="font-family:var(--mono)">${fmt(r.total)}</span>`, 'text-align:right')
    }${
      td(`<span style="font-family:var(--mono);color:var(--text2)">${pctVal.toFixed(1)}%</span>`, 'text-align:right')
    }${
      td(drillLink, 'text-align:right')
    }</tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('ssState').style.display = 'none';
  const tableEl = document.getElementById('ssTable');
  tableEl.innerHTML = html;
  tableEl.style.display = 'block';
  _bindSupplierDrilldownOnce();
}

// Single event delegate for the "view →" links inside the table. Idempotent
// — only attaches the listener once per page load even though renderSupplierSpend
// runs every reload/sort.
let _ssDelegateBound = false;
function _bindSupplierDrilldownOnce() {
  if (_ssDelegateBound) return;
  _ssDelegateBound = true;
  document.getElementById('ssTable').addEventListener('click', (e) => {
    const a = e.target.closest('a.ss-drill');
    if (!a) return;
    e.preventDefault();
    openSupplierDetail(a.dataset.vendorId, a.dataset.vendorName);
  });
}

function ssSort(key) {
  if (_ssSortKey === key) {
    _ssSortDir = _ssSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    _ssSortKey = key;
    _ssSortDir = key === 'vendor' ? 'asc' : 'desc';
  }
  renderSupplierSpend();
}

async function openSupplierDetail(vendorId, vendorName) {
  const modal = document.getElementById('ssDetailModal');
  modal.style.display = 'flex';
  document.getElementById('ssDetailVendor').textContent = vendorName;
  document.getElementById('ssDetailMeta').textContent = '';
  document.getElementById('ssDetailState').style.display = 'block';
  document.getElementById('ssDetailState').textContent = 'Loading transactions…';
  document.getElementById('ssDetailContent').style.display = 'none';

  const range = document.getElementById('ssRange').value;
  const start = document.getElementById('ssCustomStart').value;
  const end   = document.getElementById('ssCustomEnd').value;
  try {
    const qs = new URLSearchParams({ range, vendorId });
    if (range === 'custom') { qs.set('start', start); qs.set('end', end); }
    const res = await fetch('/api/reports/supplier-spend/detail?' + qs.toString(), { credentials:'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    renderSupplierDetail(data);
  } catch (e) {
    document.getElementById('ssDetailState').textContent = 'Error: ' + e.message;
  }
}

// Map QB's TxnType label (e.g. "Bill", "Credit Card Expense", "Vendor
// Credit") to the path under app.qbo.intuit.com that opens that record.
// Unknown types return null → row gets a dash instead of a link.
function _qbTxnPath(type) {
  const t = String(type || '').toLowerCase().trim();
  if (t === 'bill')                                 return 'bill';
  if (t === 'vendor credit')                        return 'vendorcredit';
  if (t === 'check')                                return 'check';
  if (t === 'journal entry' || t === 'journal')     return 'journal';
  if (t.includes('credit card credit'))             return 'creditcardcredit';
  // Cash / CC / generic expense — all open via /app/expense
  if (t.includes('expense') || t.includes('cash purchase') || t.includes('credit card')) return 'expense';
  return null;
}

function renderSupplierDetail(d) {
  const meta = `${d.range.label} (${d.range.start} → ${d.range.end}) · ${d.count} transactions · total ${fmt(d.total)}${d.fromCache ? ' · cached' : ''} · payments excluded`;
  document.getElementById('ssDetailMeta').textContent = meta;
  if (!d.transactions || !d.transactions.length) {
    document.getElementById('ssDetailState').textContent = 'No bills or expenses for this vendor in this range.';
    document.getElementById('ssDetailContent').style.display = 'none';
    return;
  }
  const realmId = d.qbRealmId || '';
  const td = (s, extra) => `<td style="padding:7px 10px;border-bottom:1px solid var(--border);${extra||''}">${s}</td>`;
  let html = `<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead style="background:var(--surface2);position:sticky;top:0"><tr>
      <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Date</th>
      <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Type</th>
      <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Doc #</th>
      <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Account</th>
      <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Memo</th>
      <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Amount</th>
      <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">QB</th>
    </tr></thead><tbody>`;
  for (const t of d.transactions) {
    const qbPath = _qbTxnPath(t.type);
    let qbCell;
    if (qbPath && t.id) {
      const url = `https://app.qbo.intuit.com/app/${qbPath}?txnId=${encodeURIComponent(t.id)}` + (realmId ? `&realmId=${encodeURIComponent(realmId)}` : '');

    } else {
      qbCell = '<span style="color:var(--muted);font-size:10px">—</span>';
    }
    html += `<tr>${
      td(`<span style="font-family:var(--mono)">${escapeHtml(t.date)}</span>`)
    }${
      td(escapeHtml(t.type))
    }${
      td(`<span style="font-family:var(--mono);color:var(--text2)">${escapeHtml(t.docNum || '—')}</span>`)
    }${
      td(`<span style="color:var(--text2)">${escapeHtml(t.account || '—')}</span>`)
    }${
      td(`<span style="color:var(--text2)">${escapeHtml(t.memo || '')}</span>`)

      td(qbCell, 'text-align:right')

  html += '</tbody></table>';

  document.getElementById('ssDetailContent').style.display = 'block';
}

function closeSupplierDetail() {

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ── Sales Goal report ─────────────────────────────────────────────
// Selected month for the Sales Goal view ('' = current EST month). Set by the
// month dropdown in the hero; the server computes everything relative to it.
let _salesGoalMonth = '';

// Build <option>s for the last 13 months (current + 12 prior), value=YYYY-MM.
function sgMonthOptions(selectedKey) {
  const now = new Date();
  let html = '';
  for (let i = 0; i <= 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = d.toLocaleString('en-US', { month: 'long', year: 'numeric' })
      + (i === 0 ? ' (current)' : '');
    html += `<option value="${key}"${key === selectedKey ? ' selected' : ''}>${label}</option>`;
  }
  return html;
}

function onSalesGoalMonthChange(monthKey) {
  _salesGoalMonth = monthKey || '';
  loadSalesGoal(true);
}

async function loadSalesGoal(force) {
  const state   = document.getElementById('salesGoalState');
  const content = document.getElementById('salesGoalContent');
  state.style.display = 'block';
  state.textContent   = 'Loading sales goal…';
  content.style.display = 'none';
  try {
    const params = [];
    if (force) params.push('force=1');
    if (_salesGoalMonth) params.push('month=' + encodeURIComponent(_salesGoalMonth));
    const url = '/api/reports/sales-goal' + (params.length ? '?' + params.join('&') : '');
    const res  = await fetch(url, { credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderSalesGoal(data);
    state.style.display   = 'none';
    content.style.display = 'block';
    _salesGoalLoaded = true;
    document.getElementById('lastUpdatedLabel').textContent =
      'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})
      + (data.cached ? ' (cached)' : '');
  } catch(e) {
    state.style.display = 'block';
    state.textContent   = 'Error: ' + e.message;
    content.style.display = 'none';
  }
}

async function loadQuotesTimeline(force) {
  const rep = document.getElementById('repSelect')?.value || '';
  const state   = document.getElementById('quotesTimelineState');
  const content = document.getElementById('quotesTimelineContent');
  if (!rep) {
    content.style.display = 'none';
    state.style.display   = 'block';
    state.textContent     = 'Pick a rep from the sidebar to see their last 7 days of quotes.';
    return;
  }
  // Cache by rep so quickly toggling tabs doesn't refetch every time.
  if (!force && _quotesTimelineCache && _quotesTimelineLastRep === rep) {
    renderQuotesTimeline(_quotesTimelineCache);
    return;
  }
  state.style.display = 'block';
  state.textContent   = 'Loading quotes…';
  content.style.display = 'none';
  try {
    const res = await fetch(`/api/reports/quotes-timeline?rep=${encodeURIComponent(rep)}`, { credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    _quotesTimelineCache    = data;
    _quotesTimelineLastRep  = rep;
    renderQuotesTimeline(data);
    document.getElementById('lastUpdatedLabel').textContent =
      'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
  } catch(e) {
    state.style.display = 'block';
    state.textContent   = 'Error: ' + e.message;
    content.style.display = 'none';
  }
}

function renderQuotesTimeline(data) {
  const state   = document.getElementById('quotesTimelineState');
  const content = document.getElementById('quotesTimelineContent');
  const quotes  = data.quotes || [];
  // Build 7-day window ending today, in Eastern Time so the column
  // headers match the date keys baked into quote_numbers (REP+MMDDYY).
  const days = [];
  const todayET = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  todayET.setHours(0, 0, 0, 0);
  for (let i = 6; i >= 0; i--) {
    const d = new Date(todayET);
    d.setDate(d.getDate() - i);
    days.push(d);
  }
  // Group quotes into day buckets by their createdAt date in Eastern Time.
  const buckets = Object.fromEntries(days.map(d => [dayKey(d), []]));
  const repName = REPS_CLIENT[data.rep] || 'this rep';
  quotes.forEach(q => {
    if (!q.createdAt) return;
    const created = new Date(new Date(q.createdAt).toLocaleString('en-US', { timeZone: 'America/New_York' }));
    created.setHours(0, 0, 0, 0);
    const key = dayKey(created);
    if (buckets[key]) buckets[key].push(q);
  });
  // Header summary: tile counts + revision count for quick scan.
  const totalNew  = quotes.filter(q => q.type === 'new').length;
  const totalRev  = quotes.filter(q => q.type === 'revision').length;
  const headerHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:13px;font-weight:800;color:var(--text)">${escapeHtml(repName)} — Last 7 Days</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${quotes.length} quote${quotes.length === 1 ? '' : 's'} · ${totalNew} new · ${totalRev} revision${totalRev === 1 ? '' : 's'}</div>
      </div>
      <button class="refresh-btn" style="width:auto;padding:6px 14px" onclick="loadQuotesTimeline(true)">↺ Refresh</button>
    </div>
  `;
  const todayKey = dayKey(todayET);
  const colsHtml = days.map(d => {
    const key   = dayKey(d);
    const items = buckets[key] || [];
    const isToday = key === todayKey;
    const dowFmt = d.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'America/New_York' });
    const dateFmt = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'America/New_York' });
    const tiles = items.length === 0
      ? `<div class="qt-empty">No quotes</div>`
      : items.map(q => renderQuoteTile(q)).join('');
    return `
      <div class="qt-col${isToday ? ' today' : ''}">
        <div class="qt-col-head">
          <div class="dow">${dowFmt}${isToday ? ' · TODAY' : ''}</div>
          <div class="date">${dateFmt}</div>
        </div>
        <div class="qt-col-body">${tiles}</div>
      </div>
    `;
  }).join('');
  content.innerHTML = headerHtml + `<div class="qt-grid">${colsHtml}</div>`;
  state.style.display   = 'none';
  content.style.display = 'block';
}

function renderQuoteTile(q) {
  const badgeClass = q.type === 'revision' ? 'rev' : 'new';
  const badgeText  = q.type === 'revision' ? 'Rev' : 'New';
  const customer   = q.company || q.customerName || q.dealName || '—';
  const time = q.createdAt
    ? new Date(q.createdAt).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZone:'America/New_York' })
    : '';
  const total = (q.total != null && !isNaN(q.total)) ? '$' + Math.round(q.total).toLocaleString('en-US') : '—';
  // Click → open the quote page. quoteLink already includes share token
  // for public access, but reps view it as authenticated users.
  const href = q.quoteLink || `/q/${encodeURIComponent(q.quoteNumber)}`;
  return `
    <a class="qt-tile" href="${escapeHtml(href)}" target="_blank" rel="noopener" title="${escapeHtml(q.quoteNumber)} · ${escapeHtml(customer)}">
      <div class="qt-tile-top">
        <span class="qt-num">${escapeHtml(q.quoteNumber)}</span>
        <span class="qt-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="qt-cust">${escapeHtml(customer)}</div>
      <div class="qt-meta"><span>${time}</span><span>${total}</span></div>
    </a>
  `;
}

function dayKey(d) {
  // Stable YYYY-MM-DD key in local time. Used to bucket quotes by day.
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Hero KPIs — the 4 tiles that answer "Are we on track?" ──────────
function renderOverview(data, period) {
  const h = data.hero || {};
  const arrow = n => n == null ? '' : (n > 0 ? '▲' : n < 0 ? '▼' : '●');
  const arrowColor = n => n == null ? 'var(--muted)' : (n > 0 ? 'var(--green)' : n < 0 ? 'var(--red)' : 'var(--muted)');
  const delta = (now, prev, label) => {
    if (prev == null || prev === 0) return `<div class="kpi-sub">${label}: —</div>`;
    const diff = now - prev;
    const diffPct = Math.round((diff / prev) * 100);
    const diffFmt = Math.abs(diff) >= 1000 ? fmtK(Math.abs(diff)) : Math.abs(Math.round(diff));
    return `<div class="kpi-sub" style="color:${arrowColor(diff)}">${arrow(diff)} ${diffPct >= 0 ? '+' : ''}${diffPct}% ${label}</div>`;
  };
  const momLabel = h.revenueMoMPct != null
    ? `<div class="kpi-sub" style="color:${arrowColor(h.revenueMoMPct)}">${arrow(h.revenueMoMPct)} ${h.revenueMoMPct >= 0 ? '+' : ''}${h.revenueMoMPct}% vs last month</div>`
    : `<div class="kpi-sub">vs last month: —</div>`;

  return `
    <div class="section-title-bar">📊 At a glance <span>Period: last ${period} days${data.repFilter ? ' · ' + (REPS_CLIENT[data.repFilter] || 'Rep') : ''}</span></div>
    <div class="kpi-strip">
      <div class="kpi orange">
        <div class="kpi-label">Revenue MTD</div>
        <div class="kpi-val">${fmtK(h.revenueMTD || 0)}</div>
        ${momLabel}
      </div>
      <div class="kpi blue">
        <div class="kpi-label">Pipeline Value</div>
        <div class="kpi-val">${fmtK(h.pipelineValue || 0)}</div>
        <div class="kpi-sub">${h.pipelineCount || 0} open quotes in period</div>
      </div>
      <div class="kpi ${(h.winRatePeriod || 0) >= (h.winRate90 || 0) ? 'green' : ''}">
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-val">${h.winRatePeriod != null ? h.winRatePeriod + '%' : '—'}</div>
        ${delta(h.winRatePeriod, h.winRate90, 'vs 90d avg')}
      </div>
      <div class="kpi amber">
        <div class="kpi-label">Avg Deal Size</div>
        <div class="kpi-val">${fmtK(h.avgDealPeriod || 0)}</div>
        ${delta(h.avgDealPeriod, h.avgDeal90, 'vs 90d avg')}
      </div>

  `;
}

// ── Rep Leaderboard ────────────────────────────────────────────────
function renderLeaderboard(data) {
  const leaders = data.leaderboard || [];
  const pipeByRep = data.pipeline?.byRep || {};
  const rankMedals = ['🥇','🥈','🥉'];
  const rankClasses = ['gold','silver','bronze'];

  const rows = leaders.map((r, i) => {
    const pipe = pipeByRep[r.rep] || {};
    return `<div class="leader-row">
      <div class="leader-rank ${rankClasses[i]||''}">${rankMedals[i]||i+1}</div>
      <div class="leader-name">${r.rep}</div>
      <div style="text-align:center;min-width:60px">
        <div style="font-size:12px;font-weight:700;color:var(--text)">${r.quoted||0}</div>
        <div style="font-size:9px;color:var(--muted)">quoted</div>
      </div>
      <div style="text-align:center;min-width:60px">
        <div style="font-size:12px;font-weight:700;color:var(--green)">${r.accepted||0}</div>
        <div style="font-size:9px;color:var(--muted)">${pct(r.accepted,r.quoted)} accept</div>
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-size:12px;font-weight:700;color:var(--text)">${pipe.total||0}</div>
        <div style="font-size:9px;color:var(--muted)">total deals</div>
      </div>
      <div class="leader-stats">
        <div class="leader-val">${fmtK(r.acceptedVal)}</div>
        <div class="leader-sub">accepted value this month</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section-title-bar">🏆 Rep Leaderboard <span>This month</span></div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head">
          <span class="card-title">By Accepted Value — This Month</span>
        </div>
        <div class="card-body no-pad">
          ${rows || '<div style="padding:20px;font-size:12px;color:var(--muted)">No data this month</div>'}
        </div>
      </div>
    </div>
  `;
}

// ── Sales Velocity ─────────────────────────────────────────────────
function renderVelocity(data) {
  const v = data.velocity || {};
  const o = data.orders   || {};

  const stages = [
    { label:'Quote sent → Accepted', val: v.avgDaysToAccept, color:'var(--orange)', note:`${v.sampleSize||0} deals sampled` },
    { label:'Order → Shipped',       val: o.avgFulfillDays,  color:'var(--blue)',   note:'Production to door' },
  ];
  const maxVal = Math.max(...stages.map(s=>s.val||0), 1);

  const rows = stages.map(s => `
    <div class="velocity-row">
      <div class="vel-label">${s.label}</div>
      <div class="vel-bar"><div class="vel-fill" style="width:${s.val?Math.round(s.val/maxVal*100):0}%;background:${s.color}"></div></div>
      <div class="vel-val">${s.val!=null?s.val+' days':'—'}</div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin:-4px 0 12px 120px">${s.note}</div>
  `).join('');

  return `
    <div class="section-title-bar">⚡ Sales Velocity</div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head"><span class="card-title">Average Days Per Stage</span></div>
        <div class="card-body">${rows}
          <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
            Note: Quote → Accepted velocity will improve as more data accumulates in this system.
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Revenue Forecast ───────────────────────────────────────────────
function renderForecast(data) {
  const p = data.pipeline || {};
  const byStage = p.byStage || {};
  const WEIGHTS = {'Sent Quote':.20,'Updated Quote':.40,'Verbal Confirmation':.80,'Closed Won':.95,'Shipped':1.0};
  const STAGE_ORDER = ['Sent Quote','Updated Quote','Verbal Confirmation','Closed Won','Shipped'];

  const rows = STAGE_ORDER.filter(s=>byStage[s]).map(s => {
    const d = byStage[s];
    const w = WEIGHTS[s]||0;
    const weighted = Math.round(d.value * w);
    return `<div class="forecast-stage">
      <div class="fs-name">${s}</div>
      <div class="fs-count">${d.count}</div>
      <div class="fs-raw">${fmtK(d.value)}</div>
      <div class="fs-weight">${Math.round(w*100)}%</div>
      <div class="fs-weighted">${fmtK(weighted)}</div>
    </div>`;
  }).join('');

  const totalRow = `<div class="forecast-stage" style="background:var(--orange-dim)">
    <div class="fs-name" style="font-weight:800;color:var(--text)">Total Weighted</div>
    <div class="fs-count">${p.totalDeals||0}</div>
    <div class="fs-raw" style="color:var(--text)">${fmtK(p.totalValue)}</div>
    <div class="fs-weight">—</div>
    <div class="fs-weighted" style="font-size:14px">${fmtK(p.weightedForecast)}</div>
  </div>`;

  const payB = p.paymentBreakdown||{};
  const payTotal = (payB.paid||0)+(payB.po_received||0)+(payB.not_paid||0);

  return `
    <div class="section-title-bar">🔮 Revenue Forecast</div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head">
          <span class="card-title">Weighted Pipeline Forecast</span>
          <span style="font-size:11px;color:var(--orange);font-weight:700">${fmtK(p.weightedForecast)}</span>
        </div>
        <div class="card-body no-pad" style="padding:0 16px">
          <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">
            <div style="min-width:140px">Stage</div>
            <div style="min-width:40px;text-align:center">Deals</div>
            <div style="min-width:80px;text-align:right">Raw Value</div>
            <div style="min-width:40px;text-align:center">Weight</div>
            <div style="min-width:80px;text-align:right">Weighted</div>
          </div>
          ${rows}${totalRow}
          <div style="font-size:10px;color:var(--muted);padding:10px 0">
            Weights are configured estimates. Actual close rates will be tracked as data accumulates.
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Payment Status — All Deals</span></div>
        <div class="card-body">
          <div style="margin-bottom:16px">
            <div style="font-size:28px;font-weight:800;color:var(--text)">${payTotal}</div>
            <div style="font-size:11px;color:var(--muted)">Total active deals</div>
          </div>
          ${[
            {label:'Paid',         val:payB.paid||0,        color:'var(--green)'},
            {label:'PO Received',  val:payB.po_received||0, color:'var(--amber)'},
            {label:'Not Paid',     val:payB.not_paid||0,    color:'var(--muted)'},
          ].map(b=>`<div class="bar-row">
            <div class="bar-name">${b.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${payTotal?Math.round(b.val/payTotal*100):0}%;background:${b.color}"></div></div>
            <div class="bar-val">${b.val} <span style="font-weight:400;color:var(--muted)">(${pct(b.val,payTotal)})</span></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── Quote Revisions ────────────────────────────────────────────────
function renderRevisions(data) {
  const r = data.revisions || {};
  const dist = r.distribution || [];
  const maxDeals = Math.max(...dist.map(d=>d.deals),1);

  return `
    <div class="section-title-bar">🔄 Quote Revision Analysis <span>All time</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Quote Counts Per Deal</span></div>
        <div class="card-body">
          ${dist.map(d=>`<div class="bar-row">
            <div class="bar-name">${d.label} quote${d.label==='1'?'':'s'}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.deals/maxDeals*100)}%;background:${d.count===1?'var(--muted)':'var(--orange)'}"></div></div>
            <div class="bar-val">${d.deals} deals</div>
          </div>`).join('')}
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
            Avg ${r.avgQuotesPerDeal||'—'} quotes per deal across ${r.totalDeals||0} deals
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Revision Impact on Close Rate</span></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:14px">
            <div>
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Single quote deals</div>
              <div style="font-size:28px;font-weight:800;color:var(--text)">${r.singleAcceptRate!=null?r.singleAcceptRate+'%':'—'}</div>
              <div style="font-size:11px;color:var(--muted)">${r.singleQuote||0} deals with 1 quote</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Multi-quote deals (revised)</div>
              <div style="font-size:28px;font-weight:800;color:var(--orange)">${r.revisionAcceptRate!=null?r.revisionAcceptRate+'%':'—'}</div>
              <div style="font-size:11px;color:var(--muted)">${r.multiQuote||0} deals with 2+ quotes</div>
            </div>
            <div style="font-size:11px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border)">
              ${r.revisionAcceptRate > r.singleAcceptRate
                ? '✓ Revised quotes close at a higher rate — revisions are worth doing'
                : r.revisionAcceptRate < r.singleAcceptRate
                  ? 'Single quotes close better — may indicate revisions happen on harder deals'
                  : 'Not enough data yet to compare rates'}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Product Mix ────────────────────────────────────────────────────
function renderProducts(data, period) {

  const se       = data.seCounts    || {};
  const apps     = data.applications|| [];

  return `
    <div class="section-title-bar">📦 Product Mix <span>Last ${period} days</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Top Products Quoted</span></div>
        <div class="card-body">
          ${products.map((p,i)=>`<div class="bar-row">
            <div class="bar-name" title="${p.name}">${p.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.count/maxP*100)}%;background:${i<3?'var(--orange)':'var(--muted)'}"></div></div>
            <div class="bar-val">${p.count}× <span style="font-size:9px;color:var(--muted)">${fmtK(p.revenue)}</span></div>
          </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No data</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">MDL Models</span></div>
        <div class="card-body">
          ${models.map((m,i)=>`<div class="bar-row">
            <div class="bar-name" style="font-family:var(--mono)">${m.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.count/maxM*100)}%;background:${i<3?'var(--blue)':'var(--muted)'}"></div></div>
            <div class="bar-val">${m.count}×</div>
          </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No MDL data</div>'}
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Standard vs Enhanced</div>
            <div style="display:flex;gap:16px">
              <div><div style="font-size:20px;font-weight:800;color:var(--text)">${se.S||0}</div><div style="font-size:10px;color:var(--muted)">Standard</div></div>
              <div><div style="font-size:20px;font-weight:800;color:var(--orange)">${se.E||0}</div><div style="font-size:10px;color:var(--muted)">Enhanced</div></div>
              <div style="align-self:center;font-size:12px;color:var(--muted)">${se.S+se.E>0?Math.round(se.E/(se.S+se.E)*100)+'% enhanced':''}</div>
            </div>

    <div class="card-grid full" style="margin-top:14px">

        <div class="card-body">
          <div style="display:flex;flex-wrap:wrap;gap:8px">

// ── Customer Insights ──────────────────────────────────────────────
function renderCustomers(data) {
  const top     = data.topCustomers     || [];
  const repeats = data.repeatCustomers  || [];

  const topRows = top.map((c,i) => `<tr>
    <td>${i+1}</td>
    <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td>
    <td>${c.rep}</td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(c.totalValue)}</td>
    <td>${c.deals}</td>
    <td>${c.accepted}</td>
  </tr>`).join('');

  const repeatRows = repeats.map(c => `<tr>
    <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td>
    <td><span class="badge badge-orange">${c.deals} deals</span></td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(c.totalValue)}</td>
    <td>${c.rep}</td>
    <td style="color:var(--muted)">${fmtDate(c.lastDate)}</td>

  return `
    <div class="section-title-bar">🏢 Customer Insights <span>All time</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Top Customers by Value</span></div>
        <div class="card-body no-pad">
          <table class="tbl">
            <thead><tr><th>#</th><th>Company</th><th>Rep</th><th>Value</th><th>Deals</th><th>Won</th></tr></thead>
            <tbody>${topRows||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">No data</td></tr>'}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">Repeat Customers</span>
          <span style="font-size:11px;color:var(--orange);font-weight:700">${repeats.length} companies</span>
        </div>
        <div class="card-body no-pad">
          <table class="tbl">
            <thead><tr><th>Company</th><th>Activity</th><th>Value</th><th>Rep</th><th>Last Quote</th></tr></thead>
            <tbody>${repeatRows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">No repeat customers yet</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// ── Map ────────────────────────────────────────────────────────────
function renderMapSection(data) {
  const geo = data.geography || {};
  const total = Object.values(geo).reduce((s,v)=>s+v,0);
  const topStates = Object.entries(geo).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const maxVal = Math.max(...topStates.map(s=>s[1]), 1);

  return `
    <div class="section-title-bar">🗺 Top States <span>All time · ${total} quotes</span></div>
    <div class="card">
      <div class="card-body">
        ${topStates.length ? topStates.map(([state,count]) => {
          const sharePct = total ? Math.round(count/total*100) : 0;
          return `<div class="bar-row">
            <div class="bar-name" style="font-family:var(--mono);font-weight:700">${state}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxVal*100)}%;background:var(--orange)"></div></div>
            <div class="bar-val">${count} <span style="color:var(--muted);font-weight:500">(${sharePct}%)</span></div>
          </div>`;
        }).join('') : '<div style="color:var(--muted);font-size:12px">No geographic data yet</div>'}
        ${total===0?'<div style="margin-top:12px;font-size:11px;color:var(--muted)">Geographic data populates as quotes are pushed with shipping addresses.</div>':''}
      </div>
    </div>
  `;
}

// ── Monthly Trend ──────────────────────────────────────────────────
function renderMonthly(data) {
  const months = data.monthly || [];
  if (!months.length) return `
    <div class="section-title-bar">📅 Monthly Trend</div>
    <div class="card"><div class="card-body" style="color:var(--muted);font-size:12px">No data yet</div></div>
  `;
  const maxVal = Math.max(...months.map(m=>m.value),1);
  const bars = months.map(m=>`<div class="month-col">
    <div class="month-bar-wrap" style="flex:1;display:flex;align-items:flex-end;width:100%">
      <div class="month-bar" style="height:${Math.max(3,Math.round(m.value/maxVal*100))}%;background:var(--orange)">
        <div class="month-tip">${m.month}<br>${m.quotes} quotes · ${fmtK(m.value)}<br>${m.accepted} accepted (${pct(m.accepted,m.quotes)})</div>
      </div>
    </div>
    <div class="month-label">${m.month.split(' ')[0]}</div>
  </div>`).join('');

  const qRows = months.map(m=>`<tr>
    <td>${m.month}</td>
    <td>${m.quotes}</td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(m.value)}</td>
    <td>${m.accepted}</td>
    <td>${pct(m.accepted,m.quotes)}</td>
    <td style="color:var(--muted)">${fmtK(m.value/(m.quotes||1))}</td>
  </tr>`).join('');

  return `
    <div class="section-title-bar">📅 Monthly Trend <span>Last 12 months</span></div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head"><span class="card-title">Quote Volume & Value by Month</span></div>
        <div class="card-body">
          <div class="month-chart">${bars}</div>
          <div style="margin-top:20px;overflow-x:auto">
            <table class="tbl">
              <thead><tr><th>Month</th><th>Quotes</th><th>Total Value</th><th>Accepted</th><th>Accept %</th><th>Avg Quote</th></tr></thead>
              <tbody>${qRows}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
}

function drawSEDonut(se) { /* reserved for future */ }

function showToast(msg) {
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-msg toast-error';
  el.textContent=msg;
  t.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4000);
}
function toggleTheme() {
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('wr-theme',isLight?'light':'dark');
}

  document.documentElement.classList.add('light');

// ── Session user ──────────────────────────────────────────────────
async function loadCurrentUser() {
  try {
    const res  = await fetch('/api/me', { credentials:'include' });
    const data = await res.json();
    if (data.name) {
      const badge = document.getElementById('userBadge');
      const name  = document.getElementById('userName');
      if (badge) badge.style.display = 'flex';
      if (name)  name.textContent = data.name;
    }
  } catch(e) {}
}
loadCurrentUser();

// Auto-redirect to login on 401 (session expired or revoked)
const _origFetch = window.fetch;
window.fetch = async function(...args) {
  const res = await _origFetch(...args);
  if (res.status === 401) {
    const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '';
    if (url.startsWith('/api/')) {
      console.warn('401 on', url, '— redirecting to login');
      window.location.href = '/';
    }
  }
  return res;
};
