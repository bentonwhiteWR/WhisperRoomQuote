      + '</div>';
    }).join('')
    + '<datalist id="compCodes">' + Object.keys(COMPONENTS).map(c=>'<option value="' + esc(c) + '">').join('') + '</datalist>';
  }

  function pageFoot(n, total){
    return '<div class="pl-foot"><div></div><div class="pn">' + n + ' of ' + total + '</div></div>';
  }

  // Weight cross-check: the quote's total weight (catalog / price-book — an
  // independent source) vs the PL's summed weight (Σ BOM components, net — the
  // same number the per-booth totals boxes show). They reconcile for the base
  // models now; a gap points at an unmapped/missing feature or a bad component.
  function weightCheckHtml(){
    const qGross = Math.round(DATA.quoteWeight || 0);
    if (!qGross) return '';                             // no catalog weight to check against
    const q  = Math.round(DATA.quoteWeightNet != null ? DATA.quoteWeightNet : qGross);  // palletless (catalog pulls 144 lb/pallet)
    const pl = Math.round((DATA.totals && DATA.totals.netLb) || 0);
    const d  = pl - q;
    const unmapped = (DATA.rooms||[]).reduce((s,r)=>s + ((r.unmappedFeatures||[]).length), 0);
    const ok = Math.abs(d) <= 2 && unmapped === 0;
    const note = unmapped
      ? ' · <span style="font-weight:700">' + unmapped + ' unmapped feature' + (unmapped>1?'s':'') + '</span> not in PL weight'
      : '';
    return '<div class="weight-check no-print ' + (ok ? 'ok' : 'warn') + '">'
      + '<b>' + (ok ? '✓' : '⚠') + ' Weight check</b> Quote ' + q.toLocaleString() + ' lb (palletless)'
      + ' &middot; Packing List ' + pl.toLocaleString() + ' lb'
      + ' &middot; &Delta; ' + (d>0?'+':'') + d.toLocaleString() + ' lb' + note
      + '</div>';
  }

  function flagsHtml(rm){
    const f = rm.unmappedFeatures || [];
    if (!f.length) return '';
    return '<div class="flags no-print"><b>&#9888; Optional features from the quote — add their parts manually (rules pending):</b><br>'
      + f.map(x=>'<span class="ft">' + esc(x.name) + (x.qty>1?' &times;' + x.qty:'') + '</span>').join('') + '</div>';
  }

  // S/N two-way sync: each booth's serial maps to line `ri` of the order's
  // serialNumber field. Debounced save reuses PATCH /api/orders (the SAME path
  // as the Orders-drawer "Save Changes"), so it persists to order_data.serialNumber
  // and mirrors to the HubSpot deal description. Reads back on next load.
  function saveSn(ri, val){
    serialLines[ri] = val;
    clearTimeout(_snTimer);
    setSnStatus('saving');
    _snTimer = setTimeout(flushSn, 800);
  }
  async function flushSn(){
    try {
      const res = await fetch('/api/orders/' + encodeURIComponent(quoteNumber), {
        method:'PATCH', credentials:'include', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ serialNumber: serialLines.join('\n') })
      });
      setSnStatus(res.ok ? 'saved' : 'error');
    } catch(e){ setSnStatus('error'); }
  }
  function setSnStatus(s){
    const el = document.getElementById('snStatus');
    if (!el) return;
    el.textContent = s==='saving' ? 'Saving S/N…' : s==='saved' ? 'S/N saved ✓' : 'S/N not saved (order only)';
    el.style.color = s==='error' ? '#b91c1c' : s==='saved' ? '#16a34a' : '#888';
  }
  // ── 4016 jamb-adapter door-side toggle ─────────────────────────────
  // A 4016 HX + WA/ADA booth carries one tall jamb-adapter box: Z20 (T/R) or
  // Z21 (T/L), depending which side of the door it goes. The two weigh the same
  // (108 lb), so flipping changes only the part number the floor picks — the rep
  // confirms placement with the client. Default Right (Z20); saved per booth to
  // order_data.jambSide (array, booth ri ↔ index), like the S/N.
  function applyJamb(ri){
    const rm = DATA.rooms[ri]; if (!rm || !rm.lines) return null;
    const li = rm.lines.findIndex(l => l.code === 'Z20' || l.code === 'Z21');
    if (li < 0) return null;                       // not a jamb booth
    const want = (jambSides[ri] === 'L') ? 'L' : 'R';
    const wantCode = want === 'L' ? 'Z21' : 'Z20';
    const line = rm.lines[li];
    if (line.code !== wantCode) {                  // swap the line to the chosen side
      const c = (COMPONENTS && COMPONENTS[wantCode]) || {};
      line.code = wantCode;
      if (c.pack != null) line.pack = c.pack;
      if (c.desc != null) line.desc = c.desc;
      if (c.lb   != null) line.eachLb = c.lb;       // Z20/Z21 same weight — totals unchanged
      if (c.L != null) line.L = c.L; if (c.W != null) line.W = c.W; if (c.T != null) line.T = c.T;
    }
    return want;
  }
  function jambToggleHtml(ri, side){
    const btn = (s, lbl) => '<button class="jamb-btn' + (side === s ? ' active' : '') + '" onclick="setJamb(' + ri + ',\'' + s + '\')">' + lbl + '</button>';
    return '<div class="jamb-toggle" title="Which side of the door the WA jamb adapter goes (Z20 = Right, Z21 = Left). Same weight either way — confirm placement with the client.">'
      + '<span class="jamb-label">Door jamb</span>' + btn('R', 'Right') + btn('L', 'Left') + '</div>';
  }
  function setJamb(ri, side){
    jambSides[ri] = side;
    render();
    fetch('/api/orders/' + encodeURIComponent(quoteNumber), {
      method:'PATCH', credentials:'include', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ jambSide: jambSides })
    }).catch(()=>{});
  }

  function saveDate(val){ try { localStorage.setItem(dateKey(), val); } catch(e){} }
  function rmRow(ri, li){ DATA.rooms[ri].lines.splice(li,1); render(); }
  // Keep a booth's rows sorted by code (A01 first … Z64 last, numeric-aware).
  function sortLines(ri){
    (DATA.rooms[ri].lines||[]).sort((a,b)=>String(a.code).localeCompare(String(b.code), undefined, {numeric:true}));
  }
  // Inline edit of a PL row field. desc/pack just update data (smooth — keeps the
  // focus flow); dims/weight re-render so the metric + totals recompute; editing
  // the code re-sorts the booth and re-renders.
  function editCell(ri, li, field, raw){
    const line = DATA.rooms[ri] && DATA.rooms[ri].lines[li];
    if (!line) return;
    const v = String(raw==null?'':raw).trim();
    if (field==='desc' || field==='pack'){ line[field] = v; return; }
    if (field==='L'||field==='W'||field==='T'||field==='eachLb'){
      const n = parseFloat(v.replace(/[^0-9.\-]/g,''));
      line[field] = (v===''||v==='—'||isNaN(n)) ? null : n;
    } else if (field==='code'){
      line.code = v.toUpperCase();
      line.known = !!COMPONENTS[line.code];
      sortLines(ri);
    }
    render();
  }
  function addRow(ri){
    const inp = document.getElementById('addcode-'+ri);
    const code = (inp.value||'').trim().toUpperCase();
    if (!code) return;
    const c = COMPONENTS[code];
    if (!c){ alert('Unknown component code: ' + code); return; }
    DATA.rooms[ri].lines.push({ code, desc:c.desc||'', pack:c.pack||'', eachLb:c.lb, L:c.L, W:c.W, T:c.T, known:true });
    sortLines(ri);   // drop the new row into code order, not at the bottom
    inp.value=''; render();
  }

  if (!quoteNumber){ document.getElementById('rooms').innerHTML = '<div class="pl-page"><div class="empty">No quote number in the URL.</div></div>'; }
  else loadPL();
</script>
</body>
</html>
