<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2a2a2a;--border:#2e2e2e;
  --text:#e8e8e8;--text2:#aaa;--muted:#666;
  --orange:#ee6216;--orange-dim:rgba(238,98,22,.12);--orange-border:rgba(238,98,22,.3);
  --green:#22c55e;--green-dim:rgba(34,197,94,.1);--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --mono:'JetBrains Mono','Consolas',monospace;
}
:root.light{
  --bg:#f0f0f0;--surface:#fff;--surface2:#f5f5f5;--surface3:#ececec;--border:#e0e0e0;
  --text:#111;--text2:#555;--muted:#999;
  --orange:#c94f0e;--orange-dim:rgba(201,79,14,.08);--orange-border:rgba(201,79,14,.25);
  --green:#16a34a;--green-dim:rgba(22,163,74,.08);--amber:#d97706;--red:#dc2626;--blue:#2563eb;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Nav */
.topbar{display:flex;align-items:center;padding:0 20px;min-height:52px;background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:200;gap:10px}
.topbar-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#f0ede8;flex-shrink:0}
.topbar-logo span{color:#e8531a}
.topbar-nav{display:flex;gap:5px;align-items:center;flex:1}
.nav-link{padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:6px;color:rgba(255,255,255,.5);text-decoration:none;transition:.15s;white-space:nowrap;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.nav-link:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
.nav-link.active{background:rgba(238,98,22,.2);color:#ee6216;border-color:rgba(238,98,22,.4)}
.topbar-spacer{flex:1}
.theme-btn{padding:5px 9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f0ede8;cursor:pointer;font-size:14px;line-height:1}

/* Layout */
.main{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:block}
.sidebar-btn{display:block;width:100%;padding:7px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:5px;transition:.12s}
.sidebar-btn:hover{border-color:var(--orange-border);color:var(--text)}
.sidebar-btn.active{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange)}
.sidebar-select{width:100%;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:inherit;outline:none;cursor:pointer;margin-bottom:5px}
.refresh-btn{width:100%;padding:7px 10px;background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:6px;color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}

.content{flex:1;overflow-y:auto;padding:20px}
.section-title-bar{font-size:13px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title-bar span{font-size:11px;color:var(--muted);font-weight:400}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.kpi.orange{border-color:var(--orange-border);background:var(--orange-dim)}.kpi.orange .kpi-val{color:var(--orange)}
.kpi.green{border-color:rgba(34,197,94,.3);background:var(--green-dim)}.kpi.green .kpi-val{color:var(--green)}
.kpi.amber .kpi-val{color:var(--amber)}
.kpi.blue .kpi-val{color:var(--blue)}

/* Cards */
.card-grid{display:grid;gap:14px;margin-bottom:14px}
.card-grid.two{grid-template-columns:1fr 1fr}
.card-grid.three{grid-template-columns:1fr 1fr 1fr}
.card-grid.full{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.card-body{padding:16px}
.card-body.no-pad{padding:0}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-name{font-size:11px;color:var(--text);min-width:100px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-val{font-size:11px;font-weight:700;color:var(--text2);min-width:50px;text-align:right;flex-shrink:0}

/* Mini bar chart for monthly */
.month-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 0 20px;position:relative}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:2px}
.month-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .5s ease;position:relative;cursor:pointer}
.month-bar:hover{opacity:.8}
.month-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border);color:var(--text);font-size:10px;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;display:none;z-index:20}
.month-bar:hover .month-tip{display:block}
.month-label{font-size:9px;color:var(--muted);margin-top:4px;text-align:center}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-svg{flex-shrink:0}
.donut-legend{flex:1;font-size:11px}
.donut-legend-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tbl-mono{font-family:var(--mono);font-size:11px}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-border)}
.badge-muted{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.badge-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.3)}

/* Leaderboard */
.leader-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)}
.leader-row:last-child{border-bottom:none}
.leader-rank{font-size:18px;font-weight:800;color:var(--muted);min-width:28px}
.leader-rank.gold{color:#f59e0b}
.leader-rank.silver{color:#9ca3af}
.leader-rank.bronze{color:#92400e}
.leader-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.leader-stats{text-align:right}
.leader-val{font-size:14px;font-weight:800;color:var(--orange)}
.leader-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* Velocity timeline */
.velocity-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.vel-label{font-size:11px;color:var(--text2);min-width:120px}
.vel-bar{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.vel-fill{height:100%;border-radius:5px;transition:width .5s}
.vel-val{font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right}

/* US Map */
#usMap{width:100%;height:auto}
.state-path{fill:var(--surface2);stroke:var(--border);stroke-width:.5;cursor:pointer;transition:fill .2s}
.state-path:hover{opacity:.8}
.map-tooltip{position:fixed;background:#111;border:1px solid var(--border);color:var(--text);font-size:11px;padding:6px 10px;border-radius:6px;pointer-events:none;z-index:100;display:none}

/* Forecast */
.forecast-stage{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.forecast-stage:last-child{border-bottom:none}
.fs-name{font-size:11px;color:var(--text2);min-width:140px}
.fs-count{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.fs-raw{font-size:12px;font-weight:700;color:var(--text);min-width:80px;text-align:right}
.fs-weight{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.fs-weighted{font-size:12px;font-weight:700;color:var(--orange);min-width:80px;text-align:right}

/* Loading */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast-msg{padding:9px 18px;border-radius:7px;font-size:12px;font-weight:600;color:#fff;opacity:0;transition:opacity .25s}
.toast-msg.show{opacity:1}
.toast-error{background:#7a1a1a}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:900px){.sidebar{display:none}.card-grid.two,.card-grid.three{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Whisper<span>Room</span></div>
  <nav class="topbar-nav">
    <a href="/deals" class="nav-link">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link">Shipping</a>
    <a href="/reports" class="nav-link active">Reports</a>
  </nav>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
</div>

<div class="main">

  <!-- Sidebar filters -->
  <div class="sidebar">
    <div class="sidebar-section">
      <span class="sidebar-label">Period</span>
      <select class="sidebar-select" id="periodSelect" onchange="loadReport()">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="60">Last 60 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 6 months</option>
        <option value="365">Last 12 months</option>
      </select>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Sections</span>
      <button class="sidebar-btn active" onclick="scrollTo('overview')">📊 Overview</button>
      <button class="sidebar-btn" onclick="scrollTo('leaderboard')">🏆 Rep Leaderboard</button>
      <button class="sidebar-btn" onclick="scrollTo('velocity')">⚡ Sales Velocity</button>
      <button class="sidebar-btn" onclick="scrollTo('forecast')">🔮 Revenue Forecast</button>
      <button class="sidebar-btn" onclick="scrollTo('revisions')">🔄 Quote Revisions</button>
      <button class="sidebar-btn" onclick="scrollTo('products')">📦 Product Mix</button>
      <button class="sidebar-btn" onclick="scrollTo('customers')">🏢 Customer Insights</button>
      <button class="sidebar-btn" onclick="scrollTo('map')">🗺 Geography</button>
      <button class="sidebar-btn" onclick="scrollTo('monthly')">📅 Monthly Trend</button>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label" id="lastUpdatedLabel">—</span>
      <button class="refresh-btn" onclick="loadReport()">↺ Refresh</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="content" id="mainContent">
    <div id="loadingState" style="padding:60px;text-align:center;color:var(--muted);font-size:14px">Loading reports…</div>
    <div id="reportContent" style="display:none"></div>
  </div>
</div>

<div class="map-tooltip" id="mapTooltip"></div>
<div id="toast"></div>

<script>
const fmt  = n => '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtK = n => { const v=parseFloat(n||0); if(v>=1000000) return '$'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return '$'+(v/1000).toFixed(0)+'K'; return fmt(v); };
const pct  = (n,d) => d ? Math.round(n/d*100)+'%' : '—';
const fmtDate = d => d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'America/New_York'}):' — ';

function scrollTo(id) {
  const el = document.getElementById('section-'+id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
}

async function loadReport() {
  const period = document.getElementById('periodSelect').value;
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('reportContent').style.display = 'none';
  try {
    const res  = await fetch(`/api/reports?period=${period}`, { credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderAll(data);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('reportContent').style.display = 'block';
    document.getElementById('lastUpdatedLabel').textContent =
      'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
  } catch(e) {
    document.getElementById('loadingState').textContent = 'Error: '+e.message;
    showToast(e.message);
  }
}

function renderAll(data) {
  const content = document.getElementById('reportContent');
  const period = data.period || 30;

  content.innerHTML = `
    <div id="section-overview">${renderOverview(data, period)}</div>
    <div id="section-leaderboard" style="margin-top:24px">${renderLeaderboard(data)}</div>
    <div id="section-velocity" style="margin-top:24px">${renderVelocity(data)}</div>
    <div id="section-forecast" style="margin-top:24px">${renderForecast(data)}</div>
    <div id="section-revisions" style="margin-top:24px">${renderRevisions(data)}</div>
    <div id="section-products" style="margin-top:24px">${renderProducts(data, period)}</div>
    <div id="section-customers" style="margin-top:24px">${renderCustomers(data)}</div>
    <div id="section-map" style="margin-top:24px">${renderMapSection(data)}</div>
    <div id="section-monthly" style="margin-top:24px">${renderMonthly(data)}</div>
    <div style="height:40px"></div>
  `;

  // Draw SVG map after render
  setTimeout(() => drawMap(data.geography||{}), 100);
  // Draw donut charts
  setTimeout(() => drawSEDonut(data.seCounts||{}), 100);
}

// ── Overview KPIs ──────────────────────────────────────────────────
function renderOverview(data, period) {
  const q  = data.quotes   || {};
  const o  = data.orders   || {};
  const p  = data.pipeline || {};
  const at = data.allTime  || {};
  return `
    <div class="section-title-bar">📊 Overview <span>Last ${period} days</span></div>
    <div class="kpi-strip">
      <div class="kpi orange">
        <div class="kpi-label">Quotes Sent</div>
        <div class="kpi-val">${q.total||0}</div>
        <div class="kpi-sub">${fmtK(q.totalValue)} total value</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Accepted</div>
        <div class="kpi-val">${q.accepted||0}</div>
        <div class="kpi-sub">${q.acceptRate||0}% accept rate</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Pipeline Value</div>
        <div class="kpi-val">${fmtK(p.totalValue)}</div>
        <div class="kpi-sub">${p.totalDeals||0} active deals</div>
      </div>
      <div class="kpi blue">
        <div class="kpi-label">Weighted Forecast</div>
        <div class="kpi-val">${fmtK(p.weightedForecast)}</div>
        <div class="kpi-sub">Based on stage probability</div>
      </div>
      <div class="kpi ${(p.winRate||0)>=50?'green':''}">
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-val">${p.winRate!=null?p.winRate+'%':'—'}</div>
        <div class="kpi-sub">Closed won vs lost</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Orders Shipped</div>
        <div class="kpi-val">${o.shipped||0}</div>
        <div class="kpi-sub">${o.inProduction||0} in production</div>
      </div>
      <div class="kpi amber">
        <div class="kpi-label">Avg Days to Ship</div>
        <div class="kpi-val">${o.avgFulfillDays!=null?o.avgFulfillDays:'—'}</div>
        <div class="kpi-sub">From order to shipment</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">All-Time Quotes</div>
        <div class="kpi-val">${(at.totalQuotes||0).toLocaleString()}</div>
        <div class="kpi-sub">${at.uniqueCompanies||0} unique companies</div>
      </div>
    </div>
  `;
}

// ── Rep Leaderboard ────────────────────────────────────────────────
function renderLeaderboard(data) {
  const leaders = data.leaderboard || [];
  const pipeByRep = data.pipeline?.byRep || {};
  const rankMedals = ['🥇','🥈','🥉'];
  const rankClasses = ['gold','silver','bronze'];

  const rows = leaders.map((r, i) => {
    const pipe = pipeByRep[r.rep] || {};
    return `<div class="leader-row">
      <div class="leader-rank ${rankClasses[i]||''}">${rankMedals[i]||i+1}</div>
      <div class="leader-name">${r.rep}</div>
      <div style="text-align:center;min-width:60px">
        <div style="font-size:12px;font-weight:700;color:var(--text)">${r.quoted||0}</div>
        <div style="font-size:9px;color:var(--muted)">quoted</div>
      </div>
      <div style="text-align:center;min-width:60px">
        <div style="font-size:12px;font-weight:700;color:var(--green)">${r.accepted||0}</div>
        <div style="font-size:9px;color:var(--muted)">${pct(r.accepted,r.quoted)} accept</div>
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-size:12px;font-weight:700;color:var(--text)">${pipe.total||0}</div>
        <div style="font-size:9px;color:var(--muted)">total deals</div>
      </div>
      <div class="leader-stats">
        <div class="leader-val">${fmtK(r.acceptedVal)}</div>
        <div class="leader-sub">accepted value this month</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section-title-bar">🏆 Rep Leaderboard <span>This month</span></div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head">
          <span class="card-title">By Accepted Value — This Month</span>
        </div>
        <div class="card-body no-pad">
          ${rows || '<div style="padding:20px;font-size:12px;color:var(--muted)">No data this month</div>'}
        </div>
      </div>
    </div>
  `;
}

// ── Sales Velocity ─────────────────────────────────────────────────
function renderVelocity(data) {
  const v = data.velocity || {};
  const o = data.orders   || {};

  const stages = [
    { label:'Quote sent → Accepted', val: v.avgDaysToAccept, color:'var(--orange)', note:`${v.sampleSize||0} deals sampled` },
    { label:'Order → Shipped',       val: o.avgFulfillDays,  color:'var(--blue)',   note:'Production to door' },
  ];
  const maxVal = Math.max(...stages.map(s=>s.val||0), 1);

  const rows = stages.map(s => `
    <div class="velocity-row">
      <div class="vel-label">${s.label}</div>
      <div class="vel-bar"><div class="vel-fill" style="width:${s.val?Math.round(s.val/maxVal*100):0}%;background:${s.color}"></div></div>
      <div class="vel-val">${s.val!=null?s.val+' days':'—'}</div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin:-4px 0 12px 120px">${s.note}</div>
  `).join('');

  return `
    <div class="section-title-bar">⚡ Sales Velocity</div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head"><span class="card-title">Average Days Per Stage</span></div>
        <div class="card-body">${rows}
          <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
            Note: Quote → Accepted velocity will improve as more data accumulates in this system.
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Revenue Forecast ───────────────────────────────────────────────
function renderForecast(data) {
  const p = data.pipeline || {};
  const byStage = p.byStage || {};
  const WEIGHTS = {'Sent Quote':.20,'Updated Quote':.40,'Verbal Confirmation':.80,'Closed Won':.95,'Shipped':1.0};
  const STAGE_ORDER = ['Sent Quote','Updated Quote','Verbal Confirmation','Closed Won','Shipped'];

  const rows = STAGE_ORDER.filter(s=>byStage[s]).map(s => {
    const d = byStage[s];
    const w = WEIGHTS[s]||0;
    const weighted = Math.round(d.value * w);
    return `<div class="forecast-stage">
      <div class="fs-name">${s}</div>
      <div class="fs-count">${d.count}</div>
      <div class="fs-raw">${fmtK(d.value)}</div>
      <div class="fs-weight">${Math.round(w*100)}%</div>
      <div class="fs-weighted">${fmtK(weighted)}</div>
    </div>`;
  }).join('');

  const totalRow = `<div class="forecast-stage" style="background:var(--orange-dim)">
    <div class="fs-name" style="font-weight:800;color:var(--text)">Total Weighted</div>
    <div class="fs-count">${p.totalDeals||0}</div>
    <div class="fs-raw" style="color:var(--text)">${fmtK(p.totalValue)}</div>
    <div class="fs-weight">—</div>
    <div class="fs-weighted" style="font-size:14px">${fmtK(p.weightedForecast)}</div>
  </div>`;

  const payB = p.paymentBreakdown||{};
  const payTotal = (payB.paid||0)+(payB.po_received||0)+(payB.not_paid||0);

  return `
    <div class="section-title-bar">🔮 Revenue Forecast</div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head">
          <span class="card-title">Weighted Pipeline Forecast</span>
          <span style="font-size:11px;color:var(--orange);font-weight:700">${fmtK(p.weightedForecast)}</span>
        </div>
        <div class="card-body no-pad" style="padding:0 16px">
          <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">
            <div style="min-width:140px">Stage</div>
            <div style="min-width:40px;text-align:center">Deals</div>
            <div style="min-width:80px;text-align:right">Raw Value</div>
            <div style="min-width:40px;text-align:center">Weight</div>
            <div style="min-width:80px;text-align:right">Weighted</div>
          </div>
          ${rows}${totalRow}
          <div style="font-size:10px;color:var(--muted);padding:10px 0">
            Weights are configured estimates. Actual close rates will be tracked as data accumulates.
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Payment Status — All Deals</span></div>
        <div class="card-body">
          <div style="margin-bottom:16px">
            <div style="font-size:28px;font-weight:800;color:var(--text)">${payTotal}</div>
            <div style="font-size:11px;color:var(--muted)">Total active deals</div>
          </div>
          ${[
            {label:'Paid',         val:payB.paid||0,        color:'var(--green)'},
            {label:'PO Received',  val:payB.po_received||0, color:'var(--amber)'},
            {label:'Not Paid',     val:payB.not_paid||0,    color:'var(--muted)'},
          ].map(b=>`<div class="bar-row">
            <div class="bar-name">${b.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${payTotal?Math.round(b.val/payTotal*100):0}%;background:${b.color}"></div></div>
            <div class="bar-val">${b.val} <span style="font-weight:400;color:var(--muted)">(${pct(b.val,payTotal)})</span></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── Quote Revisions ────────────────────────────────────────────────
function renderRevisions(data) {
  const r = data.revisions || {};
  const dist = r.distribution || [];
  const maxDeals = Math.max(...dist.map(d=>d.deals),1);

  return `
    <div class="section-title-bar">🔄 Quote Revision Analysis <span>All time</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Quote Counts Per Deal</span></div>
        <div class="card-body">
          ${dist.map(d=>`<div class="bar-row">
            <div class="bar-name">${d.label} quote${d.label==='1'?'':'s'}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.deals/maxDeals*100)}%;background:${d.count===1?'var(--muted)':'var(--orange)'}"></div></div>
            <div class="bar-val">${d.deals} deals</div>
          </div>`).join('')}
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
            Avg ${r.avgQuotesPerDeal||'—'} quotes per deal across ${r.totalDeals||0} deals
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Revision Impact on Close Rate</span></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:14px">
            <div>
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Single quote deals</div>
              <div style="font-size:28px;font-weight:800;color:var(--text)">${r.singleAcceptRate!=null?r.singleAcceptRate+'%':'—'}</div>
              <div style="font-size:11px;color:var(--muted)">${r.singleQuote||0} deals with 1 quote</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Multi-quote deals (revised)</div>
              <div style="font-size:28px;font-weight:800;color:var(--orange)">${r.revisionAcceptRate!=null?r.revisionAcceptRate+'%':'—'}</div>
              <div style="font-size:11px;color:var(--muted)">${r.multiQuote||0} deals with 2+ quotes</div>
            </div>
            <div style="font-size:11px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border)">
              ${r.revisionAcceptRate > r.singleAcceptRate
                ? '✓ Revised quotes close at a higher rate — revisions are worth doing'
                : r.revisionAcceptRate < r.singleAcceptRate
                  ? 'Single quotes close better — may indicate revisions happen on harder deals'
                  : 'Not enough data yet to compare rates'}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Product Mix ────────────────────────────────────────────────────
function renderProducts(data, period) {
  const products = data.topProducts || [];
  const models   = data.mdlModels   || [];
  const se       = data.seCounts    || {};
  const apps     = data.applications|| [];

  const maxP = Math.max(...products.map(p=>p.count),1);
  const maxM = Math.max(...models.map(m=>m.count),1);

  return `
    <div class="section-title-bar">📦 Product Mix <span>Last ${period} days</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Top Products Quoted</span></div>
        <div class="card-body">
          ${products.map((p,i)=>`<div class="bar-row">
            <div class="bar-name" title="${p.name}">${p.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.count/maxP*100)}%;background:${i<3?'var(--orange)':'var(--muted)'}"></div></div>
            <div class="bar-val">${p.count}× <span style="font-size:9px;color:var(--muted)">${fmtK(p.revenue)}</span></div>
          </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No data</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">MDL Models</span></div>
        <div class="card-body">
          ${models.map((m,i)=>`<div class="bar-row">
            <div class="bar-name" style="font-family:var(--mono)">${m.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.count/maxM*100)}%;background:${i<3?'var(--blue)':'var(--muted)'}"></div></div>
            <div class="bar-val">${m.count}×</div>
          </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No MDL data</div>'}
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">S vs E Split</div>
            <div style="display:flex;gap:16px">
              <div><div style="font-size:20px;font-weight:800;color:var(--text)">${se.S||0}</div><div style="font-size:10px;color:var(--muted)">Standard</div></div>
              <div><div style="font-size:20px;font-weight:800;color:var(--orange)">${se.E||0}</div><div style="font-size:10px;color:var(--muted)">Electric</div></div>
              <div style="align-self:center;font-size:12px;color:var(--muted)">${se.S+se.E>0?Math.round(se.E/(se.S+se.E)*100)+'% electric':''}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    ${apps.length ? `
    <div class="card-grid full" style="margin-top:14px">
      <div class="card">
        <div class="card-head"><span class="card-title">Customer Application (HubSpot)</span></div>
        <div class="card-body">
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${apps.map(a=>`<div style="padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;color:var(--text)">
              ${a.name} <span style="color:var(--orange);margin-left:6px;font-weight:800">${a.count}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>` : ''}
  `;
}

// ── Customer Insights ──────────────────────────────────────────────
function renderCustomers(data) {
  const top     = data.topCustomers     || [];
  const repeats = data.repeatCustomers  || [];

  const topRows = top.map((c,i) => `<tr>
    <td>${i+1}</td>
    <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td>
    <td>${c.rep}</td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(c.totalValue)}</td>
    <td>${c.deals}</td>
    <td>${c.accepted}</td>
  </tr>`).join('');

  const repeatRows = repeats.map(c => `<tr>
    <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td>
    <td><span class="badge badge-orange">${c.deals} deals</span></td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(c.totalValue)}</td>
    <td>${c.rep}</td>
    <td style="color:var(--muted)">${fmtDate(c.lastDate)}</td>
  </tr>`).join('');

  return `
    <div class="section-title-bar">🏢 Customer Insights <span>All time</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">Top Customers by Value</span></div>
        <div class="card-body no-pad">
          <table class="tbl">
            <thead><tr><th>#</th><th>Company</th><th>Rep</th><th>Value</th><th>Deals</th><th>Won</th></tr></thead>
            <tbody>${topRows||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">No data</td></tr>'}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">Repeat Customers</span>
          <span style="font-size:11px;color:var(--orange);font-weight:700">${repeats.length} companies</span>
        </div>
        <div class="card-body no-pad">
          <table class="tbl">
            <thead><tr><th>Company</th><th>Activity</th><th>Value</th><th>Rep</th><th>Last Quote</th></tr></thead>
            <tbody>${repeatRows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">No repeat customers yet</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// ── Map ────────────────────────────────────────────────────────────
function renderMapSection(data) {
  const geo = data.geography || {};
  const total = Object.values(geo).reduce((s,v)=>s+v,0);
  const topStates = Object.entries(geo).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return `
    <div class="section-title-bar">🗺 Geographic Distribution <span>All time · ${total} quotes</span></div>
    <div class="card-grid two">
      <div class="card">
        <div class="card-head"><span class="card-title">US Sales Map</span></div>
        <div class="card-body" style="padding:8px">
          <svg id="usMap" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Top States</span></div>
        <div class="card-body">
          ${topStates.map(([state,count],i)=>`<div class="bar-row">
            <div class="bar-name" style="font-family:var(--mono);font-weight:700">${state}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/Math.max(...topStates.map(s=>s[1]))*100)}%;background:var(--orange)"></div></div>
            <div class="bar-val">${count}</div>
          </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No geographic data yet</div>'}
          ${total===0?'<div style="margin-top:12px;font-size:11px;color:var(--muted)">Geographic data populates as quotes are pushed with shipping addresses.</div>':''}
        </div>
      </div>
    </div>
  `;
}

// ── Monthly Trend ──────────────────────────────────────────────────
function renderMonthly(data) {
  const months = data.monthly || [];
  if (!months.length) return `
    <div class="section-title-bar">📅 Monthly Trend</div>
    <div class="card"><div class="card-body" style="color:var(--muted);font-size:12px">No data yet</div></div>
  `;
  const maxVal = Math.max(...months.map(m=>m.value),1);
  const bars = months.map(m=>`<div class="month-col">
    <div class="month-bar-wrap" style="flex:1;display:flex;align-items:flex-end;width:100%">
      <div class="month-bar" style="height:${Math.max(3,Math.round(m.value/maxVal*100))}%;background:var(--orange)">
        <div class="month-tip">${m.month}<br>${m.quotes} quotes · ${fmtK(m.value)}<br>${m.accepted} accepted (${pct(m.accepted,m.quotes)})</div>
      </div>
    </div>
    <div class="month-label">${m.month.split(' ')[0]}</div>
  </div>`).join('');

  const qRows = months.map(m=>`<tr>
    <td>${m.month}</td>
    <td>${m.quotes}</td>
    <td style="font-weight:700;color:var(--orange)">${fmtK(m.value)}</td>
    <td>${m.accepted}</td>
    <td>${pct(m.accepted,m.quotes)}</td>
    <td style="color:var(--muted)">${fmtK(m.value/(m.quotes||1))}</td>
  </tr>`).join('');

  return `
    <div class="section-title-bar">📅 Monthly Trend <span>Last 12 months</span></div>
    <div class="card-grid full">
      <div class="card">
        <div class="card-head"><span class="card-title">Quote Volume & Value by Month</span></div>
        <div class="card-body">
          <div class="month-chart">${bars}</div>
          <div style="margin-top:20px;overflow-x:auto">
            <table class="tbl">
              <thead><tr><th>Month</th><th>Quotes</th><th>Total Value</th><th>Accepted</th><th>Accept %</th><th>Avg Quote</th></tr></thead>
              <tbody>${qRows}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── US Map drawing ─────────────────────────────────────────────────
function drawMap(geo) {
  const svg = document.getElementById('usMap');
  if (!svg) return;

  const maxCount = Math.max(...Object.values(geo), 1);
  const getColor = count => {
    if (!count) return null;
    const intensity = Math.min(count / maxCount, 1);
    const r = Math.round(238 - intensity * 40);
    const g = Math.round(98 + intensity * 60);
    const b = Math.round(22 - intensity * 10);
    return `rgb(${r},${g},${b})`;
  };

  // Simplified US state paths (abbreviated)
  const STATE_PATHS = {
    AL:'M 549 353 L 549 430 L 522 430 L 513 408 L 510 360 L 549 353 Z',
    AK:'M 110 480 L 160 470 L 180 490 L 170 510 L 130 510 L 110 490 Z',
    AZ:'M 190 340 L 245 340 L 245 410 L 190 415 Z',
    AR:'M 505 335 L 550 335 L 548 385 L 505 385 Z',
    CA:'M 120 240 L 175 220 L 190 290 L 175 340 L 145 350 L 115 310 Z',
    CO:'M 280 275 L 360 275 L 358 325 L 280 323 Z',
    CT:'M 720 215 L 740 212 L 743 230 L 720 232 Z',
    DE:'M 705 260 L 718 258 L 720 275 L 706 278 Z',
    FL:'M 548 430 L 575 430 L 620 460 L 615 490 L 580 500 L 555 475 L 545 455 Z',
    GA:'M 553 355 L 600 355 L 600 420 L 575 435 L 548 430 L 549 353 Z',
    HI:'M 220 540 L 290 540 L 290 560 L 220 560 Z',
    ID:'M 195 175 L 235 165 L 245 240 L 220 240 L 207 210 Z',
    IL:'M 518 270 L 545 265 L 548 325 L 518 330 Z',
    IN:'M 548 268 L 575 265 L 577 322 L 548 325 Z',
    IA:'M 460 248 L 518 245 L 520 285 L 460 288 Z',
    KS:'M 363 298 L 458 295 L 460 330 L 363 333 Z',
    KY:'M 548 300 L 615 295 L 618 330 L 548 335 Z',
    LA:'M 480 395 L 530 393 L 535 425 L 510 440 L 480 435 Z',
    ME:'M 750 155 L 780 148 L 785 185 L 758 190 Z',
    MD:'M 672 268 L 710 263 L 712 285 L 680 292 L 672 278 Z',
    MA:'M 728 205 L 770 198 L 773 220 L 728 222 Z',
    MI:'M 548 200 L 598 185 L 608 240 L 578 245 L 548 235 Z',
    MN:'M 435 178 L 498 172 L 502 243 L 436 248 Z',
    MS:'M 510 353 L 548 353 L 548 430 L 513 430 Z',
    MO:'M 460 290 L 518 285 L 520 350 L 460 350 Z',
    MT:'M 210 162 L 340 155 L 343 218 L 212 222 Z',
    NE:'M 363 258 L 458 252 L 460 298 L 363 300 Z',
    NV:'M 162 235 L 205 218 L 210 295 L 190 320 L 155 290 Z',
    NH:'M 730 175 L 748 170 L 752 213 L 731 215 Z',
    NJ:'M 700 240 L 718 237 L 720 265 L 700 268 Z',
    NM:'M 248 340 L 315 338 L 315 405 L 248 408 Z',
    NY:'M 660 190 L 728 178 L 730 225 L 680 232 L 662 215 Z',
    NC:'M 598 315 L 672 308 L 675 340 L 598 345 Z',
    ND:'M 358 170 L 435 165 L 438 212 L 358 215 Z',
    OH:'M 578 260 L 618 255 L 620 308 L 578 312 Z',
    OK:'M 362 330 L 458 325 L 460 365 L 362 368 Z',
    OR:'M 128 195 L 200 178 L 207 240 L 132 245 Z',
    PA:'M 620 230 L 700 222 L 703 265 L 620 272 Z',
    RI:'M 742 215 L 752 213 L 754 228 L 743 230 Z',
    SC:'M 598 348 L 645 342 L 648 380 L 598 380 Z',
    SD:'M 358 212 L 435 208 L 437 255 L 358 258 Z',
    TN:'M 520 330 L 615 323 L 618 355 L 520 360 Z',
    TX:'M 315 338 L 460 330 L 465 445 L 390 450 L 310 410 Z',
    UT:'M 218 270 L 275 265 L 278 338 L 218 342 Z',
    VT:'M 712 175 L 730 172 L 733 215 L 712 218 Z',
    VA:'M 615 280 L 675 272 L 678 310 L 618 318 Z',
    WA:'M 132 148 L 210 138 L 213 178 L 132 185 Z',
    WV:'M 618 270 L 658 262 L 660 295 L 618 302 Z',
    WI:'M 490 198 L 545 190 L 548 248 L 490 252 Z',
    WY:'M 280 218 L 358 212 L 360 270 L 280 275 Z',
    DC:'M 693 272 L 700 268 L 703 276 L 696 280 Z',
  };

  const tooltip = document.getElementById('mapTooltip');
  svg.innerHTML = '';

  Object.entries(STATE_PATHS).forEach(([abbr, path]) => {
    const count = geo[abbr] || 0;
    const color = getColor(count);
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d', path);
    el.setAttribute('class','state-path');
    el.setAttribute('data-state', abbr);
    el.setAttribute('data-count', count);
    if (color) el.style.fill = color;

    // Add state abbreviation label
    const bounds = (() => {
      const pts = path.match(/[\d.]+\s+[\d.]+/g)||[];
      const xs=pts.map(p=>parseFloat(p.split(' ')[0]));
      const ys=pts.map(p=>parseFloat(p.split(' ')[1]));
      return {cx:(Math.min(...xs)+Math.max(...xs))/2,cy:(Math.min(...ys)+Math.max(...ys))/2};
    })();

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', bounds.cx);
    text.setAttribute('y', bounds.cy+3);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('font-size','7');
    text.setAttribute('font-family','DM Sans,sans-serif');
    text.setAttribute('font-weight','700');
    text.setAttribute('fill', color ? '#fff' : 'var(--muted)');
    text.setAttribute('pointer-events','none');
    text.textContent = abbr;

    el.addEventListener('mouseenter', e => {
      tooltip.style.display = 'block';
      tooltip.innerHTML = `<strong>${abbr}</strong> — ${count} quote${count!==1?'s':''}`;
    });
    el.addEventListener('mousemove', e => {
      tooltip.style.left = e.clientX+12+'px';
      tooltip.style.top  = e.clientY-28+'px';
    });
    el.addEventListener('mouseleave', () => { tooltip.style.display='none'; });

    svg.appendChild(el);
    if (!['AK','HI','RI','DC'].includes(abbr)) svg.appendChild(text);
  });
}

function drawSEDonut(se) { /* reserved for future */ }

function showToast(msg) {
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-msg toast-error';
  el.textContent=msg;
  t.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4000);
}
function toggleTheme() {
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('wr-theme',isLight?'light':'dark');
}
if(localStorage.getItem('wr-theme')==='light'){
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeBtn');if(b)b.textContent='🌙';});
}
loadReport();
