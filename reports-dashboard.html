<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --border:#2e2e2e;
  --text:#e8e8e8; --text2:#aaa; --muted:#666;
  --orange:#ee6216; --orange-dim:rgba(238,98,22,.12); --orange-border:rgba(238,98,22,.3);
  --green:#22c55e; --green-dim:rgba(34,197,94,.1);
  --amber:#f59e0b; --red:#ef4444; --blue:#3b82f6;
  --mono:'JetBrains Mono','Consolas',monospace;
}
:root.light {
  --bg:#f0f0f0; --surface:#fff; --surface2:#f5f5f5; --border:#e0e0e0;
  --text:#111; --text2:#555; --muted:#999;
  --orange:#c94f0e; --orange-dim:rgba(201,79,14,.08); --orange-border:rgba(201,79,14,.25);
  --green:#16a34a; --green-dim:rgba(22,163,74,.08); --amber:#d97706; --red:#dc2626; --blue:#2563eb;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
.topbar { display:flex; align-items:center; padding:0 20px; min-height:52px; background:#1a1a1a; border-bottom:1px solid rgba(255,255,255,.1); position:sticky; top:0; z-index:200; gap:10px; }
.topbar-logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#f0ede8; flex-shrink:0; }
.topbar-logo span { color:#e8531a; }
.topbar-nav { display:flex; gap:5px; align-items:center; flex:1; }
.nav-link { padding:5px 10px; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; border-radius:6px; color:rgba(255,255,255,.5); text-decoration:none; transition:.15s; white-space:nowrap; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); }
.nav-link:hover { background:rgba(255,255,255,.12); color:rgba(255,255,255,.9); }
.nav-link.active { background:rgba(238,98,22,.2); color:#ee6216; border-color:rgba(238,98,22,.4); }
.topbar-spacer { flex:1; }
.theme-btn { padding:5px 9px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:6px; color:#f0ede8; cursor:pointer; font-size:14px; line-height:1; }
.main { padding:24px; max-width:1400px; margin:0 auto; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text); }
.page-title span { color:var(--orange); }
.period-select { padding:7px 12px; background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:12px; font-family:inherit; outline:none; cursor:pointer; }
.last-updated { font-size:11px; color:var(--muted); }

/* Stat cards */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
.stat-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
.stat-value { font-size:26px; font-weight:800; color:var(--text); line-height:1; }
.stat-sub { font-size:11px; color:var(--muted); margin-top:5px; }
.stat-card.highlight { border-color:var(--orange-border); background:var(--orange-dim); }
.stat-card.highlight .stat-value { color:var(--orange); }
.stat-card.green { border-color:rgba(34,197,94,.3); background:var(--green-dim); }
.stat-card.green .stat-value { color:var(--green); }

/* Section layout */
.sections { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.sections.three { grid-template-columns:1fr 1fr 1fr; }
.sections.full { grid-template-columns:1fr; }
.section { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.section-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.section-title { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--text2); }
.section-body { padding:16px; }

/* Bar chart */
.bar-chart { display:flex; flex-direction:column; gap:8px; }
.bar-row { display:flex; align-items:center; gap:10px; }
.bar-label { font-size:11px; color:var(--text); min-width:90px; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
.bar-track { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
.bar-val { font-size:11px; font-weight:700; color:var(--text2); min-width:40px; text-align:right; flex-shrink:0; }

/* Monthly chart */
.month-chart { display:flex; align-items:flex-end; gap:8px; height:140px; padding-bottom:20px; position:relative; }
.month-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; }
.month-bar-wrap { flex:1; display:flex; align-items:flex-end; width:100%; }
.month-bar { width:100%; border-radius:4px 4px 0 0; min-height:2px; transition:height .5s ease; position:relative; cursor:pointer; }
.month-bar:hover { opacity:.8; }
.month-bar-tip { position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%); background:#333; color:#fff; font-size:10px; padding:3px 6px; border-radius:4px; white-space:nowrap; pointer-events:none; display:none; z-index:10; }
.month-bar:hover .month-bar-tip { display:block; }
.month-label { font-size:9px; color:var(--muted); text-align:center; margin-top:4px; }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table th { padding:8px 10px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); border-bottom:1px solid var(--border); }
.data-table td { padding:8px 10px; border-bottom:1px solid var(--border); color:var(--text); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:rgba(255,255,255,.02); }
.badge { font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px; text-transform:uppercase; }
.badge-green { background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.badge-orange { background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-border); }
.badge-muted { background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }

/* Pipeline funnel */
.funnel { display:flex; flex-direction:column; gap:6px; }
.funnel-row { display:flex; align-items:center; gap:10px; }
.funnel-stage { font-size:11px; color:var(--text); min-width:140px; }
.funnel-bar { flex:1; height:28px; border-radius:5px; display:flex; align-items:center; padding:0 10px; }
.funnel-bar span { font-size:11px; font-weight:700; color:#fff; }
.funnel-meta { font-size:11px; color:var(--text2); min-width:80px; text-align:right; }

/* Loading skeleton */
.skeleton { background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Toast */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
.toast-msg { padding:9px 18px; border-radius:7px; font-size:12px; font-weight:600; color:#fff; opacity:0; transition:opacity .25s; }
.toast-msg.show { opacity:1; }
.toast-error { background:#7a1a1a; }

@media(max-width:900px) { .sections,.sections.three { grid-template-columns:1fr; } }
::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Whisper<span>Room</span></div>
  <nav class="topbar-nav">
    <a href="/deals" class="nav-link">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link">Shipping</a>
    <a href="/reports" class="nav-link active">Reports</a>
  </nav>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
</div>

<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Reports & <span>Analytics</span></div>
      <div class="last-updated" id="lastUpdated">Loading…</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select class="period-select" id="periodSelect" onchange="loadReport()">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="60">Last 60 days</option>
        <option value="90">Last 90 days</option>
        <option value="365">Last 12 months</option>
      </select>
      <button onclick="loadReport()" style="padding:7px 14px;font-size:11px;font-weight:700;background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:7px;color:var(--orange);cursor:pointer;font-family:inherit">↺ Refresh</button>
    </div>
  </div>

  <!-- KPI Row -->
  <div class="stat-grid" id="kpiGrid">
    <div class="stat-card skeleton" style="height:80px"></div>
    <div class="stat-card skeleton" style="height:80px"></div>
    <div class="stat-card skeleton" style="height:80px"></div>
    <div class="stat-card skeleton" style="height:80px"></div>
    <div class="stat-card skeleton" style="height:80px"></div>
    <div class="stat-card skeleton" style="height:80px"></div>
  </div>

  <!-- Row 2: Monthly + Pipeline -->
  <div class="sections" style="grid-template-columns:1.4fr 1fr">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Quote Volume & Value — Last 6 Months</span>
      </div>
      <div class="section-body" id="monthlyChart" style="min-height:180px"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">Pipeline Snapshot</span>
        <span id="pipelineTotal" style="font-size:12px;font-weight:700;color:var(--orange)"></span>
      </div>
      <div class="section-body" id="pipelineFunnel"></div>
    </div>
  </div>

  <!-- Row 3: Rep performance + Top products -->
  <div class="sections" style="margin-top:16px">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Rep Performance</span>
        <span style="font-size:10px;color:var(--muted)" id="repPeriodLabel"></span>
      </div>
      <div class="section-body" id="repTable"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">Top Products Quoted</span>
        <span style="font-size:10px;color:var(--muted)" id="productPeriodLabel"></span>
      </div>
      <div class="section-body" id="productBars"></div>
    </div>
  </div>

  <!-- Row 4: Order stats + Recent quotes -->
  <div class="sections" style="margin-top:16px">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Order & Fulfillment Stats</span>
      </div>
      <div class="section-body" id="orderStats"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">Payment Status</span>
      </div>
      <div class="section-body" id="paymentStats"></div>
    </div>
  </div>

  <!-- Row 5: Recent quotes table -->
  <div class="sections full" style="margin-top:16px">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Recent Quotes</span>
        <span id="recentPeriodLabel" style="font-size:10px;color:var(--muted)"></span>
      </div>
      <div class="section-body" style="padding:0;overflow-x:auto" id="recentQuotes"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const fmt  = n => '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtK = n => {
  const v = parseFloat(n||0);
  if(v>=1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if(v>=1000)    return '$'+(v/1000).toFixed(0)+'K';
  return fmt(v);
};
const pct = (n,d) => d?Math.round(n/d*100)+'%':'—';
const fmtDate = d => d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/New_York'}):'—';

async function loadReport() {
  const period = document.getElementById('periodSelect').value;
  document.getElementById('lastUpdated').textContent = 'Loading…';
  try {
    const res  = await fetch(`/api/reports?period=${period}`,{credentials:'include'});
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    renderAll(data);
    document.getElementById('lastUpdated').textContent =
      'Generated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
  } catch(e) {
    document.getElementById('lastUpdated').textContent = 'Error: '+e.message;
    showToast(e.message);
  }
}

function renderAll(data) {
  renderKPIs(data);
  renderMonthly(data.monthly||[]);
  renderPipeline(data.pipeline||{});
  renderRepTable(data.quotes?.byRep||{}, data.pipeline?.byRep||{}, data.period);
  renderProducts(data.topProducts||[], data.period);
  renderOrderStats(data.orders||{});
  renderPaymentStats(data.pipeline?.paymentBreakdown||{});
  renderRecentQuotes(data.quotes?.recentList||[], data.period);
}

function renderKPIs(data) {
  const q   = data.quotes    || {};
  const o   = data.orders    || {};
  const p   = data.pipeline  || {};
  const at  = data.allTime   || {};
  const period = data.period || 30;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="stat-card highlight">
      <div class="stat-label">Quotes Sent (${period}d)</div>
      <div class="stat-value">${q.total||0}</div>
      <div class="stat-sub">${fmtK(q.totalValue)} total value</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Accepted (${period}d)</div>
      <div class="stat-value">${q.accepted||0}</div>
      <div class="stat-sub">${q.acceptRate||0}% accept rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Orders Shipped (${period}d)</div>
      <div class="stat-value">${o.shipped||0}</div>
      <div class="stat-sub">${o.inProduction||0} in production</div>
    </div>
    <div class="stat-card ${p.winRate>=50?'green':''}">
      <div class="stat-label">Win Rate (all time)</div>
      <div class="stat-value">${p.winRate!=null?p.winRate+'%':'—'}</div>
      <div class="stat-sub">Closed won vs lost</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pipeline Value</div>
      <div class="stat-value">${fmtK(p.totalValue)}</div>
      <div class="stat-sub">${p.totalDeals||0} active deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All-Time Quotes</div>
      <div class="stat-value">${(at.totalQuotes||0).toLocaleString()}</div>
      <div class="stat-sub">${at.uniqueCompanies||0} unique companies</div>
    </div>
  `;
}

function renderMonthly(months) {
  if(!months.length) {
    document.getElementById('monthlyChart').innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">No data</div>';
    return;
  }
  const maxVal = Math.max(...months.map(m=>m.value), 1);
  const bars = months.map(m => {
    const h = Math.max(4, Math.round((m.value/maxVal)*110));
    return `<div class="month-col">
      <div class="month-bar-wrap">
        <div class="month-bar" style="height:${h}px;background:var(--orange);opacity:${0.5+0.5*(m.value/maxVal)}">
          <div class="month-bar-tip">${m.month}<br>${m.quotes} quotes · ${fmtK(m.value)}<br>${m.accepted} accepted</div>
        </div>
      </div>
      <div class="month-label">${m.month.split(' ')[0]}</div>
    </div>`;
  }).join('');
  document.getElementById('monthlyChart').innerHTML = `<div class="month-chart">${bars}</div>`;
}

function renderPipeline(p) {
  const byStage = p.byStage || {};
  document.getElementById('pipelineTotal').textContent = fmtK(p.totalValue);
  const stageOrder = ['Sent Quote','Updated Quote','Verbal Confirmation','Closed Won','Shipped','Closed Lost'];
  const stageColors = {
    'Sent Quote':'#ee6216','Updated Quote':'#ee6216','Verbal Confirmation':'#f59e0b',
    'Closed Won':'#22c55e','Shipped':'#3b82f6','Closed Lost':'#555'
  };
  const maxCount = Math.max(...Object.values(byStage).map(s=>s.count), 1);
  const rows = stageOrder.filter(s=>byStage[s]).map(s => {
    const d   = byStage[s];
    const w   = Math.max(8, Math.round((d.count/maxCount)*100));
    const col = stageColors[s]||'#666';
    return `<div class="funnel-row">
      <div class="funnel-stage">${s}</div>
      <div class="funnel-bar" style="background:${col};width:${w}%;opacity:.85">
        <span>${d.count}</span>
      </div>
      <div class="funnel-meta">${fmtK(d.value)}</div>
    </div>`;
  }).join('');
  document.getElementById('pipelineFunnel').innerHTML = `<div class="funnel">${rows||'<div style="color:var(--muted);font-size:12px">No data</div>'}</div>`;
}

function renderRepTable(byRep, pipeByRep, period) {
  document.getElementById('repPeriodLabel').textContent = `Last ${period} days`;
  const reps = Object.entries(byRep).sort((a,b)=>b[1].value-a[1].value);
  if(!reps.length) { document.getElementById('repTable').innerHTML='<div style="color:var(--muted);font-size:12px">No data</div>'; return; }
  const maxVal = Math.max(...reps.map(r=>r[1].value),1);
  const rows = reps.map(([rep,d]) => {
    const pipe = pipeByRep[rep] || {};
    return `<div class="bar-row" style="margin-bottom:10px">
      <div class="bar-label" style="font-weight:700">${rep}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.value/maxVal*100)}%;background:var(--orange)"></div></div>
          <span style="font-size:11px;font-weight:700;color:var(--orange);min-width:50px">${fmtK(d.value)}</span>
        </div>
        <div style="font-size:10px;color:var(--muted)">${d.count} quotes · ${d.accepted} accepted (${pct(d.accepted,d.count)}) · ${pipe.total||0} deals</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('repTable').innerHTML = rows;
}

function renderProducts(products, period) {
  document.getElementById('productPeriodLabel').textContent = `Last ${period} days`;
  if(!products.length) { document.getElementById('productBars').innerHTML='<div style="color:var(--muted);font-size:12px">No data</div>'; return; }
  const maxCount = Math.max(...products.map(p=>p.count),1);
  const bars = products.map((p,i) => `
    <div class="bar-row" style="margin-bottom:7px">
      <div class="bar-label" style="font-size:11px">${p.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.count/maxCount*100)}%;background:${i<3?'var(--orange)':'var(--muted)'}"></div></div>
      <div class="bar-val">${p.count}×</div>
    </div>
  `).join('');
  document.getElementById('productBars').innerHTML = `<div class="bar-chart">${bars}</div>`;
}

function renderOrderStats(o) {
  const carrierEntries = Object.entries(o.byCarrier||{}).sort((a,b)=>b[1]-a[1]);
  const foamEntries    = o.byFoamColor || [];
  document.getElementById('orderStats').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Fulfillment</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:var(--text2)">Avg. time to ship</span>
            <span style="font-size:13px;font-weight:700;color:var(--text)">${o.avgFulfillDays!=null?o.avgFulfillDays+' days':'—'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:var(--text2)">Orders shipped</span>
            <span style="font-size:13px;font-weight:700;color:var(--green)">${o.shipped||0}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:var(--text2)">In production</span>
            <span style="font-size:13px;font-weight:700;color:var(--amber)">${o.inProduction||0}</span>
          </div>
        </div>
        ${carrierEntries.length?`
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px">By Carrier</div>
          ${carrierEntries.map(([c,n])=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">${c}</span><span style="font-weight:700">${n}</span></div>`).join('')}
        `:''}
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Foam Colors</div>
        ${foamEntries.length
          ? foamEntries.map(([f,n])=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">${f||'Unknown'}</span><span style="font-weight:700">${n}</span></div>`).join('')
          : '<div style="font-size:12px;color:var(--muted)">No data</div>'
        }
      </div>
    </div>
  `;
}

function renderPaymentStats(breakdown) {
  const total = (breakdown.paid||0)+(breakdown.po_received||0)+(breakdown.not_paid||0);
  const bars = [
    {label:'Paid',          val:breakdown.paid||0,        color:'var(--green)'},
    {label:'PO Received',   val:breakdown.po_received||0, color:'var(--amber)'},
    {label:'Not Paid',      val:breakdown.not_paid||0,    color:'var(--muted)'},
  ];
  const maxVal = Math.max(...bars.map(b=>b.val),1);
  document.getElementById('paymentStats').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:28px;font-weight:800;color:var(--text)">${total}</div>
      <div style="font-size:11px;color:var(--muted)">Total active deals</div>
    </div>
    <div class="bar-chart">
      ${bars.map(b=>`<div class="bar-row">
        <div class="bar-label">${b.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(b.val/maxVal*100)}%;background:${b.color}"></div></div>
        <div class="bar-val">${b.val}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;font-size:11px;color:var(--muted)">
      ${total>0?`${Math.round((breakdown.paid||0)/total*100)}% fully paid · ${Math.round((breakdown.po_received||0)/total*100)}% PO received`:''}
    </div>
  `;
}

function renderRecentQuotes(quotes, period) {
  document.getElementById('recentPeriodLabel').textContent = `Last ${period} days`;
  if(!quotes.length) {
    document.getElementById('recentQuotes').innerHTML='<div style="padding:16px;font-size:12px;color:var(--muted)">No quotes in this period</div>';
    return;
  }
  const rows = quotes.map(q=>`
    <tr>
      <td style="font-family:var(--mono);font-size:11px">${q.quoteNumber}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.dealName}</td>
      <td>${q.rep}</td>
      <td style="font-weight:700;color:var(--orange)">${fmt(q.total)}</td>
      <td>${q.accepted?'<span class="badge badge-green">✓ Accepted</span>':'<span class="badge badge-muted">Sent</span>'}</td>
      <td style="color:var(--muted)">${fmtDate(q.date)}</td>
    </tr>
  `).join('');
  document.getElementById('recentQuotes').innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>Quote #</th><th>Deal / Company</th><th>Rep</th><th>Value</th><th>Status</th><th>Date</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function showToast(msg) {
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-msg toast-error';
  el.textContent=msg;
  t.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4000);
}
function toggleTheme() {
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('wr-theme',isLight?'light':'dark');
}
if(localStorage.getItem('wr-theme')==='light'){
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeBtn');if(b)b.textContent='🌙';});
}
loadReport();
</script>
</body>
</html>
