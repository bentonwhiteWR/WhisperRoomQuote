<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperRoom — Shipping Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --orange: #ee6216;
    --orange-dim: rgba(238,98,22,.12);
    --text: #e8e8e8;
    --muted: #888;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,.12);
    --yellow: #f59e0b;
    --yellow-dim: rgba(245,158,11,.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,.12);
    --row-hover: rgba(255,255,255,.02);
    --skeleton-a: #222;
    --skeleton-b: #2a2a2a;
  }
  :root.light {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --border: #e0e0e0;
    --orange: #d44f0c;
    --orange-dim: rgba(212,79,12,.1);
    --text: #1a1a1a;
    --muted: #666;
    --green: #16a34a;
    --green-dim: rgba(22,163,74,.1);
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,.1);
    --yellow: #d97706;
    --yellow-dim: rgba(217,119,6,.1);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,.1);
    --row-hover: rgba(0,0,0,.02);
    --skeleton-a: #e8e8e8;
    --skeleton-b: #d0d0d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .header {
    background: #1a1a1a;
    border-bottom: 1px solid rgba(255,255,255,.1);
    padding: 0 20px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
    flex-wrap: nowrap;
  }
  .logo-wrap { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -.3px; line-height: 1; }
  .logo-whisper { color: #f0ede8; }
  .logo-room   { color: #e8531a; }
  .logo-divider { color: rgba(255,255,255,.3); font-weight: 400; font-size: 12px; margin-left: 10px; white-space: nowrap; }

  .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .nav-link {
    color: rgba(255,255,255,.55); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    text-decoration: none; padding: 5px 10px; border-radius: 6px; white-space: nowrap;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    transition: background .15s, color .15s;
  }
  .nav-link:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.9); }
  .nav-link.active { background: rgba(238,98,22,.2); border-color: rgba(238,98,22,.4); color: #ee6216; }
  .mode-btn {
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: #f0ede8;
    width: 32px; height: 32px; border-radius: 8px; font-size: 15px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .mode-btn:hover { background: rgba(255,255,255,.14); }
  .refresh-btn {
    background: var(--orange); color: white; border: none;
    padding: 7px 14px; border-radius: 7px; font-size: 13px;
    font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: opacity .15s;
  }
  .refresh-btn:hover { opacity: .85; }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 800; }

  .filters {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .search-input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 13px; flex: 1; min-width: 200px;
    outline: none; transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--orange); }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer;
  }
  .filter-count { font-size: 12px; color: var(--muted); margin-left: 4px; }

  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th:nth-child(1), td:nth-child(1) { width: 20%; }  /* Customer */
  th:nth-child(2), td:nth-child(2) { width: 7%;  }  /* Carrier */
  th:nth-child(3), td:nth-child(3) { width: 11%; }  /* Tracking # */
  th:nth-child(4), td:nth-child(4) { width: 11%; }  /* Status */
  th:nth-child(5), td:nth-child(5) { width: 18%; }  /* Latest Event */
  th:nth-child(6), td:nth-child(6) { width: 9%;  }  /* Date Shipped */
  th:nth-child(7), td:nth-child(7) { width: 13%; }  /* Destination */
  th:nth-child(8), td:nth-child(8) { width: 7%;  }  /* Transit Time */
  th:nth-child(9), td:nth-child(9) { width: 4%;  }  /* HubSpot */
  thead { background: var(--surface2); }
  th {
    padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 13px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--row-hover); }

  .deal-name {
    font-weight: 600; color: var(--text); text-decoration: none;
    display: block; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .deal-name:hover { color: var(--orange); }
  .deal-address { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .carrier-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 5px; font-size: 12px; font-weight: 700; letter-spacing: .03em;
  }
  .carrier-ABF   { background: var(--orange-dim); color: var(--orange); }
  .carrier-OD    { background: var(--blue-dim);   color: var(--blue);   }
  .carrier-UPS   { background: var(--yellow-dim); color: var(--yellow); }
  .carrier-FedEx { background: var(--red-dim);    color: var(--red);    }
  .carrier-USPS  { background: var(--green-dim);  color: var(--green);  }
  .carrier-Other { background: rgba(255,255,255,.06); color: var(--muted); }

  .tracking-cell { display: flex; align-items: center; gap: 6px; }
  .tracking-link {
    font-family: monospace; font-size: 13px; color: var(--orange);
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  }
  .tracking-link:hover { text-decoration: underline; }
  .tracking-none { color: var(--muted); font-size: 12px; font-style: italic; }

  .copy-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 7px; border-radius: 5px; font-size: 11px; cursor: pointer; transition: all .15s;
  }
  .copy-btn:hover { border-color: var(--orange); color: var(--orange); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 700;
    text-decoration: none; white-space: nowrap;
  }
  .status-delivered  { background: var(--green-dim); color: var(--green); }
  .status-transit    { background: var(--blue-dim);  color: var(--blue);  }
  .status-pickup     { background: var(--yellow-dim);color: var(--yellow);}
  .status-exception  { background: var(--red-dim);   color: var(--red);   }
  .status-unknown    { background: rgba(255,255,255,.06); color: var(--muted); }
  .status-loading    { background: rgba(255,255,255,.06); color: var(--muted); animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse   { 0%,100%{opacity:.4} 50%{opacity:1} }

  .amount { font-weight: 600; }
  .rep-name { font-size: 12px; }
  .date-cell { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .hs-link {
    color: var(--muted); text-decoration: none; font-size: 12px;
    display: flex; align-items: center; gap: 4px; transition: color .15s;
  }
  .hs-link:hover { color: var(--orange); }

  .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .loading-row td { text-align: center; padding: 48px; }
  .skeleton-line {
    height: 14px;
    background: linear-gradient(90deg, var(--skeleton-a) 25%, var(--skeleton-b) 50%, var(--skeleton-a) 75%);
    background-size: 400% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
  }
  @keyframes shimmer { to { background-position: -400% 0; } }

  @media (max-width: 768px) {
    .main { padding: 12px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { padding: 10px 12px; }
    .stat-value { font-size: 20px; }
    .filters { gap: 8px; }
    .search-input { min-width: 0; font-size: 14px; }
    .filter-select { font-size: 13px; padding: 7px 10px; }

    /* Switch to card layout on mobile — no table */
    .table-wrap { border-radius: 10px; overflow: hidden; }
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    tr {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    tr:last-child { border-bottom: none; }
    tr:hover td { background: none; }

    /* Each TD becomes a layout element */
    td { padding: 0; border: none; display: inline; }

    /* Row layout: custom via data-col */
    tr { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto auto; gap: 4px 8px; }

    /* Col 1: Deal name (spans full width top) */
    td:nth-child(1) { grid-column: 1 / 3; grid-row: 1; display: block; }
    .deal-name { max-width: 100%; font-size: 13px; }
    .deal-address { font-size: 11px; }

    /* Col 2: Carrier badge (row 2 left) */
    td:nth-child(2) { grid-column: 1; grid-row: 2; display: inline-flex; align-items: center; }

    /* Col 3: Tracking # (row 2 right, hidden — shown in status row) */
    td:nth-child(3) { grid-column: 2; grid-row: 2; display: inline-flex; align-items: center; justify-content: flex-end; }
    .tracking-link { font-size: 12px; }
    .copy-btn { display: none; }

    /* Col 4: Status (row 3 left) */
    td:nth-child(4) { grid-column: 1; grid-row: 3; display: inline-flex; align-items: center; }

    /* Col 5,6,7: Date, Amount, Rep — show as small inline row 3 right */
    td:nth-child(5) { grid-column: 2; grid-row: 3; display: inline-flex; align-items: center; justify-content: flex-end; }
    td:nth-child(5).hide-mobile { display: inline-flex !important; }
    .date-cell { font-size: 11px; color: var(--muted); }

    /* Hide amount, rep, hubspot on mobile */
    td:nth-child(6), td:nth-child(7), td:nth-child(8), td:nth-child(9) { display: none !important; }
  }

  @media (max-width: 420px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 0 10px; }
    .logo-text { font-size: 16px; }
    .logo-divider { display: none; }
    .header-right { gap: 4px; }
    .nav-link { padding: 4px 7px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <span class="logo-text"><span class="logo-whisper">Whisper</span><span class="logo-room">Room</span></span>
    <span class="logo-divider">/ Shipping Board</span>
  </div>
  <div class="header-right">
    <a href="/" class="nav-link">← Quote Builder</a>
    <a href="/orders" class="nav-link">📦 Orders</a>
    <button class="mode-btn" id="modeBtn" onclick="toggleMode()" title="Toggle light/dark mode">
      <span id="modeIcon">☀️</span>
    </button>
    <button onclick="openAddShipment()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#f0ede8;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.14)'" onmouseout="this.style.background='rgba(255,255,255,.08)'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Shipment
    </button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadShipments()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="main">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Last 30 Days</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">ABF</div><div class="stat-value" style="color:var(--orange)" id="statABF">—</div></div>
    <div class="stat-card"><div class="stat-label">Old Dominion</div><div class="stat-value" style="color:var(--blue)" id="statOD">—</div></div>
    <div class="stat-card"><div class="stat-label">UPS / Other</div><div class="stat-value" style="color:var(--muted)" id="statOther">—</div></div>

  </div>

  <div class="filters">
    <input type="text" class="search-input" id="searchInput" placeholder="Search customer, deal, tracking #..." oninput="filterTable()">
    <select class="filter-select" id="carrierFilter" onchange="filterTable()">
      <option value="">All Carriers</option>
      <option value="ABF">ABF</option>
      <option value="OD">Old Dominion</option>
      <option value="UPS">UPS</option>
      <option value="FedEx">FedEx</option>
      <option value="USPS">USPS</option>
      <option value="Other">Other</option>
    </select>
    <select class="filter-select" id="repFilter" onchange="filterTable()">
      <option value="">All Reps</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Customer / Deal</th>
          <th>Carrier</th>
          <th>Tracking #</th>
          <th>Status</th>
          <th class="hide-mobile">Latest Event</th>
          <th class="hide-mobile">Date Shipped</th>
          <th class="hide-mobile">Destination</th>
          <th class="hide-mobile">Transit</th>
          <th>HS</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row"><td colspan="8">
          <div style="display:flex;flex-direction:column;gap:10px;padding:20px">
            <div class="skeleton-line" style="width:100%"></div>
            <div class="skeleton-line" style="width:85%"></div>
            <div class="skeleton-line" style="width:92%"></div>
            <div class="skeleton-line" style="width:78%"></div>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let allShipments = [];

const REP_COLORS = {
  'Jill Holdway':   '#f59e0b',
  'Sarah Smith':    '#3b82f6',
  'Travis Singleton': '#8b5cf6',
  'Benton White':   '#ee6216',
  'Gabe White':     '#22c55e',
  'Chet Burgess':   '#ec4899',
  'Kim Dalton':     '#14b8a6',
  'Jeromy Packwood':'#64748b',
};

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtAmount(n) {
  if (!n) return '—';
  return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function carrierLabel(c) {
  const map = { OD: 'Old Dominion', ABF: 'ABF Freight', UPS: 'UPS', FedEx: 'FedEx', USPS: 'USPS', Other: 'Other' };
  return map[c] || c;
}

function copyTracking(btn, tracking) {
  navigator.clipboard.writeText(tracking).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function buildRow(s) {
  const repColor = REP_COLORS[s.rep] || '#888';
  const trackingCell = s.tracking
    ? `<div style="display:flex;align-items:center;gap:6px">
         ${s.trackingUrl
           ? `<a href="${s.trackingUrl}" target="_blank" class="tracking-link" title="Track on carrier website">
               ${s.tracking}
               <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
             </a>`
           : `<span class="tracking-link" style="cursor:default">${s.tracking}</span>`
         }
         <button class="copy-btn" onclick="copyTracking(this,'${s.tracking}')">Copy</button>
       </div>`
    : `<span class="tracking-none">No tracking</span>`;

  return `<tr data-carrier="${s.carrier}" data-rep="${s.rep}" data-search="${(s.dealName + ' ' + s.tracking + ' ' + s.address + ' ' + s.rep).toLowerCase()}">
    <td>
      <a href="${s.dealUrl}" target="_blank" class="deal-name" title="${s.dealName}">${s.dealName.replace(/\s*-\s*New Deal\s*$/i, '').trim()}</a>
      ${s.address ? `<div class="deal-address">${s.address}</div>` : ''}
    </td>
    <td><span class="carrier-badge carrier-${s.carrier}">${s.carrier === 'OD' ? 'Old Dom.' : s.carrier}</span></td>
    <td>${trackingCell}</td>
    <td id="status-${s.dealId}">
      ${s.tracking && s.trackingUrl
        ? `<a href="${s.trackingUrl}" target="_blank" class="status-badge status-unknown">Track →</a>`
        : `<span class="status-badge status-unknown">No tracking</span>`
      }
    </td>
    <td class="hide-mobile" id="event-${s.dealId}" style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0">—</td>
    <td class="date-cell hide-mobile" id="date-${s.dealId}">${fmtDate(s.dateShipped)}</td>
    <td class="hide-mobile" id="dest-${s.dealId}" style="font-size:11px;color:var(--muted)">—</td>
    <td class="hide-mobile" id="transit-${s.dealId}" style="font-size:11px;color:var(--muted);text-align:center">—</td>
    <td>
      <a href="${s.dealUrl}" target="_blank" class="hs-link" title="View Deal">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </td>
  </tr>`;
}

function filterTable() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const carrier = document.getElementById('carrierFilter').value;
  const rep = document.getElementById('repFilter').value;
  const rows = document.querySelectorAll('#tableBody tr[data-carrier]');
  let visible = 0;
  rows.forEach(row => {
    const matchSearch = !query || row.dataset.search.includes(query);
    const matchCarrier = !carrier || row.dataset.carrier === carrier;
    const matchRep = !rep || row.dataset.rep === rep;
    const show = matchSearch && matchCarrier && matchRep;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('filterCount').textContent = visible !== allShipments.length
    ? `Showing ${visible} of ${allShipments.length}` : '';
}

function updateStats(shipments) {
  document.getElementById('statTotal').textContent = shipments.length;
  document.getElementById('statABF').textContent = shipments.filter(s => s.carrier === 'ABF').length;
  document.getElementById('statOD').textContent = shipments.filter(s => s.carrier === 'OD').length;
  document.getElementById('statOther').textContent = shipments.filter(s => !['ABF','OD'].includes(s.carrier)).length;

}

function populateRepFilter(shipments) {
  const reps = [...new Set(shipments.map(s => s.rep))].sort();
  const sel = document.getElementById('repFilter');
  sel.innerHTML = '<option value="">All Reps</option>';
  reps.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
}

async function loadShipments() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('tableBody').innerHTML = `<tr class="loading-row"><td colspan="7">
    <div style="display:flex;flex-direction:column;gap:10px;padding:20px">
      <div class="skeleton-line" style="width:100%"></div>
      <div class="skeleton-line" style="width:85%"></div>
      <div class="skeleton-line" style="width:92%"></div>
      <div class="skeleton-line" style="width:78%"></div>
    </div>
  </td></tr>`;

  try {
    const res = await fetch('/api/shipping-board', { credentials: 'include' });
    const data = await res.json();

    if (!data.success) throw new Error(data.error || 'Failed to load');

    allShipments = data.shipments;
    updateStats(allShipments);
    populateRepFilter(allShipments);

    // Pre-register all tracking numbers with AfterShip in one batch call
    // This ensures AfterShip has started polling carriers before we request status
    const trackable = allShipments.filter(s => s.tracking && s.carrier);
    if (trackable.length > 0) {
      registerAllWithAfterShip(trackable);  // fire and forget
      fetchAllStatuses(trackable);
    }

    if (allShipments.length === 0) {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <div class="icon">📦</div>
          <h3>No shipments found</h3>
          <p>No deals in Shipped stage with tracking numbers.</p>
        </div>
      </td></tr>`;
    } else {
      document.getElementById('tableBody').innerHTML = allShipments.map(buildRow).join('');
      filterTable();
    }
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Error loading shipments</h3>
        <p style="color:var(--red)">${e.message}</p>
      </div>
    </td></tr>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── Live tracking status ──────────────────────────────────────────
// Pre-register all tracking numbers with AfterShip in one server call
async function registerAllWithAfterShip(shipments) {
  try {
    await fetch('/api/register-trackings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(shipments.map(s => ({ tracking: s.tracking, carrier: s.carrier })))
    });
  } catch(e) { /* non-fatal */ }
}

async function fetchAllStatuses(shipments) {
  // Fetch one at a time with 400ms delay to avoid AfterShip rate limiting
  for (const s of shipments) {
    await fetchStatus(s);
    await new Promise(r => setTimeout(r, 400));
  }
}

async function fetchStatus(s) {
  const cell = document.getElementById('status-' + s.dealId);
  if (!cell) return;
  try {
    const res = await fetch(`/api/track?carrier=${encodeURIComponent(s.carrier)}&tracking=${encodeURIComponent(s.tracking)}`, { credentials: 'include' });
    const data = await res.json();
    if (data.status) {
      const cls   = statusClass(data.status);
      const icon  = statusIcon(data.status);
      const label = data.label || data.status;

      // Build location/detail line
      const locationStr = data.location ? ` · ${data.location}` : '';

      // Tooltip: last event message
      const tooltip = data.lastEvent || data.detail || '';

      // ETA line (only show if not delivered)
      let etaLine = '';
      if (data.eta && data.status !== 'delivered') {
        etaLine = `<div style="font-size:10px;color:var(--muted);margin-top:2px">ETA ${fmtDate(data.eta)}</div>`;
      }

      // Signed by line
      let signedLine = '';
      if (data.signedBy && data.status === 'delivered') {
        signedLine = `<div style="font-size:10px;color:var(--muted);margin-top:1px">Signed: ${data.signedBy}</div>`;
      }

      const badge = s.trackingUrl
        ? `<a href="${s.trackingUrl}" target="_blank" class="status-badge ${cls}" title="${tooltip}">${icon} ${label}${locationStr}</a>`
        : `<span class="status-badge ${cls}" title="${tooltip}">${icon} ${label}${locationStr}</span>`;

      cell.innerHTML = badge + etaLine + signedLine;

      // Latest Event cell
      const eventCell = document.getElementById('event-' + s.dealId);
      if (eventCell && data.lastEvent) {
        const evDate = data.lastEventTime ? `<span style="color:var(--muted);margin-right:4px">${fmtDate(data.lastEventTime)}</span>` : '';
        eventCell.innerHTML = evDate + data.lastEvent;
        eventCell.title = data.lastEvent;
      }

      // Destination cell — parse from address
      const destCell = document.getElementById('dest-' + s.dealId);
      if (destCell && s.address) {
        // Extract city, state from address string
        const parts = s.address.split(',').map(p => p.trim());
        const dest = parts.length >= 2 ? parts.slice(-3, -1).join(', ') : s.address;
        destCell.textContent = dest;
      }

      // Transit time cell — days between ship date and now (or delivery)
      const transitCell = document.getElementById('transit-' + s.dealId);
      if (transitCell && s.dateShipped) {
        const start = new Date(s.dateShipped + 'T00:00:00');
        const end = data.deliveredAt ? new Date(data.deliveredAt + 'T00:00:00') : new Date();
        const days = Math.round((end - start) / (1000 * 60 * 60 * 24));
        transitCell.textContent = days + 'd';
        if (data.status === 'delivered') transitCell.style.color = 'var(--green)';
      }

      // If delivered, update date cell to show delivery date
      const dateCell = document.getElementById('date-' + s.dealId);
      if (dateCell) {
        if (data.status === 'delivered' && data.deliveredAt) {
          dateCell.innerHTML = `<span style="color:var(--green);font-weight:600">${fmtDate(data.deliveredAt)}</span><div style="font-size:10px;color:var(--muted)">Delivered</div>`;
        } else if (data.lastEventTime) {
          // Show last event date as a subtle update indicator
          dateCell.innerHTML = `${fmtDate(s.dateShipped)}<div style="font-size:10px;color:var(--muted)">Updated ${fmtDate(data.lastEventTime)}</div>`;
        }
      }
    } else {
      cell.innerHTML = s.trackingUrl
        ? `<a href="${s.trackingUrl}" target="_blank" class="status-badge status-unknown">Track →</a>`
        : `<span class="status-badge status-unknown">No data</span>`;
    }
  } catch(e) {
    if (cell) cell.innerHTML = s.trackingUrl
      ? `<a href="${s.trackingUrl}" target="_blank" class="status-badge status-unknown">Track →</a>`
      : `<span class="status-badge status-unknown">—</span>`;
  }
}

function statusClass(status) {
  const s = (status || '').toLowerCase();
  if (s === 'delivered') return 'status-delivered';
  if (s === 'out_for_delivery') return 'status-transit';
  if (s === 'in_transit') return 'status-transit';
  if (s === 'pickup') return 'status-pickup';
  if (s === 'pending') return 'status-unknown';
  if (s === 'exception') return 'status-exception';
  return 'status-transit';
}

function statusIcon(status) {
  const s = (status || '').toLowerCase();
  if (s === 'delivered') return '✓';
  if (s === 'out_for_delivery') return '🚚';
  if (s === 'in_transit') return '→';
  if (s === 'pickup') return '📦';
  if (s === 'exception') return '⚠️';
  if (s === 'pending') return '○';
  return '→';
}

// ── Light / Dark mode ────────────────────────────────────────────
function toggleMode() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('modeIcon').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('wr_shipping_mode', isLight ? 'light' : 'dark');
}

// Restore saved mode on load
(function() {
  if (localStorage.getItem('wr_shipping_mode') === 'light') {
    document.documentElement.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('modeIcon');
      if (btn) btn.textContent = '🌙';
    });
  }
})();

// Load on page open
loadShipments();


// ── Add Shipment Flow ─────────────────────────────────────────────
let _selectedShipDeal = null;
let _allClosedWonDeals = [];

async function openAddShipment() {
  // Reset form
  _selectedShipDeal = null;
  document.getElementById('shipDealSelected').style.display = 'none';
  document.getElementById('shipDealPickerWrap').style.display = 'block';
  document.getElementById('shipDealFilter').value = '';
  document.getElementById('shipCarrier').value = '';
  document.getElementById('shipTracking').value = '';
  document.getElementById('shipErrorMsg').style.display = 'none';
  document.getElementById('shipDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('addShipmentModal').style.display = 'flex';

  // Load deals
  renderDealList('<div style="padding:14px;font-size:12px;color:#666;text-align:center">Loading…</div>');
  try {
    const res = await fetch('/api/deals/closed-won', { credentials: 'include' });
    const data = await res.json();
    _allClosedWonDeals = data.results || [];
    filterDealList('');
  } catch(e) {
    renderDealList('<div style="padding:14px;font-size:12px;color:#ef4444;text-align:center">Failed to load deals</div>');
  }
}

function closeAddShipment() {
  document.getElementById('addShipmentModal').style.display = 'none';
}

function renderDealList(html) {
  document.getElementById('shipDealList').innerHTML = html;
}

function filterDealList(query) {
  const q = query.toLowerCase();
  const filtered = q
    ? _allClosedWonDeals.filter(d => d.name.toLowerCase().includes(q))
    : _allClosedWonDeals;

  if (!filtered.length) {
    renderDealList('<div style="padding:14px;font-size:12px;color:#666;text-align:center">No deals found</div>');
    return;
  }

  renderDealList(filtered.map(d => `
    <div onclick="selectShipDeal('${d.id}', this.dataset.name)"
      data-name="${d.name.replace(/"/g,'&quot;')}"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e1e1e;font-size:13px;color:#e8e8e8;transition:background .1s"
      onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='transparent'">
      <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div>
      ${d.amount ? `<div style="font-size:11px;color:#666;margin-top:2px">$${parseFloat(d.amount).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>` : ''}
    </div>
  `).join(''));
}

function selectShipDeal(id, name) {
  _selectedShipDeal = { id, name };
  document.getElementById('shipDealSelectedName').textContent = name;
  document.getElementById('shipDealSelected').style.display = 'flex';
  document.getElementById('shipDealPickerWrap').style.display = 'none';
  // Focus carrier next
  document.getElementById('shipCarrier').focus();
}

function clearShipDeal() {
  _selectedShipDeal = null;
  document.getElementById('shipDealSelected').style.display = 'none';
  document.getElementById('shipDealPickerWrap').style.display = 'block';
  document.getElementById('shipDealFilter').value = '';
  filterDealList('');
}

async function submitShipment() {
  const errEl = document.getElementById('shipErrorMsg');
  errEl.style.display = 'none';

  const carrier  = document.getElementById('shipCarrier').value.trim();
  const tracking = document.getElementById('shipTracking').value.trim();
  const dateShipped = document.getElementById('shipDate').value;

  if (!_selectedShipDeal) { errEl.textContent = 'Please select a deal.'; errEl.style.display = 'block'; return; }
  if (!carrier)            { errEl.textContent = 'Please select a carrier.'; errEl.style.display = 'block'; return; }
  if (!tracking)           { errEl.textContent = 'Please enter a tracking number.'; errEl.style.display = 'block'; return; }
  if (!dateShipped)        { errEl.textContent = 'Please enter a ship date.'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('shipSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Processing…';

  try {
    const res = await fetch('/api/ship-deal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        dealId: _selectedShipDeal.id,
        carrier,
        tracking,
        dateShipped
      })
    });
    const data = await res.json();
    if (data.success) {
      closeAddShipment();
      // Reload board to show new row
      loadShipments();
    } else {
      throw new Error(data.error || 'Failed to mark as shipped');
    }
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Mark as Shipped';
  }
}

</script>

<!-- ADD SHIPMENT MODAL -->
<div id="addShipmentModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:16px">
  <div style="background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:32px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <div style="font-size:16px;font-weight:700;color:#e8e8e8;margin-bottom:4px">Add Shipment</div>
    <div style="font-size:12px;color:#888;margin-bottom:24px">Search for a Closed Won deal, enter tracking details, and mark as shipped.</div>

    <!-- Deal List -->
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Deal (Closed Won)</label>

      <!-- Selected state -->
      <div id="shipDealSelected" style="display:none;background:rgba(238,98,22,.1);border:1px solid rgba(238,98,22,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ee6216;align-items:center;justify-content:space-between">
        <span id="shipDealSelectedName" style="font-weight:600"></span>
        <button onclick="clearShipDeal()" style="background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:0 2px;line-height:1">✕</button>
      </div>

      <!-- Filter + list (hidden once deal selected) -->
      <div id="shipDealPickerWrap">
        <input id="shipDealFilter" type="text" placeholder="Filter deals…"
          style="width:100%;background:#111;border:1px solid #333;color:#e8e8e8;padding:9px 12px;border-radius:8px 8px 0 0;font-size:13px;outline:none;font-family:inherit;border-bottom:none"
          oninput="filterDealList(this.value)"
          onfocus="this.style.borderColor='#ee6216';this.style.borderBottomColor='#333'" onblur="this.style.borderColor='#333'">
        <div id="shipDealList" style="background:#111;border:1px solid #333;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto">
          <div style="padding:14px;font-size:12px;color:#666;text-align:center">Loading deals…</div>
        </div>
      </div>
    </div>

    <!-- Carrier -->
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Freight Carrier</label>
      <select id="shipCarrier" style="width:100%;background:#111;border:1px solid #333;color:#e8e8e8;padding:10px 12px;border-radius:8px;font-size:13px;outline:none;font-family:inherit;cursor:pointer"
        onfocus="this.style.borderColor='#ee6216'" onblur="this.style.borderColor='#333'">
        <option value="">Select carrier…</option>
        <option value="ABF">ABF Freight</option>
        <option value="OD">Old Dominion</option>
        <option value="UPS">UPS</option>
        <option value="FedEx">FedEx</option>
        <option value="USPS">USPS</option>
      </select>
    </div>

    <!-- Tracking Number -->
    <div style="margin-bottom:16px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Tracking Number</label>
      <input id="shipTracking" type="text" placeholder="Enter tracking number…"
        style="width:100%;background:#111;border:1px solid #333;color:#e8e8e8;padding:10px 12px;border-radius:8px;font-size:13px;outline:none;font-family:monospace"
        onfocus="this.style.borderColor='#ee6216'" onblur="this.style.borderColor='#333'">
    </div>

    <!-- Date Shipped -->
    <div style="margin-bottom:24px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Date Shipped</label>
      <input id="shipDate" type="date"
        style="width:100%;background:#111;border:1px solid #333;color:#e8e8e8;padding:10px 12px;border-radius:8px;font-size:13px;outline:none;font-family:inherit;cursor:pointer"
        onfocus="this.style.borderColor='#ee6216'" onblur="this.style.borderColor='#333'">
    </div>

    <div id="shipErrorMsg" style="display:none;color:#ef4444;font-size:12px;margin-bottom:12px"></div>

    <div style="display:flex;gap:10px">
      <button id="shipSubmitBtn" onclick="submitShipment()" style="flex:1;padding:13px;background:#ee6216;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
        Mark as Shipped
      </button>
      <button onclick="closeAddShipment()" style="padding:13px 18px;background:rgba(255,255,255,.06);color:#888;border:1px solid #333;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
        Cancel
      </button>
    </div>
  </div>
</div>

</body>
