<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping — WhisperRoom</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='%23e8531a'>W</text></svg>">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222222;--surface3:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--muted:#666;--muted2:#444;
  --orange:#ee6216;--green:#22c55e;--green2:rgba(34,197,94,.12);
  --red:#ef4444;--red2:rgba(239,68,68,.12);--blue:#60a5fa;--blue2:rgba(96,165,250,.12);
  --yellow:#facc15;--yellow2:rgba(250,204,21,.12);--topbar:#0a0a0a;
  --mono:'DM Mono',monospace;--row-h:60px;
}
html.light{
  --bg:#edeae4;--surface:#f5f2ec;--surface2:#e6e3dc;--surface3:#dedad2;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.16);
  --text:#1a1a1a;--muted:#777;--muted2:#aaa;
  --topbar:#0a0a0a;
}
body{font-family:'Satoshi',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.topbar{background:var(--topbar);border-bottom:1px solid rgba(255,255,255,.07);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{flex-shrink:0;display:flex;align-items:center;text-decoration:none}
.topbar-logo img{height:26px;width:auto;display:block}
.topbar-nav{display:flex;gap:6px}
.nav-link{padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:6px;color:rgba(255,255,255,.5);text-decoration:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);transition:all .15s}
.nav-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.12)}
.nav-link.active{background:rgba(238,98,22,.2);color:#ee6216;border-color:rgba(238,98,22,.4)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.theme-btn{padding:5px 9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f0ede8;cursor:pointer;font-size:14px}
.page{max-width:1600px;margin:0 auto;padding:24px 24px 60px}
.page-title{font-family:'Satoshi',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
/* pills */
.filter-bar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:50px;border:1px solid var(--border);background:var(--surface);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .12s;user-select:none}
.pill:hover{border-color:var(--border2);color:var(--text)}
/* all colored pills always show their color */
.pill.ptransit  { color:var(--blue);   border-color:rgba(96,165,250,.25);  }
.pill.pdelivered{ color:var(--green);  border-color:rgba(34,197,94,.25);   }
.pill.pexception{ color:var(--red);    border-color:rgba(239,68,68,.25);   }
.pill.pout      { color:var(--yellow); border-color:rgba(250,204,21,.25);  }
/* active state — filled background to show selected */
.pill.active.ptransit  { background:var(--blue2);   border-color:rgba(96,165,250,.5);  }
.pill.active.pdelivered{ background:var(--green2);  border-color:rgba(34,197,94,.5);   }
.pill.active.pexception{ background:var(--red2);    border-color:rgba(239,68,68,.5);   }
.pill.active.pout      { background:var(--yellow2); border-color:rgba(250,204,21,.5);  }
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill.ptransit  .pdot{ background:var(--blue);   }
.pill.pdelivered .pdot{ background:var(--green);  }
.pill.pexception .pdot{ background:var(--red);    }
.pill.pout       .pdot{ background:var(--yellow); }
.pcount{font-family:'Satoshi',sans-serif;font-size:13px;color:var(--text)}
/* controls */
.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.swrap{position:relative;flex:1;min-width:180px;max-width:300px}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none}
.sinput{width:100%;padding:7px 10px 7px 30px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.sinput:focus{border-color:var(--border2)}
.sinput::placeholder{color:var(--muted2)}
.cbtn{padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.04em;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px}
.cbtn:hover{border-color:var(--border2);color:var(--text)}
.cbtn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sselect{padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer}
/* table */
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cols{grid-template-columns:4px 180px 70px 140px 150px 2fr 106px 110px 120px 96px}
.thead{display:grid;align-items:center;padding:0 16px;height:34px;border-bottom:1px solid var(--border);background:var(--surface2)}
.thead.cols{padding:0 16px}
.th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 6px}
.trow{display:grid;align-items:stretch;padding:0 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--surface2)}
.trow.open-row{background:var(--surface2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* stripe */
.stripe{border-radius:2px;width:4px;margin-right:8px;align-self:stretch;flex-shrink:0}
.s-in_transit{background:var(--blue)}
.s-out_for_delivery{background:var(--yellow)}
.s-delivered{background:var(--green)}
.s-exception{background:var(--red)}
.s-pending,.s-unknown,.s-null{background:var(--border2)}
/* cells */
.cell{padding:14px 6px;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:0}
.dname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.drep{font-size:10px;color:var(--muted)}
.cbadge{display:inline-block;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.06em;background:var(--surface3);border:1px solid var(--border2);border-radius:4px;color:var(--muted)}
.tnum{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcopy{font-size:9px;font-weight:700;background:none;border:none;color:var(--muted);cursor:pointer;font-family:inherit;padding:0;letter-spacing:.04em;text-transform:uppercase}
.tcopy:hover{color:var(--text)}
.tcopy.copied{color:var(--green)}
.dv{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono)}
.eta-soon{color:var(--yellow);font-weight:700}
.eta-today{color:var(--green);font-weight:700}
.eta-past{color:var(--muted)}
.eta-del{color:var(--green);font-weight:700;font-size:11px}
.notrack{color:var(--muted2);font-style:italic;font-size:11px}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:50px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.b-in_transit{background:var(--blue2);color:var(--blue)}
.b-out_for_delivery{background:var(--yellow2);color:var(--yellow)}
.b-delivered{background:var(--green2);color:var(--green)}
.b-exception{background:var(--red2);color:var(--red)}
.b-pending,.b-unknown,.b-null{background:var(--surface3);color:var(--muted)}
.acts{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.ab{padding:4px 8px;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:.04em;background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .1s;display:inline-flex;align-items:center}
.ab:hover{color:var(--text);border-color:var(--border2)}
.ctime{font-size:9px;color:var(--muted2);margin-top:1px}
/* expand */
.expand{display:none;border-bottom:1px solid var(--border);background:var(--surface2);padding:10px 20px 14px 38px}
.expand.eopen{display:block;animation:fadeUp .15s ease}
.einner{display:flex;gap:28px;flex-wrap:wrap}
.esec{display:flex;flex-direction:column;gap:2px}
.elabel{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:2px}
.eval{font-size:12px;color:var(--text);line-height:1.4;max-width:380px}
.eval.mono{font-family:var(--mono);font-size:11px}
/* skeleton */
.skel{height:var(--row-h);background:var(--surface);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);animation:shimmer 1.4s ease infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.emico{font-size:32px;margin-bottom:10px;opacity:.4}
</style>
</head>
<body>
<nav class="topbar">
  <a href="/deals" class="topbar-logo"><img src="https://cdn.prod.website-files.com/6751b64d2d0008d27a0b6b30/6759949fd35fa166895d5a7b_Group%201707479066.svg" alt="WhisperRoom"></a>
  <div class="topbar-nav">
    <a href="/deals" class="nav-link">⬡ Deal Hub</a>
    <a href="/quotes" class="nav-link">Quotes</a>
    <a href="/orders" class="nav-link">Orders</a>
    <a href="/shipping" class="nav-link active">Shipping</a>
    <a href="/reports" class="nav-link">Reports</a>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <a href="/auth/logout" style="padding:5px 9px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.4);text-decoration:none">Sign Out</a>
  </div>
</nav>
<div class="page">
  <div class="page-title">Shipments</div>
  <div class="page-sub" id="pageSub">Loading…</div>
  <div class="filter-bar">
    <div class="pill active" onclick="setFilter('all',this)"><span class="pcount" id="cnt-all">—</span> All</div>
    <div class="pill ptransit" onclick="setFilter('in_transit',this)"><span class="pdot"></span><span class="pcount" id="cnt-in_transit">—</span> In Transit</div>
    <div class="pill pout" onclick="setFilter('out_for_delivery',this)"><span class="pdot"></span><span class="pcount" id="cnt-out_for_delivery">—</span> Out for Delivery</div>
    <div class="pill pdelivered" onclick="setFilter('delivered',this)"><span class="pdot"></span><span class="pcount" id="cnt-delivered">—</span> Delivered</div>
    <div class="pill pexception" onclick="setFilter('exception',this)"><span class="pdot"></span><span class="pcount" id="cnt-exception">—</span> Exception</div>
    <div class="pill" onclick="setFilter('pending',this)"><span class="pdot"></span><span class="pcount" id="cnt-pending">—</span> Pending</div>
  </div>
  <div class="controls">
    <div class="swrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="sinput" id="searchInput" placeholder="Search customer, tracking, rep…" oninput="renderTable()">
    </div>
    <select class="sselect" id="sortSelect" onchange="renderTable()">
      <option value="date_desc">Date Shipped ↓</option>
      <option value="date_asc">Date Shipped ↑</option>
      <option value="status">Status</option>
      <option value="amount_desc">Amount ↓</option>
      <option value="eta">ETA</option>
    </select>
    <button class="cbtn" id="refreshBtn" onclick="loadBoard(true)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </div>
  <div class="twrap">
    <div id="loadingRows"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
    <div id="tableContent" style="display:none">
      <div class="thead cols">
        <div></div>
        <div class="th" style="padding-left:4px">Customer</div>
        <div class="th">Carrier</div>
        <div class="th">Tracking</div>
        <div class="th">Destination</div>
        <div class="th">Last Event</div>
        <div class="th">Shipped</div>
        <div class="th">ETA / Delivered</div>
        <div class="th">Status</div>
        <div class="th" style="text-align:right">Actions</div>
      </div>
      <div id="tableBody"></div>
    </div>
  </div>
</div>
<script>
let allShipments=[];
let activeFilter='all';

async function loadBoard(force=false){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try{
    const res=await fetch('/api/shipping-board',{credentials:'include'});
    if(res.status===401){window.location.href='/';return}
    const data=await res.json();
    allShipments=data.shipments||[];
    updateCounts();
    renderTable();
    const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    document.getElementById('pageSub').textContent=`${allShipments.length} shipments · updated ${t}`;
  }catch(e){
    document.getElementById('tableBody').innerHTML=`<div class="empty"><div class="emico">⚠️</div>Failed: ${e.message}</div>`;
  }finally{
    btn.classList.remove('spinning');
    document.getElementById('loadingRows').style.display='none';
    document.getElementById('tableContent').style.display='';
  }
}

function updateCounts(){
  const g={all:allShipments.length,in_transit:0,out_for_delivery:0,delivered:0,exception:0,pending:0};
  allShipments.forEach(s=>{
    if(!s.tracking)return; // exclude no-tracking from counts
    const st=s.trackStatus||'pending';if(g[st]!==undefined)g[st]++;
  });
  g.all=allShipments.filter(s=>s.tracking).length;
  Object.entries(g).forEach(([k,v])=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=v});
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

const SO={out_for_delivery:0,exception:1,in_transit:2,pending:3,delivered:4};
function sortRows(arr){
  const s=document.getElementById('sortSelect').value;
  return [...arr].sort((a,b)=>{
    if(s==='date_desc')return(b.dateShipped||'').localeCompare(a.dateShipped||'');
    if(s==='date_asc')return(a.dateShipped||'').localeCompare(b.dateShipped||'');
    if(s==='status')return(SO[a.trackStatus??'pending']??3)-(SO[b.trackStatus??'pending']??3);
    if(s==='amount_desc')return(b.amount||0)-(a.amount||0);
    if(s==='eta'){const ae=a.trackEta||'9999',be=b.trackEta||'9999';return ae.localeCompare(be)}
    return 0;
  });
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let rows=allShipments.filter(s=>{
    // Hide rows with no tracking data
    if(!s.tracking)return false;
    if(activeFilter!=='all'&&(s.trackStatus||'pending')!==activeFilter)return false;
    if(q){const h=[s.dealName,s.tracking,s.rep,s.carrier,s.city,s.state].join(' ').toLowerCase();return h.includes(q)}
    return true;
  });
  rows=sortRows(rows);
  const body=document.getElementById('tableBody');
  if(!rows.length){body.innerHTML='<div class="empty"><div class="emico">📦</div>No shipments match.</div>';return}
  body.innerHTML=rows.map((s,i)=>buildRow(s,i)).join('');
}

function buildRow(s,i){
  const status=s.trackStatus||(s.tracking?'pending':'unknown');
  const label=s.trackLabel||lbl(status);
  const dest=[s.city,s.state].filter(Boolean).join(', ')||'—';
  const id='rx'+i;
  const amtStr=s.amount?'$'+Math.round(s.amount).toLocaleString():'';

  let trackHtml='<span class="notrack">No tracking</span>';
  if(s.tracking){
    const ln=s.trackingUrl
      ?`<a href="${s.trackingUrl}" target="_blank" class="tnum" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${esc(s.tracking)}</a>`
      :`<span class="tnum">${esc(s.tracking)}</span>`;
    trackHtml=`${ln}<button class="tcopy" onclick="event.stopPropagation();cpTrack(this,'${esc(s.tracking)}')">Copy</button>`;
  }

  let etaHtml='<span class="notrack">—</span>';
  // Calculate transit days: ship date → ETA
  const transitDays = (s.dateShipped && s.trackEta)
    ? Math.round((new Date(s.trackEta) - new Date(s.dateShipped)) / 86400000)
    : (s.dateShipped && s.trackDelivered)
    ? Math.round((new Date(s.trackDelivered) - new Date(s.dateShipped)) / 86400000)
    : null;
  const transitStr = transitDays !== null ? `<div class="ctime">${transitDays} day transit</div>` : '';

  if(s.trackDelivered){
    etaHtml=`<span class="eta-del">✓ ${fd(s.trackDelivered)}</span>`;
    if(s.signedBy) etaHtml+=`<div class="ctime">Signed: ${esc(s.signedBy)}</div>`;
    else if(transitStr) etaHtml+=transitStr;
  }else if(s.trackEta){
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((new Date(s.trackEta)-today)/86400000);
    if(diff<0)      etaHtml=`<span class="eta-past">${fd(s.trackEta)}</span>`;
    else if(diff===0)etaHtml=`<span class="eta-today">Today</span>`;
    else if(diff===1)etaHtml=`<span class="eta-soon">Tomorrow</span>`;
    else if(diff<=3) etaHtml=`<span class="eta-soon">${fd(s.trackEta)}</span>`;
    else             etaHtml=`<span class="dv">${fd(s.trackEta)}</span>`;
    etaHtml += transitStr;
  }

  const evtShort=s.trackLastEvent?esc(s.trackLastEvent.slice(0,58))+(s.trackLastEvent.length>58?'…':''):'<span class="notrack">—</span>';
  const cachedStr=s.trackUpdated?ago(s.trackUpdated):'';
  const hasExp=!!(s.trackLastEvent||s.trackDelivered||s.signedBy||s.address);

  return `<div class="trow cols" onclick="toggleExp('${id}')" style="animation:fadeUp .18s ease ${i*.015}s both">
  <div class="stripe s-${status}"></div>
  <div class="cell" style="padding-left:4px">
    <div class="dname" title="${esc(s.dealName)}">${esc(s.dealName)}</div>
    <div class="drep">${esc(s.rep)}${amtStr?' · '+amtStr:''}</div>
  </div>
  <div class="cell"><span class="cbadge">${esc(s.carrier||'—')}</span></div>
  <div class="cell">${trackHtml}</div>
  <div class="cell">
    <div class="dv" style="font-size:12px">${esc(dest)}</div>
    ${s.zip?`<div class="ctime">${esc(s.zip)}</div>`:''}
  </div>
  <div class="cell" style="min-width:0">
    <div style="font-size:12px;color:var(--muted);white-space:normal;line-height:1.4;word-break:break-word">${evtShort}</div>
    ${cachedStr?`<div class="ctime">↻ ${cachedStr}</div>`:''}
  </div>
  <div class="cell"><span class="dv">${s.dateShipped?fd(s.dateShipped):'—'}</span></div>
  <div class="cell">${etaHtml}</div>
  <div class="cell"><span class="sbadge b-${status}"><span class="bdot"></span>${esc(label)}</span></div>
  <div class="cell acts" onclick="event.stopPropagation()">
    <a href="${s.dealUrl}" target="_blank" class="ab">HS ↗</a>
    ${s.trackingUrl?`<a href="${s.trackingUrl}" target="_blank" class="ab">Track ↗</a>`:''}
    ${s.tracking?`<button class="ab" onclick="rfsh('${esc(s.tracking)}','${esc(s.carrier)}',this)">↻</button>`:''}
  </div>
</div>
<div class="expand" id="${id}">
  <div class="einner">
    ${s.trackLastEvent?`<div class="esec"><div class="elabel">Last Event</div><div class="eval">${esc(s.trackLastEvent)}</div></div>`:''}
    ${s.trackLastTime?`<div class="esec"><div class="elabel">Event Time</div><div class="eval mono">${fd(s.trackLastTime)}</div></div>`:''}
    ${s.trackLocation?`<div class="esec"><div class="elabel">Location</div><div class="eval">${esc(s.trackLocation)}</div></div>`:''}
    ${s.trackDelivered?`<div class="esec"><div class="elabel">Delivered</div><div class="eval mono">${fd(s.trackDelivered)}</div></div>`:''}
    ${s.signedBy?`<div class="esec"><div class="elabel">Signed By</div><div class="eval">${esc(s.signedBy)}</div></div>`:''}
    ${s.address?`<div class="esec"><div class="elabel">Full Address</div><div class="eval">${esc(s.address)}</div></div>`:''}
    ${s.trackUpdated?`<div class="esec"><div class="elabel">Cache Updated</div><div class="eval mono">${new Date(s.trackUpdated).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})}</div></div>`:''}
  </div>
</div>`;
}

function toggleExp(id){
  const el=document.getElementById(id);
  if(!el||!el.innerHTML.trim())return;
  const open=el.classList.contains('eopen');
  document.querySelectorAll('.expand.eopen').forEach(e=>e.classList.remove('eopen'));
  if(!open)el.classList.add('eopen');
}

async function rfsh(tracking,carrier,btn){
  const o=btn.textContent;btn.textContent='…';btn.disabled=true;
  try{
    await fetch('/api/shipping/refresh-tracking',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({tracking,carrier})});
    await loadBoard();
  }catch(e){btn.textContent='!';setTimeout(()=>{btn.textContent=o;btn.disabled=false},2000)}
}

function lbl(s){return{in_transit:'In Transit',out_for_delivery:'Out for Delivery',delivered:'Delivered',exception:'Exception',pending:'Pending',unknown:'No Tracking',pickup:'Ready for Pickup'}[s]||s}
function fd(d){if(!d)return'—';const dt=new Date(d.includes('T')?d:d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function ago(d){const diff=Math.round((Date.now()-new Date(d))/60000);if(diff<2)return'just now';if(diff<60)return diff+'m ago';if(diff<1440)return Math.floor(diff/60)+'h ago';return Math.floor(diff/1440)+'d ago'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cpTrack(btn,t){navigator.clipboard.writeText(t).then(()=>{btn.textContent='Copied';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1800)})}
function toggleTheme(){const l=document.documentElement.classList.toggle('light');document.getElementById('themeBtn').textContent=l?'🌙':'☀️';localStorage.setItem('wr-theme',l?'light':'dark')}
if(localStorage.getItem('wr-theme')==='light'){document.documentElement.classList.add('light');document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeBtn');if(b)b.textContent='🌙'})}
loadBoard();
</script>
</body>
</html>
